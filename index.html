// ── CRAFTING ──
let craftData = null;
async function loadCrafting(id, silent=false) {
  const el = document.getElementById('tab-crafting');
  if (!silent) el.innerHTML = loading();
  try {
    const [acData, pcData] = await Promise.all([
      apiFetch(`/api/players/${id}/crafts?completed=all`),
      apiFetch(`/api/players/${id}/passive-crafts?status=all`),
      loadCraftingData().catch(()=>{})   // for passive craft durations (recipe timeRequirement)
    ]);
    // Expose raw for debugging — open DevTools and type _craftRaw
    window._craftRaw = {acData, pcData};

    // Build item map — handles both array and object shapes
    const itemMap = {};
    const addItems = d => {
      if (!d) return;
      if (Array.isArray(d)) d.forEach(i => { if (i?.id) itemMap[i.id] = i; });
      else if (typeof d === 'object') Object.assign(itemMap, d);
    };
    addItems(acData.items); addItems(acData.cargos);
    addItems(pcData.items); addItems(pcData.cargos);

    // Active crafts — API returns craftResults (not crafts)
    const rawCrafts = acData.craftResults || acData.crafts || acData.activeCrafts || (Array.isArray(acData) ? acData : []);
    const isCraftDone = c => !!(c.completed || c.isCompleted || c.status === 'complete' || c.status === 'completed');
    const active = rawCrafts.filter(c => !isCraftDone(c));
    const done   = rawCrafts.filter(c =>  isCraftDone(c));

    // Passive crafts — also uses craftResults
    const passive = pcData.craftResults || pcData.passiveCrafts || pcData.crafts || pcData.results ||
                    (Array.isArray(pcData) ? pcData : []);

    craftData = { active, done, passive, itemMap };
    renderCrafting();
    startLiveRefresh('crafting');
  } catch(e) { if (!silent) el.innerHTML = errBox(e); }
}

function renderCrafting() {
  const el = document.getElementById('tab-crafting');
  if (!craftData) return;
  const {active, done, passive, itemMap} = craftData;

  // Active tab shows in-progress + completed crafts together
  const isPassive = craftTabActive === 'passive';
  const list = isPassive ? passive : [...active, ...done];

  // Active crafts: group by claim/location. (Passive crafts use a dedicated grouped renderer below.)
  const byClaim = {};
  (isPassive ? [] : list).forEach(c => {
    const key = c.claimName || c.claimEntityId || c.buildingName || c.locationName || 'Unknown Location';
    if (!byClaim[key]) byClaim[key] = {
      name: key, crafts: [],
      regionId:   c.regionId   || c.region_id   || null,
      regionName: c.regionName || c.region_name || null
    };
    byClaim[key].crafts.push(c);
  });

  function craftRow(c, type) {
    // ── Output item (try several field shapes) ──
    const rawOut  = c.craftedItem || c.outputItems || c.outputs || c.items || c.craftOutput || [];
    const outArr  = Array.isArray(rawOut) ? rawOut : [rawOut].filter(Boolean);
    const output  = outArr[0] || null;
    const outId   = output?.item_id ?? output?.itemId ?? output?.id ?? null;
    const item    = outId ? itemMap[outId] : null;
    const baseName = item ? itemLabel(item, outId, 0)
                          : (c.recipeName || c.name || (c.recipeId ? 'Recipe #'+c.recipeId : 'Unknown craft'));
    // Prepend craft count: "2,000x T2 - Simple Spool of Thread"
    const craftCount = c.craftCount || c.quantity || c.count || null;
    const name = craftCount && craftCount > 1 ? `${fmtCount(craftCount)}x ${baseName}` : baseName;

    // ── isDone — check status string (passive uses status:"complete") ──
    const isDone = !!(c.completed || c.isCompleted ||
                      c.status === 'complete' || c.status === 'completed' || c.status === 'done');

    // ── Progress — active crafts use raw action count / totalActionsRequired ──
    let pct = 0;
    if (!isDone) {
      const rawProg = c.progress ?? c.progressPercent ?? c.progressPct ?? null;
      if (rawProg !== null) {
        if (c.totalActionsRequired && c.totalActionsRequired > 0 && rawProg > 1) {
          // progress is action count; divide by total
          pct = Math.round((rawProg / c.totalActionsRequired) * 100);
        } else {
          // already a fraction (0‥1) or percentage (0‥100)
          pct = rawProg > 1 ? Math.round(rawProg) : Math.round(rawProg * 100);
        }
      }
    } else {
      pct = 100;
    }

    // ── Completion timestamp (normalise to unix seconds) ──
    let ts = c.completionTimestamp || c.completionTime || c.endTimestamp || c.endTime ||
             c.finishTime || c.finishTimestamp || c.scheduledCompletionTimestamp || c.completeAt || 0;
    // Passive crafts return timestamp as a date string e.g. "2026-06-07 20:52:47.572925+00"
    if (!ts && c.timestamp) {
      const parsed = new Date(c.timestamp);
      if (!isNaN(parsed)) ts = Math.floor(parsed.getTime() / 1000);
    }
    if (ts > 1e12) ts = Math.floor(ts / 1000);
    // Derive progress from timestamps when still 0 and timestamps are available
    if (!isDone && pct === 0 && ts > 0) {
      let startTs = c.startTimestamp || c.startTime || c.beginTimestamp || c.beginTime || c.createdAt || 0;
      if (typeof startTs === 'string') { const p = new Date(startTs); if (!isNaN(p)) startTs = Math.floor(p.getTime()/1000); }
      if (startTs > 1e12) startTs = Math.floor(startTs / 1000);
      if (startTs > 0) {
        const dur = ts - startTs;
        if (dur > 0) pct = Math.min(100, Math.round(((Date.now()/1000) - startTs) / dur * 100));
      }
    }
    const secsLeft = (ts && !isDone) ? Math.max(0, ts - Math.floor(Date.now() / 1000)) : null;

    // ── Status badge ──
    const statusEl = isDone
      ? '<span class="craft-status status-ready"><i class="ti ti-check"></i> Complete</span>'
      : type === 'passive'
        ? '<span class="craft-status status-passive"><i class="ti ti-clock"></i> Passive</span>'
        : '<span class="craft-status status-active"><i class="ti ti-flame"></i> Active</span>';

    // ── Progress / timer line ──
    let timerLine;
    if (isDone) {
      timerLine = '';
    } else if (type === 'passive' && secsLeft !== null) {
      const isProcessing = c.status === 'processing';
      const timeText = (isProcessing && secsLeft <= 0) ? 'Processing' : fmtTimeLeft(secsLeft);
      timerLine = `<div style="font-size:11px;margin-top:3px;display:flex;align-items:center;gap:.3rem">
        <i class="ti ti-clock" style="color:var(--amber-light);font-size:12px"></i>
        <span data-pts="${ts}"${isProcessing?' data-processing="1"':''} style="font-weight:500;color:${secsLeft<300?'var(--green-light)':'var(--amber-light)'}">${timeText}</span>
        <span style="color:var(--text3)">· ${pct}%</span>
      </div>`;
    } else if (type === 'active' && c.totalActionsRequired) {
      // Show raw action counts + percentage: "45,720 / 130,000 · 35% complete"
      const prog = c.progress ?? 0;
      timerLine = `<div style="font-size:11px;color:var(--text3);margin-top:3px">
        <span style="color:var(--text2);font-weight:500">${fmtNum(prog)}</span>
        <span> / ${fmtNum(c.totalActionsRequired)} actions</span>
        <span style="margin-left:.3rem;color:var(--amber-light);font-weight:600">${pct}%</span>
      </div>`;
    } else {
      timerLine = `<div style="font-size:11px;color:var(--text3);margin-top:3px">${pct}% complete</div>`;
    }

    return `<div class="craft-card">
      <div class="craft-card-body">
        <div class="craft-card-name">${escHtml(name)}</div>
        ${!isDone ? `<div class="craft-progress-wrap"><div class="craft-progress active" style="width:${pct}%"></div></div>` : ''}
        ${timerLine}
      </div>
      ${statusEl}
    </div>`;
  }

  const claimBlocks = Object.values(byClaim).map(loc => {
    const type = isPassive ? 'passive' : 'active';
    const inProgress = loc.crafts.filter(c => !c.completed && !c.isCompleted);
    const actions = inProgress.reduce((s,c) => {
      const rp = c.progress ?? c.progressPercent ?? c.progressPct ?? 0;
      const p  = rp > 1 ? rp/100 : rp;
      return s + ((c.actionsRequiredPerItem||0) * (1 - p));
    }, 0);
    return `<div class="craft-location-card">
      <div class="craft-location-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
        <div class="craft-location-name"><i class="ti ${loc.isBuilding?'ti-building-factory':'ti-map-pin'}"></i>${escHtml(loc.name)}${loc.regionId ? `<span style="color:var(--text3);font-size:11px;margin-left:.35rem">· R${loc.regionId}</span>` : ''}</div>
        <div class="craft-location-meta">
          <span>${loc.crafts.length} craft${loc.crafts.length!==1?'s':''}</span>
          ${actions > 0 ? `<span>${Math.round(actions)} actions left</span>` : ''}
          <i class="ti ti-chevron-down" style="font-size:14px;color:var(--text3)"></i>
        </div>
      </div>
      <div>${loc.crafts.map(c=>craftRow(c, type)).join('')}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="craft-tabs">
      <div class="craft-tab ${!isPassive?'active':''}" onclick="craftTabActive='active';renderCrafting()">
        <i class="ti ti-flame"></i> Active (${active.length})${done.length?` <span style="font-size:10px;background:rgba(99,153,34,.2);color:var(--green-light);border-radius:8px;padding:1px 6px;margin-left:3px">${done.length} done</span>`:''}
      </div>
      <div class="craft-tab ${isPassive?'active':''}" onclick="craftTabActive='passive';renderCrafting()">
        <i class="ti ti-clock"></i> Passive (${passive.length})
      </div>
    </div>
    ${isPassive
      ? (renderPassiveCraftsHtml(passive, itemMap) || '<div class="empty"><i class="ti ti-mood-empty"></i><span>No passive crafts</span></div>')
      : (claimBlocks || '<div class="empty"><i class="ti ti-mood-empty"></i><span>No crafts in this category</span></div>')}`;

  if (isPassive) startPassiveCraftTimer();
  else stopPassiveCraftTimer();
}

// Completion time (unix seconds) of a passive craft: start timestamp + recipe duration.
function passiveCompletionTs(c) {
  let start = 0;
  if (c.timestamp) { const p = new Date(c.timestamp); if (!isNaN(p)) start = Math.floor(p.getTime()/1000); }
  if (!start) {
    // Some shapes use numeric fields
    let t = c.startTimestamp || c.startTime || 0;
    if (t > 1e12) t = Math.floor(t/1000);
    start = t;
  }
  const dur = passiveCraftDuration(c.recipeId);
  if (start && dur != null) return start + dur;
  return start || 0; // fallback: unknown duration → treat start as the only reference
}

// Grouped passive-craft view: split into In Progress / Ready to Claim, group by location, then by craft.
function renderPassiveCraftsHtml(passive, itemMap) {
  if (!passive || !passive.length) return '';

  const isComplete = c => !!(c.completed || c.isCompleted || c.status === 'complete' || c.status === 'completed' || c.status === 'done');
  const processing = passive.filter(c => !isComplete(c));
  const ready      = passive.filter(c =>  isComplete(c));

  const craftName = c => {
    const rawOut = c.craftedItem || c.outputItems || c.outputs || c.items || [];
    const outArr = Array.isArray(rawOut) ? rawOut : [rawOut].filter(Boolean);
    const out = outArr[0] || null;
    const outId = out?.item_id ?? out?.itemId ?? out?.id ?? null;
    const item = outId ? itemMap[outId] : null;
    if (item) return { name: itemLabel(item, outId, 0), tier: item.tier || 0, baseName: item.name || '' };
    const nm = c.recipeName || c.name || (c.recipeId ? 'Recipe #'+c.recipeId : 'Unknown craft');
    return { name: nm, tier: 0, baseName: nm };
  };

  // Build location -> craftGroup structure
  const buildSection = (crafts, mode) => {
    const byLoc = {};
    crafts.forEach(c => {
      const locKey = c.claimName || c.claimEntityId || 'Unknown Location';
      if (!byLoc[locKey]) byLoc[locKey] = { name: c.claimName || 'Unknown Location', regionId: c.regionId||null, regionName: c.regionName||null, total: 0, groups: {} };
      const loc = byLoc[locKey];
      loc.total++;
      const ci = craftName(c);
      const gkey = ci.name;
      if (!loc.groups[gkey]) loc.groups[gkey] = { name: ci.name, baseName: ci.baseName, tier: ci.tier, count: 0, buildings: {}, completions: [] };
      const g = loc.groups[gkey];
      g.count++;
      const bn = c.buildingName || 'Unknown Building';
      g.buildings[bn] = (g.buildings[bn]||0) + 1;
      if (mode === 'processing') g.completions.push(passiveCompletionTs(c));
    });
    return byLoc;
  };

  const renderLocCard = (loc, mode) => {
    const groups = Object.values(loc.groups).sort((a,b) => b.count - a.count);
    const rows = groups.map(g => {
      const bNames = Object.keys(g.buildings);
      const bLabel = bNames.length === 1 ? bNames[0] : `${bNames[0]} ×${bNames.length}`;
      const tierBadge = g.tier > 0 ? `<span class="badge badge-tier" style="margin-left:.4rem">T${g.tier}</span>` : '';
      let rightEl;
      if (mode === 'processing') {
        const comps = g.completions.filter(x => x > 0);
        const soonest = comps.length ? Math.min(...comps) : 0;
        const now = Math.floor(Date.now()/1000);
        const secsLeft = soonest ? Math.max(0, soonest - now) : 0;
        const known = soonest > 0;
        const timeText = !known ? 'Processing' : (secsLeft <= 0 ? 'Processing' : fmtTimeLeft(secsLeft));
        const color = secsLeft < 300 ? 'var(--green-light)' : 'var(--amber-light)';
        rightEl = `<div style="display:flex;align-items:center;gap:.5rem;flex-shrink:0">
          <span style="display:inline-flex;align-items:center;gap:.3rem;font-size:12px;font-weight:500;color:${color}">
            <i class="ti ti-clock" style="font-size:13px"></i>
            <span data-pts="${soonest}" data-processing="1">${timeText}</span>
          </span>
          <span class="badge badge-tier" style="font-size:11px">×${g.count}</span>
        </div>`;
      } else {
        rightEl = `<div style="display:flex;align-items:center;gap:.5rem;flex-shrink:0">
          <i class="ti ti-circle-check" style="color:var(--green-light);font-size:16px"></i>
          <span class="badge badge-tier" style="font-size:11px">×${g.count}</span>
        </div>`;
      }
      return `<div class="craft-card">
        <div class="craft-card-body">
          <div class="craft-card-name">${escHtml(g.name)}${tierBadge}</div>
          <div class="craft-card-meta"><i class="ti ti-building-factory" style="font-size:11px;margin-right:.25rem"></i>${escHtml(bLabel)}</div>
        </div>
        ${rightEl}
      </div>`;
    }).join('');
    const regionSub = loc.regionName ? `<div style="font-size:11px;color:var(--text3);font-weight:400;margin-top:1px">${escHtml(loc.regionName)}${loc.regionId?` · R${loc.regionId}`:''}</div>` : '';
    return `<div class="craft-location-card">
      <div class="craft-location-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
        <div class="craft-location-name" style="flex-direction:column;align-items:flex-start;gap:0">
          <span><i class="ti ti-map-pin"></i>${escHtml(loc.name)}</span>
          ${regionSub}
        </div>
        <div class="craft-location-meta">
          <span class="badge badge-tier" style="font-size:11px">${loc.total}</span>
          <i class="ti ti-chevron-down" style="font-size:14px;color:var(--text3)"></i>
        </div>
      </div>
      <div>${rows}</div>
    </div>`;
  };

  const sectionHtml = (label, icon, color, byLoc, total, mode) => {
    if (!total) return '';
    const cards = Object.values(byLoc).sort((a,b)=>b.total-a.total).map(loc => renderLocCard(loc, mode)).join('');
    return `<div style="display:flex;align-items:center;gap:.5rem;margin:1rem 0 .6rem;padding:.5rem .85rem;background:${color.bg};border:1px solid ${color.border};border-radius:8px">
        <i class="ti ${icon}" style="color:${color.fg};font-size:15px"></i>
        <span style="font-weight:600;font-size:13px;color:${color.fg}">${label}</span>
        <span style="flex:1"></span>
        <span class="badge badge-tier" style="font-size:11px">${total}</span>
      </div>
      ${cards}`;
  };

  const procByLoc = buildSection(processing, 'processing');
  const readyByLoc = buildSection(ready, 'ready');

  return sectionHtml('In Progress', 'ti-hourglass-high', {bg:'var(--bg2)', border:'var(--border2)', fg:'var(--text)'}, procByLoc, processing.length, 'processing')
       + sectionHtml('Ready to Claim', 'ti-circle-check', {bg:'rgba(99,153,34,.08)', border:'rgba(99,153,34,.25)', fg:'var(--green-light)'}, readyByLoc, ready.length, 'ready');
}

// ── TASKS ──
async function loadTasks(id, silent=false) {
  const el = document.getElementById('tasks-content');
  if (!el) return;
  let travTasks=[], itemMetaMap={}, expires=null;
  if (id) {
    if (!silent) el.innerHTML = loading();
    try {
      // Fetch tasks; simultaneously ensure full inventory is loaded
      // (loadPlannerInventory is a no-op if invData already populated)
      const [taskData] = await Promise.all([
        apiFetch(`/api/players/${id}/traveler-tasks`),
        loadPlannerInventory()   // sets global invData with personal + housing
      ]);
      travTasks  = taskData.tasks || [];
      itemMetaMap = {...(taskData.items||{}), ...(taskData.cargo||{})};
      expires    = taskData.expirationTimestamp;

      // Restore tracked inventories from localStorage (once per player load)
      if (!tasksInvsInited && invData) {
        tasksInvsInited = true;
        const saved = _loadTasksTrackedNames();
        if (saved === 'all') {
          tasksTrackedInvs = null; // null = track all
        } else if (saved !== null) {
          tasksTrackedInvs = _resolveTrackedByName(invData.inventories || [], saved);
        }
        // If no saved data, keep the default empty Set (none selected)
      }
    } catch(e) {}
  }
  lastTaskData = {travTasks, itemMetaMap, expires};
  renderTasksUI(travTasks, itemMetaMap, expires);
}


function toggleTaskTrackedInv(idx) {
  if (!invData) return;
  if (tasksTrackedInvs === null) {
    // null means "all" — convert to explicit set minus this one
    const total = (invData.inventories||[]).length;
    tasksTrackedInvs = new Set([...Array(total).keys()]);
    tasksTrackedInvs.delete(idx);
  } else {
    if (tasksTrackedInvs.has(idx)) tasksTrackedInvs.delete(idx);
    else tasksTrackedInvs.add(idx);
  }
  _saveTasksTrackedNames();
  if (lastTaskData) renderTasksUI(lastTaskData.travTasks, lastTaskData.itemMetaMap, lastTaskData.expires);
}
function toggleAllTaskInvs(state) {
  tasksTrackedInvs = state ? null : new Set();
  _saveTasksTrackedNames();
  if (lastTaskData) renderTasksUI(lastTaskData.travTasks, lastTaskData.itemMetaMap, lastTaskData.expires);
}
function toggleTaskInvPanel() {
  taskInvOpen = !taskInvOpen;
  const body = document.querySelector('.task-inv-selector .planner-inv-body');
  if (body) body.style.display = taskInvOpen ? '' : 'none';
  const chevron = document.getElementById('task-inv-chevron');
  if (chevron) chevron.className = `ti ti-chevron-${taskInvOpen ? 'down' : 'right'}`;
}

function skillIcon(skill) {

  if (s.includes('wood') && !s.includes('work')) return 'ti-trees';
  if (s.includes('carpent') || s.includes('woodwork')) return 'ti-ruler-2';
  if (s.includes('mining') || s.includes('mine')) return 'ti-pick';
  if (s.includes('quarry') || s.includes('excavat')) return 'ti-pick';
  if (s.includes('cook') || s.includes('chef') || s.includes('bak')) return 'ti-soup';
  if (s.includes('farm') || s.includes('harvest') || s.includes('agri')) return 'ti-plant';
  if (s.includes('herd') || s.includes('ranch') || s.includes('animal')) return 'ti-paw';
  if (s.includes('build') || s.includes('construct') || s.includes('architect')) return 'ti-building';
  if (s.includes('blacksmith') || s.includes('smith')) return 'ti-hammer';
  if (s.includes('forge') || s.includes('foundry') || s.includes('metal')) return 'ti-flame';
  if (s.includes('fish')) return 'ti-fish';
  if (s.includes('hunt') || s.includes('ranger')) return 'ti-bow-arrow';
  if (s.includes('combat') || s.includes('fight') || s.includes('warrior') || s.includes('battle')) return 'ti-sword';
  if (s.includes('gather') || s.includes('forage')) return 'ti-basket';
  if (s.includes('herb') || s.includes('alchemi') || s.includes('brew')) return 'ti-leaf';
  if (s.includes('stone') || s.includes('mason')) return 'ti-wall';
  if (s.includes('tailoring') || s.includes('weaving') || s.includes('textile')) return 'ti-scissors';
  if (s.includes('leather') || s.includes('tanning')) return 'ti-scissors';
  if (s.includes('jewel') || s.includes('gem') || s.includes('lapidary')) return 'ti-diamond';
  if (s.includes('schol') || s.includes('research') || s.includes('lore')) return 'ti-book';
  if (s.includes('trade') || s.includes('merchant') || s.includes('commerce')) return 'ti-coins';
  if (s.includes('survey') || s.includes('cartograph') || s.includes('explor')) return 'ti-map';
  if (s.includes('travell') || s.includes('traveler')) return 'ti-route';
  if (s.includes('craft')) return 'ti-tools';
  return 'ti-tool';

function craftIcon(name) {
  const s = (name||'').toLowerCase();
  if (s.includes('sword') || s.includes('blade') || s.includes('dagger') || s.includes('lance') || s.includes('spear')) return 'ti-sword';
  if (s.includes('axe') || s.includes('hatchet')) return 'ti-axe';
  if (s.includes('bow') || s.includes('arrow') || s.includes('quiver')) return 'ti-bow-arrow';

  if (s.includes('helm') || s.includes('helmet') || s.includes('hood') || s.includes('hat') || s.includes('cap')) return 'ti-hard-hat';
  if (s.includes('chestplate') || s.includes('breastplate') || s.includes('armor') || s.includes('armour') || s.includes('tunic') || s.includes('robe') || s.includes('coat')) return 'ti-shield-half';
  if (s.includes('boot') || s.includes('shoe') || s.includes('greave') || s.includes('legging') || s.includes('trouser') || s.includes('pant')) return 'ti-boot-2';
  if (s.includes('glove') || s.includes('gauntlet') || s.includes('handwrap') || s.includes('bracer')) return 'ti-glove';
  if (s.includes('ring') || s.includes('necklace') || s.includes('amulet') || s.includes('pendant')) return 'ti-diamond';
  if (s.includes('ingot') || s.includes('bar') || s.includes('iron') || s.includes('steel') || s.includes('copper') || s.includes('gold') || s.includes('silver') || s.includes('luminite') || s.includes('ore')) return 'ti-hammer';
  if (s.includes('plank') || s.includes('lumber') || s.includes('log') || s.includes('wood')) return 'ti-trees';
  if (s.includes('stone') || s.includes('brick') || s.includes('block') || s.includes('rock')) return 'ti-wall';
  if (s.includes('thread') || s.includes('spool') || s.includes('yarn') || s.includes('fibre') || s.includes('fiber') || s.includes('cloth') || s.includes('fabric') || s.includes('textile') || s.includes('wool')) return 'ti-needle-thread';
  if (s.includes('leather') || s.includes('hide') || s.includes('fur') || s.includes('pelt') || s.includes('skin')) return 'ti-paw';
  if (s.includes('potion') || s.includes('elixir') || s.includes('tonic') || s.includes('brew') || s.includes('flask') || s.includes('vial')) return 'ti-flask';
  if (s.includes('food') || s.includes('meal') || s.includes('stew') || s.includes('soup') || s.includes('bread') || s.includes('pie') || s.includes('cooked') || s.includes('roast') || s.includes('fish') || s.includes('meat')) return 'ti-soup';
  if (s.includes('herb') || s.includes('plant') || s.includes('flower') || s.includes('mushroom') || s.includes('root')) return 'ti-leaf';
  if (s.includes('rope') || s.includes('string') || s.includes('cord') || s.includes('twine')) return 'ti-line';
  if (s.includes('tool') || s.includes('pickaxe') || s.includes('shovel') || s.includes('chisel')) return 'ti-tools';
  if (s.includes('furniture') || s.includes('table') || s.includes('chair') || s.includes('chest') || s.includes('cabinet') || s.includes('shelf')) return 'ti-armchair';
  if (s.includes('bag') || s.includes('pack') || s.includes('pouch') || s.includes('sack')) return 'ti-backpack';
  if (s.includes('scroll') || s.includes('book') || s.includes('tome') || s.includes('manual')) return 'ti-book';
  if (s.includes('gem') || s.includes('crystal') || s.includes('jewel')) return 'ti-diamond';
  return 'ti-hammer';
}

function renderTasksUI(travTasks, itemMetaMap, expires) {
  const el = document.getElementById('tasks-content');
  if (!el) return;

  // Debug: open DevTools console and type `_taskRaw` to inspect the raw task structure
  if (travTasks.length > 0) window._taskRaw = travTasks[0];

  // ── Build inventoryMap from tracked invData ──
  const inventoryMap = {};
  if (invData) {
    const {inventories=[]} = invData;
    inventories.forEach((inv, idx) => {
      if (tasksTrackedInvs !== null && !tasksTrackedInvs.has(idx)) return;
      (inv.pockets||[]).forEach(slot => {
        const s = slotContents(slot);
        if (!s) return;
        const key = s.itemType + ':' + s.itemId;
        inventoryMap[key] = (inventoryMap[key]||0) + s.quantity;
      });
    });
  }

  // ── Build inventory selector UI ──
  function renderTaskInvSelector() {
    if (!invData) return '';
    const invs = invData.inventories || [];
    if (!invs.length) return '';
    const total = invs.length;
    const tracked = tasksTrackedInvs === null ? total : tasksTrackedInvs.size;

    const cats = {personal:[], house:[], bank:[]};
    invs.forEach((inv, idx) => {
      if (inv._isHousing) cats.house.push({inv, idx});
      else if (inv.claimName) cats.bank.push({inv, idx});
      else cats.personal.push({inv, idx});
    });

    const isOn = idx => tasksTrackedInvs === null || tasksTrackedInvs.has(idx);

    const chip = ({inv, idx}) => {
      const label = inv.inventoryName || inv.buildingName || 'Unknown';
      // Only show claim name for bank/storage, not for housing
      const claim = (!inv._isHousing && inv.claimName) ? inv.claimName : '';
      const on    = isOn(idx);
      return `<span class="planner-inv-loc${on?' active':''}" onclick="toggleTaskTrackedInv(${idx})">
        <i class="ti ti-${on?'checkbox':'square'}" style="font-size:13px"></i>
        ${escHtml(label)}${claim?`<span class="inv-loc-claim">${escHtml(claim)}</span>`:''}
      </span>`;
    };
    const renderCat = (title, icon, entries) => !entries.length ? '' : `
      <div style="margin-bottom:.3rem">
        <div class="planner-inv-cat-hdr"><i class="ti ${icon}"></i>${title}</div>
        <div class="planner-inv-chips">${entries.map(chip).join('')}</div>
      </div>`;

    return `<div class="task-inv-selector planner-inv-section">
      <div class="planner-inv-hdr" onclick="toggleTaskInvPanel()">
        <i id="task-inv-chevron" class="ti ti-chevron-${taskInvOpen ? 'down' : 'right'}" style="color:var(--text3);font-size:14px;flex-shrink:0"></i>
        <div class="planner-inv-hdr-title"><i class="ti ti-backpack" style="color:var(--text3);font-size:14px"></i> Inventory <span style="font-size:11px;font-weight:400;color:var(--text3)">(optional)</span></div>
        <span class="planner-inv-hdr-sub">${tracked}/${total} tracked</span>
      </div>
      <div class="planner-inv-body" style="display:${taskInvOpen ? '' : 'none'}">
        <div class="planner-inv-cats">
          ${renderCat('Personal', 'ti-user', cats.personal)}
          ${renderCat('House', 'ti-home', cats.house)}
          ${renderCat('Town Banks', 'ti-building-bank', cats.bank)}
        </div>
        <div class="planner-inv-footer">
          <span>${tracked}/${total} tracked</span>
          <span class="planner-inv-toggle" onclick="toggleAllTaskInvs(true)">All</span>
          <span style="color:var(--text3)">·</span>
          <span class="planner-inv-toggle" onclick="toggleAllTaskInvs(false)">None</span>
        </div>
      </div>
    </div>`;
  }

  if (countdownInterval) clearInterval(countdownInterval);
  function getCountdown() {
    if (!expires) return '—';
    const now = Math.floor(Date.now()/1000);
    const diff = expires - now;
    if (diff <= 0) return 'Expired';
    const h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  // ── Task completion helpers ──

  // Normalize item_type to a consistent lookup key (handle string "cargo"/"item" vs numeric 0/1)
  function invKey(type, id) {
    const t = (type === 'cargo' || type === 'CARGO' || type === '1') ? 1
            : (type === 'item'  || type === 'ITEM'  || type === '0') ? 0
            : type;
    return t + ':' + id;
  }
  // Get how many of a required item the player has (with quantity_fulfilled fallback)
  function haveCount(ri) {
    if (ri.quantity_fulfilled  !== undefined) return ri.quantity_fulfilled  || 0;
    if (ri.fulfilledQuantity   !== undefined) return ri.fulfilledQuantity   || 0;
    return inventoryMap[invKey(ri.item_type, ri.item_id)]
        || inventoryMap[ri.item_type + ':' + ri.item_id]
        || 0;
  }
  // Check API-level completion (any of several possible field names)
  function isApiDone(t) {
    const status = String(t.status || t.taskStatus || t.state || t.claimState || '').toLowerCase();
    if (['completed','done','turned_in','accepted','claimed','finished','submitted','rewarded'].includes(status)) return true;
    if (t.isCompleted || t.completed || t.turnedIn || t.isDone) return true;
    if (t.completedAt != null || t.acceptedAt != null) return true;
    return false;
  }
  function taskItemCard(ri) {
    const meta   = itemMetaMap[ri.item_id] || itemMetaMap[String(ri.item_id)];
    const name   = itemLabel(meta, ri.item_id, ri.item_type);
    const needed = ri.quantity || 1;
    const have   = haveCount(ri);
    const met     = have >= needed;
    const partial = !met && have > 0;
    const statusColor = met ? 'var(--green-light)' : partial ? 'var(--amber-light)' : 'var(--text3)';
    const statusIcon  = met ? 'ti-circle-check'    : partial ? 'ti-circle-half-2'   : 'ti-circle';
    return `<div style="display:flex;align-items:center;gap:.4rem;padding:.28rem 0;border-bottom:1px solid var(--border)">
      <i class="ti ${statusIcon}" style="color:${statusColor};font-size:13px;flex-shrink:0"></i>
      <span style="font-size:12px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(name)}">${escHtml(name)}</span>
      <span style="font-size:12px;font-weight:600;color:${statusColor};flex-shrink:0;white-space:nowrap;background:rgba(0,0,0,.22);padding:1px 6px;border-radius:4px">${fmtNum(have)}/${fmtNum(needed)}</span>
    </div>`;
  }

  function extractTraderName(t) {
    if (t.npcName) return t.npcName;
    if (t.traderName) return t.traderName;
    const desc = t.taskName || t.description || '';
    const first = desc.trim().split(/\s+/)[0];
    return first ? cap(first.toLowerCase()) : 'Traveler';
  }

  const byTrader = {};
  travTasks.forEach(t => {
    const key = extractTraderName(t);
    if (!byTrader[key]) byTrader[key] = [];
    byTrader[key].push(t);
  });

  const npcBlocks = Object.entries(byTrader).map(([traderName, tasks]) => {
    const skillName = tasks[0]?.skillName || tasks[0]?.category || '';

    // Only trust the API — having enough items does NOT mean the task is handed in
    const taskStatuses = tasks.map((t) => isApiDone(t));
    const allComplete = taskStatuses.every(Boolean);
    const doneCount = taskStatuses.filter(Boolean).length;

    const taskCols = `<div style="display:flex;gap:.6rem;padding:.65rem .9rem;flex-wrap:wrap;border-top:1px solid var(--border)">
      ${tasks.map((t, ti) => {
        const items        = t.requiredItems || [];
        const taskComplete = taskStatuses[ti];
        // Use short task name only — t.description is flavor text ("Alesi needs food...")
        const taskTitle    = t.taskName || t.title || t.shortDescription || t.shortName || '';
        const bg     = taskComplete ? 'rgba(99,153,34,.07)' : 'var(--bg3)';
        const border = taskComplete ? '1px solid rgba(99,153,34,.25)' : '1px solid var(--border)';
        return `<div style="flex:1;min-width:160px;background:${bg};border:${border};border-radius:6px;padding:.45rem .55rem">
          ${taskComplete
            ? `${taskTitle ? `<div style="font-size:12px;color:var(--text2);margin-bottom:.3rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%" title="${escHtml(taskTitle)}">${escHtml(taskTitle)}</div>` : ''}
               <div style="font-size:10px;font-weight:600;color:var(--green-light);display:flex;align-items:center;gap:3px"><i class="ti ti-circle-check"></i> Complete</div>`
            : (items.length ? items.map(ri => taskItemCard(ri)).join('') : '<div style="font-size:11px;color:var(--text3);padding:.1rem 0">No items required</div>')
          }
        </div>`;
      }).join('')}
    </div>`;

    return `<div class="task-npc-block">
      <div class="task-npc-header">
        <div style="display:flex;align-items:center;gap:.75rem">
          <div>
            <div class="task-npc-name">${escHtml(traderName)}</div>
            <div class="task-npc-skill">${tasks.length} task${tasks.length!==1?'s':''} · ${escHtml(skillName)}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          ${allComplete
            ? '<span style="font-size:11px;font-weight:600;color:var(--green-light);background:rgba(99,153,34,.15);padding:3px 9px;border-radius:10px;display:flex;align-items:center;gap:4px"><i class="ti ti-circle-check"></i> All done</span>'
            : doneCount > 0 ? `<span style="font-size:11px;color:var(--amber-light);background:rgba(186,117,23,.12);padding:3px 9px;border-radius:10px">${doneCount}/${tasks.length} done</span>` : ''}
          <i class="ti ti-chevron-down" style="color:var(--text3);font-size:14px"></i>
        </div>
      </div>
      ${allComplete ? `<div style="display:flex;align-items:center;gap:.5rem;padding:.55rem 1rem;background:rgba(99,153,34,.08);border-top:1px solid rgba(99,153,34,.2);font-size:12px;font-weight:500;color:var(--green-light)"><i class="ti ti-circle-check"></i> All ${tasks.length} task${tasks.length!==1?'s':''} complete — ready to turn in</div>` : ''}
      ${taskCols}
    </div>`;
  }).join('');

  const invSelectorHtml = currentPlayer ? renderTaskInvSelector() : '';

  el.innerHTML = `
    <div class="tasks-toolbar">
      ${expires
        ? `<div class="task-rotation" style="margin-bottom:0;flex:1"><i class="ti ti-clock"></i> Next rotation in <span class="task-countdown" id="task-countdown">${getCountdown()}</span></div>`
        : '<div style="flex:1"></div>'}
      ${currentPlayer ? `
        <button id="live-btn-tasks" class="btn live-btn" onclick="toggleTabLive('tasks')"><i class="ti ti-player-play"></i> Live</button>
        <button class="btn ctrl-btn" onclick="loadTasks(currentPlayer?.entityId)"><i class="ti ti-refresh"></i> Refresh</button>
      ` : ''}
    </div>
    ${invSelectorHtml}
    ${!currentPlayer?'<div class="empty"><i class="ti ti-user-search"></i><span>Select a player first</span></div>':npcBlocks||'<div class="empty"><i class="ti ti-mood-empty"></i><span>No traveler tasks</span></div>'}`;

  if (expires) {
    countdownInterval = setInterval(() => {
      const el = document.getElementById('task-countdown');
      if (el) el.textContent = getCountdown();
    }, 1000);
  }
  updateLiveBtns();
}

// background=true → keep the currently-displayed results on screen and only swap in fresh data when
// the refresh completes (no spinner, no blank). background=false → this is a deliberate (re)load
// (first visit or filter change), so show the loading indicator.
async function loadAllMarketItems(background) {
  if (marketLoading) return;
  marketLoading = true;
  const haveData = marketRawItems.length > 0;
  const resEl = () => document.getElementById('market-results');
  if (!background) { marketItemDetailCache = {}; const e = resEl(); if (e) e.innerHTML = loading(); }
  try {
    const allItems = await fetchMarketList();
    if (marketSelectedRegion && marketOrderFilter !== 'all') {
      // The list API ignores regionId — we must verify each item's detail orders individually.
      await verifyMarketRegion(allItems, background);
    } else {
      marketRawItems = allItems;
      marketLoadedAt = Date.now();
      saveMarketCache();
      renderMarketResults();
    }
  } catch(e) {
    const e2 = resEl();
    if (e2 && !haveData) e2.innerHTML = errBox(e);  // keep old results visible if a refresh fails
  } finally {
    marketLoading = false;
  }
}

// Region-scoped verification. Builds the result set in a *local* array and only commits it to
// marketRawItems at the very end, so a background refresh leaves the old list on screen until done.
async function verifyMarketRegion(items, background) {
  const el = () => document.getElementById('market-results');
  const rn = escHtml((marketRegions.find(r=>(r.id||r.regionId||r.entityId)==marketSelectedRegion)||{}).regionName || ('Region '+marketSelectedRegion));
  const initialTotal = items.length;
  const verified = [];
  const detailCache = {};
  const queue = [...items];
  let checked = 0;
  const failed = [];

  const processResult = r => {
    if (!r) return;
    const orders = marketOrderFilter === 'buy' ? (r.detail.buyOrders||[]) : (r.detail.sellOrders||[]);
    if (orders.some(o => String(o.regionId) === String(marketSelectedRegion))) {
      verified.push(r.item);
      detailCache[r.item.id||r.item.itemId] = r.detail;
    }
  };

  while (queue.length > 0) {
    if (!background) { const e = el(); if (e) e.innerHTML = `<div class="loading"><span class="dot-spin"></span> Checking ${rn} orders&hellip; <span style="color:var(--teal-light);font-weight:500">${verified.length} found</span> &nbsp;·&nbsp; ${checked}/${initialTotal} checked</div>`; }

    const batch = queue.splice(0, 30);
    let hadNetwork = false;
    const results = await Promise.all(batch.map(it => {
      const isCargo = it.type === 'cargo' || it.isCargo || it.itemType === 1;
      const t = isCargo ? 'cargo' : 'item';
      const id = it.id || it.itemId;
      if (!isCached(t, id)) hadNetwork = true;
      return fetchWithCache(t, id)
        .then(det => ({ item: it, detail: det }))
        .catch(() => { failed.push(it); return null; });
    }));
    results.forEach(processResult);
    checked += batch.length;
    if (hadNetwork && queue.length > 0) await new Promise(res => setTimeout(res, 150));
  }

  // Retry failed items one at a time with longer delay
  for (const it of failed) {
    await new Promise(res => setTimeout(res, 500));
    const isCargo = it.type === 'cargo' || it.isCargo || it.itemType === 1;
    const t = isCargo ? 'cargo' : 'item';
    const id = it.id || it.itemId;
    const r = await fetchWithCache(t, id).then(det => ({ item: it, detail: det })).catch(() => null);
    processResult(r);
  }

  marketRawItems = verified;
  marketItemDetailCache = detailCache;
  marketLoadedAt = Date.now();
  saveMarketCache();
  renderMarketResults();
}

async function loadMarketRegions() {
  try {
    const d = await apiFetch('/api/regions');
    const regions = Array.isArray(d) ? d : (d.regions||[]);
    if (!regions.length) return;
    marketRegions = regions;
    const sel = document.getElementById('market-region-select');
    if (!sel) return;
    sel.innerHTML = regionOptionsHtml(marketSelectedRegion);
  } catch(e) { /* region filter unavailable */ }
}

            <option value="travel"${dealsSortMode==='travel'?' selected':''}>Profit / travel</option>
          </select>
        </div>
        <div style="position:relative;flex:1;min-width:120px">
          <i class="ti ti-search" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none"></i>
          <input type="text" id="deals-search" value="${escHtml(dealsNameFilter)}" placeholder="Filter by item name…"
            style="width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:6px 10px 6px 28px;font-size:12px;outline:none"

        </button>
        <button class="btn" onclick="const n=clearMarketCache();alert(n+' cached items cleared. Next scan will re-fetch live data.')" title="Force next scan to fetch fresh data from the server">
          <i class="ti ti-refresh"></i> Clear cache
        </button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.75rem">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:.35rem;display:flex;align-items:center;gap:.3rem">
            <i class="ti ti-map-pin" style="color:#f09595"></i> Buy from settlement

            onsearch="dealsBuyFrom=this.value.toLowerCase().trim();renderDealResults()">
          <datalist id="deals-buyfrom-list"></datalist>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:.35rem;display:flex;align-items:center;gap:.3rem">
            <i class="ti ti-map-pin" style="color:var(--green-light)"></i> Sell to settlement
          </div>
          <input type="search" id="deals-sellto" value="${escHtml(dealsSellTo)}" placeholder="Any settlement…" list="deals-sellto-list"
            style="width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:6px 10px;font-size:12px;outline:none"
            oninput="dealsSellTo=this.value.toLowerCase().trim();renderDealResults()"
            onsearch="dealsSellTo=this.value.toLowerCase().trim();renderDealResults()">
          <datalist id="deals-sellto-list"></datalist>
        </div>
      </div>
    </div>
    <div id="deals-results">
      ${(dealsScanning && !dealsData.length) ? dealsScanProgressHtml() : (dealsData.length ? '' : '<div class="empty"><i class="ti ti-trending-up" style="font-size:2.5rem;opacity:.25;margin-bottom:.5rem"></i><span>Click "Scan for deals" to find arbitrage opportunities</span><span style="font-size:11px;margin-top:.25rem">Scans all market items for profitable buy/sell price differences</span></div>')}
    </div>`;

  // Populate region dropdown now or after fetch
  const fillRegions = () => {
    const sel = document.getElementById('deals-region-select');
    if (!sel) return;
    sel.innerHTML = regionOptionsHtml(dealsRegionFilter);
  };
  if (marketRegions.length) { fillRegions(); }
  else {
    apiFetch('/api/regions').then(d => {
      const regions = Array.isArray(d) ? d : (d.regions||[]);
      if (regions.length) { marketRegions = regions; fillRegions(); }
    }).catch(()=>{});
  }

  // Show whatever results we already have (memory, or the localStorage cache after a reload) right
  // away — even while a background refresh is running — so the tab is never blank on return.
  if (!dealsData.length) loadDealsCache();
  if (dealsData.length) renderDealResults();
  loadServerDeals(); // prefer the backend precompute; silently falls back to the client scan
}

// ── Server-side deal precompute (Tier 1 backend) ─────────────────────────────────
// When the backend is running it scans the market on a timer and serves finished routes from /deals,
// so the browser just downloads them instead of scanning ~2400 items itself. Everything below falls
// back to the in-browser scan (startDealScan) when the endpoint isn't reachable.
function dealsSetServerBtn(scanning, scanned, total){
  const b = document.getElementById('deals-scan-btn'); if (!b) return;
  if (scanning){ b.disabled = true; b.innerHTML = `<i class="ti ti-loader-2" style="animation:spin 1s linear infinite;display:inline-block"></i> Refreshing…${total?` ${scanned||0}/${total}`:''}`; }
  else { b.disabled = false; b.innerHTML = '<i class="ti ti-refresh"></i> Refresh deals'; }
}
function dealsServerScanningMsg(scanned, total){
  const e = document.getElementById('deals-results'); if (!e) return;
  e.innerHTML = `<div class="loading"><span class="dot-spin"></span> Server is scanning the market&hellip; <span style="color:var(--text2)">${scanned||0}/${total||0}</span> &nbsp;·&nbsp; <span style="color:var(--text3);font-size:11px">precomputed on the server — instant next time</span></div>`;
}
async function loadServerDeals(){
  try {
    const r = await fetch(`${API}/deals`);
    if (!r.ok) { dealsServerOk = false; return false; }
    const j = await r.json();
    if (!j || !Array.isArray(j.deals)) { dealsServerOk = false; return false; }
    dealsServerOk = true;
    if (j.deals.length){ dealsData = j.deals; dealsScannedAt = j.ts || Date.now(); saveDealsCache(); renderDealResults(); }
    else if (j.computing && !dealsData.length) dealsServerScanningMsg(j.scanned, j.total);
    dealsSetServerBtn(!!j.computing, j.scanned, j.total);
    if (j.computing){ dealsServerScanning = true; pollServerDeals(); }
    return true;
  } catch(e){ dealsServerOk = false; return false; }
}
function pollServerDeals(){
  clearTimeout(dealsServerPollTimer);
  dealsServerPollTimer = setTimeout(async () => {
    try {
      const r = await fetch(`${API}/deals`); const j = await r.json();
      if (j && Array.isArray(j.deals)){
        if (j.deals.length){ dealsData = j.deals; dealsScannedAt = j.ts || Date.now(); saveDealsCache(); renderDealResults(); }
        else if (j.computing && !dealsData.length) dealsServerScanningMsg(j.scanned, j.total);
        dealsSetServerBtn(!!j.computing, j.scanned, j.total);
        if (j.computing){ pollServerDeals(); return; }
      }
    } catch(e){ /* stop polling on error */ }
    dealsServerScanning = false;
    dealsSetServerBtn(false);
  }, 2500);
}
async function refreshServerDeals(){
  try {
    const r = await fetch(`${API}/deals/refresh`); if (!r.ok) return false;
    dealsServerOk = true; dealsServerScanning = true;
    dealsSetServerBtn(true, 0, 0);
    pollServerDeals();
    return true;
  } catch(e){ return false; }
}

async function startDealScan() {
  if (dealsScanning || dealsServerScanning) return;
  // Prefer the backend precompute; only fall back to the in-browser scan if it isn't reachable.
  if (dealsServerOk !== false){
    if (await refreshServerDeals()) return;
    dealsServerOk = false;
  }
  dealsScanning = true;
  // If we already have results, this is a background refresh: keep the old results on screen and
  // only swap them out when the fresh scan finishes. Otherwise it's a first scan (show progress).
  const bg = dealsData.length > 0;
  dealsRoutesFound = 0;
  const found = [];

  const refreshLabel = `<i class="ti ti-loader-2" style="animation:spin 1s linear infinite;display:inline-block"></i> ${bg ? 'Refreshing…' : 'Scanning…'}`;
  const setBtn = () => { const b = document.getElementById('deals-scan-btn'); if (b){ b.disabled = true; b.innerHTML = refreshLabel; } };
  setBtn();
  const p = o => +(o.price||o.priceThreshold||0);

  // Per-item: find cheapest sell per settlement + best buy per settlement,
  // then store every profitable (sell-settlement → buy-settlement) route.
  const processItem = (item, detail) => {
    const sells = detail.sellOrders||[];
    const buys  = detail.buyOrders||[];
    if (!sells.length || !buys.length) return;

    // Best sell (lowest price) per settlement
    const cheapestSell = {};
    sells.forEach(o => {
      const s = o.claimName||o.settlementName||'__?__';
      if (!cheapestSell[s] || p(o) < p(cheapestSell[s])) cheapestSell[s] = o;
    });
    // Best buy (highest price) per settlement
    const bestBuy = {};
    buys.forEach(o => {
      const s = o.claimName||o.settlementName||'__?__';
      if (!bestBuy[s] || p(o) > p(bestBuy[s])) bestBuy[s] = o;
    });

    // Every profitable (sell-settlement, buy-settlement) pair
    for (const sellOrder of Object.values(cheapestSell)) {
      for (const buyOrder of Object.values(bestBuy)) {
        const sellPrice = p(sellOrder), buyPrice = p(buyOrder);
        if (buyPrice > sellPrice && sellPrice > 0) {
          const profitPerUnit = buyPrice - sellPrice;
          const maxUnits  = Math.min(+(sellOrder.quantity||0), +(buyOrder.quantity||0));
          found.push({ item, sellOrder, buyOrder, profitPerUnit, maxUnits, maxProfit: profitPerUnit * maxUnits });
        }
      }
    }
  };

  try {
    const d = await apiFetch('/api/market?hasOrders=true&hasBuyOrders=true');
    const allItems = (d.data&&d.data.items) ? d.data.items : (d.items||[]);
    const total = allItems.length;
    let checked = 0;
    const failed = [];
    const queue = [...allItems];

    // ── Adaptive concurrent scan ──
    // Many concurrent workers pull from a shared queue. A global token (nextSlot) spaces out
    // network request *starts* so the rate is controlled regardless of concurrency. The interval
    // adapts: it grows when the server returns 429 and slowly recovers when things are smooth.
    // Cached items skip the network (and the rate limiter) entirely, so warm scans are near-instant.
    // AIMD throttle: speed up gradually, slow down on 429, with a coordinated global cooldown so a
    // burst of 429s triggers a single breather (letting the server's token bucket refill) instead of
    // every worker independently retry-sleeping (which collapses throughput).
    const CONCURRENCY = 10;
    let minInterval = 40;            // ms between network request starts (~25 req/s; exploits the burst allowance)
    const MIN_FLOOR = 35, MAX_CAP = 300;
    let nextSlot = 0;                // earliest timestamp the next request may start
    let cooldownUntil = 0;          // global pause window after a 429 storm
    let last429 = mkt429Count;
    let lastUi = 0;

    const updateUI = (force) => {
      dealsChecked = checked; dealsTotal = total; dealsRoutesFound = found.length;
      const now = Date.now();
      if (!force && now - lastUi < 200) return;
      lastUi = now;
      if (bg) {
        // Background refresh: leave the existing results untouched; just tick the button counter.
        const b = document.getElementById('deals-scan-btn');
        if (b) b.innerHTML = `<i class="ti ti-loader-2" style="animation:spin 1s linear infinite;display:inline-block"></i> Refreshing… ${checked}/${total}`;
      } else {
        const e = document.getElementById('deals-results'); // re-fetch so it works after a tab re-render
        if (e) e.innerHTML = dealsScanProgressHtml();
      }
    };

    const reserveSlot = async () => {
      let now = Date.now();
      if (cooldownUntil > now) { await new Promise(res => setTimeout(res, cooldownUntil - now)); now = Date.now(); }
      const start = Math.max(now, nextSlot);
      nextSlot = start + minInterval;
      const wait = start - now;
      if (wait > 0) await new Promise(res => setTimeout(res, wait));
    };

    const worker = async () => {
      while (true) {
        const it = queue.shift();
        if (!it) return;
        const isCargo = it.itemType === 1 || it.isCargo || it.type === 'cargo';
        const t = isCargo ? 'cargo' : 'item';
        const id = it.id || it.itemId;
        const cached = isCached(t, id);
        if (!cached) await reserveSlot();
        try {
          const det = await fetchWithCache(t, id);
          processItem(it, det);
        } catch(e) {
          failed.push(it);
        }
        checked++;
        updateUI();
        if (!cached) {
          if (mkt429Count > last429) {
            last429 = mkt429Count;
            minInterval = Math.min(Math.round(minInterval * 1.4) + 20, MAX_CAP); // multiplicative slow-down
            cooldownUntil = Date.now() + 1200;                                    // one coordinated breather
          } else {
            minInterval = Math.max(minInterval - 6, MIN_FLOOR);                   // additive speed-up
          }
        }
      }
    };

    updateUI(true);
    await Promise.all(Array.from({length: CONCURRENCY}, () => worker()));

    // Retry any failures sequentially with gentle pacing (fetchWithCache has its own 429 backoff).
    const stragglers = failed.splice(0);
    for (const it of stragglers) {
      const isCargo = it.itemType === 1 || it.isCargo || it.type === 'cargo';
      const t = isCargo ? 'cargo' : 'item';
      const id = it.id || it.itemId;
      const r = await fetchWithCache(t, id).then(det => ({ item: it, detail: det })).catch(() => null);
      if (r) processItem(r.item, r.detail); // already counted in the main pass
      updateUI();
      await new Promise(res => setTimeout(res, 120));
    }

    dealsData = found;                 // commit the freshly-scanned routes (swaps in atomically)
    dealsScannedAt = Date.now();
    saveDealsCache();
    dealsScanning = false;
    const b = document.getElementById('deals-scan-btn'); if (b){ b.disabled = false; b.innerHTML = '<i class="ti ti-radar"></i> Scan for deals'; }
    renderDealResults();
  } catch(e) {
    dealsScanning = false;
    const b = document.getElementById('deals-scan-btn'); if (b){ b.disabled = false; b.innerHTML = '<i class="ti ti-radar"></i> Scan for deals'; }
    // Keep any previously-displayed results on a failed refresh; only show the error on a first scan.
    if (dealsData.length) renderDealResults();
    else { const e2 = document.getElementById('deals-results'); if (e2) e2.innerHTML = errBox(e); }
  }
}

// ── Profit-per-travel ───────────────────────────────────────────────────────────
// Each market order carries its claim's map coordinates (claimLocationX/Z), so a deal's travel cost
// is just the straight-line distance (in tiles) between the buy claim and the sell claim. No geojson
// lookup needed. Returns null when either claim's coords are missing.
function dealDistance(d){
  const a = d.sellOrder, b = d.buyOrder;
  const ax = +(a&&a.claimLocationX), az = +(a&&a.claimLocationZ);
  const bx = +(b&&b.claimLocationX), bz = +(b&&b.claimLocationZ);
  if (![ax,az,bx,bz].every(Number.isFinite)) return null;
  return Math.hypot(ax-bx, az-bz);
}
// Profit per 1,000 tiles travelled. Same-claim deals (dist 0) need no travel → rank highest (Infinity).
// Unknown distance → null (sorted/displayed last).
function dealProfitPerDist(d){
  const dist = dealDistance(d);
  if (dist == null) return null;
  if (dist === 0) return Infinity;
  return d.maxProfit / (dist / 1000);
}
function dealTravelHtml(d){
  const dist = dealDistance(d);
  if (dist == null) return `<span style="color:var(--text3)"><i class="ti ti-route"></i> distance n/a</span>`;
  if (dist === 0)   return `<span style="color:var(--green-light)"><i class="ti ti-map-pin"></i> same settlement — no travel</span>`;
  const per = dealProfitPerDist(d);
  return `<span><i class="ti ti-route" style="color:var(--teal-light)"></i> ${fmtNum(Math.round(dist))} tiles · ${fmtCoin(Math.round(per))}/1k</span>`;
}

function renderDealResults() {
  const el = document.getElementById('deals-results');
  if (!el) return;
  const q   = (dealsNameFilter||'').toLowerCase().trim();
  const bf  = (dealsBuyFrom||'').toLowerCase().trim();
  const st  = (dealsSellTo||'').toLowerCase().trim();
  const minP = dealsMinProfit || 0;
  const sName = o => (o.claimName||o.settlementName||'').toLowerCase();

  // Each entry is already a pre-computed route (sellOrder → buyOrder).
  // Region filter is applied here at render time — no rescan needed.
  const deals = dealsData
    .filter(d => !q   || (d.item.name||'').toLowerCase().includes(q))
    .filter(d => !bf  || sName(d.sellOrder).includes(bf))
    .filter(d => !st  || sName(d.buyOrder).includes(st))
    .filter(d => !dealsRegionFilter ||
      (String(d.sellOrder.regionId) === String(dealsRegionFilter) &&
       String(d.buyOrder.regionId)  === String(dealsRegionFilter)))
    .filter(d => d.maxProfit >= minP);
  if (dealsSortMode === 'travel') {
    // Sort by profit per travel distance; deals with unknown distance (null) sink to the bottom.
    const ppd = d => { const v = dealProfitPerDist(d); return v == null ? -Infinity : v; };
    deals.sort((a,b) => ppd(b) - ppd(a) || b.maxProfit - a.maxProfit);
  } else {
    deals.sort((a,b) => b.maxProfit - a.maxProfit);
  }

  // Datalists: all unique settlement names from every stored route
  const fillList = (id, names) => {
    const dl = document.getElementById(id);
    if (!dl) return;
    dl.innerHTML = [...new Set(names.filter(Boolean).sort())].map(n => `<option value="${escHtml(n)}">`).join('');
  };
  fillList('deals-buyfrom-list', dealsData.map(d => d.sellOrder.claimName||d.sellOrder.settlementName||''));
  fillList('deals-sellto-list',  dealsData.map(d => d.buyOrder.claimName ||d.buyOrder.settlementName ||''));

  if (!deals.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-mood-empty"></i><span>${dealsData.length ? 'No deals match your filters' : 'No deals found'}</span></div>`;
    return;
  }

  const locBox = (o, label, priceClass) => {
    const price = +(o.price||o.priceThreshold||0);
    const qty   = +(o.quantity||0);
    const loc   = escHtml(o.claimName||o.settlementName||'Unknown location');
    const reg   = fmtRegion(o);
    return `<div class="deal-loc">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem">${label}</div>
      <div style="font-size:19px;font-weight:700" class="${priceClass}">${fmtCoin(price)}</div>
      <div style="font-size:12px;color:var(--text);margin-top:.3rem;font-weight:500">${loc}</div>
      <div style="font-size:11px;color:var(--text3)">${reg}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:.2rem">Qty: ${fmtNum(qty)}</div>
    </div>`;
  };

  window._renderedDeals = deals;

  el.innerHTML = `<div style="margin-bottom:.75rem;font-size:12px;color:var(--text3)">${deals.length} deal${deals.length===1?'':'s'} found — sorted by ${dealsSortMode==='travel'?'profit per travel distance':'max profit'}</div>` +
    deals.map((d, idx) => `
    <div class="deal-card" onclick="applyDealFilter(${idx})" title="Click to filter by these settlements">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem">
        <div>
          <span style="font-size:14px;font-weight:600;color:var(--text)">${escHtml(d.item.name||'Unknown')}</span>
          ${d.item.tag ? `<span class="badge badge-tier" style="margin-left:.5rem">${escHtml(d.item.tag)}</span>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:17px;font-weight:700;color:var(--green-light)">+${fmtCoin(d.maxProfit)}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">max profit</div>
        </div>
      </div>
      <div class="deal-flow">
        ${locBox(d.sellOrder, 'Buy from (sell order)', 'price-sell')}
        <div class="deal-arrow"><i class="ti ti-arrow-right"></i></div>
        ${locBox(d.buyOrder, 'Sell to (buy order)', 'price-buy')}
      </div>
      <div class="deal-meta">
        <span><i class="ti ti-coins" style="color:var(--amber-light)"></i> ${fmtCoin(d.profitPerUnit)} per unit</span>
        <span><i class="ti ti-package" style="color:var(--purple-light)"></i> Up to ${fmtNum(d.maxUnits)} units tradeable</span>
        <span>${dealTravelHtml(d)}</span>
        <span style="margin-left:auto;color:var(--text3)"><i class="ti ti-filter"></i> click to filter</span>
      </div>
    </div>`).join('');
}

function setDealsSort(mode) {
  dealsSortMode = (mode === 'travel') ? 'travel' : 'profit';
  safeSetItem('bc_deals_sort', dealsSortMode);
  renderDealResults();
}

function applyDealFilter(idx) {
  const d = (window._renderedDeals||[])[idx];
  if (!d) return;
  const bf = d.sellOrder.claimName||d.sellOrder.settlementName||'';
  const st = d.buyOrder.claimName ||d.buyOrder.settlementName ||'';
  dealsBuyFrom = bf.toLowerCase();
  dealsSellTo  = st.toLowerCase();
  const bfEl = document.getElementById('deals-buyfrom');
  const stEl = document.getElementById('deals-sellto');
  if (bfEl) bfEl.value = bf;
  if (stEl) stEl.value = st;
  renderDealResults();
}

async function loadMyOrders(id) {
  const el = document.getElementById('my-orders-content');
  if (!el) return;
  try {
    const d = await apiFetch(`/api/players/${id}/market`);
    const sells=d.sellOrders||[],buys=d.buyOrders||[];
    if(!sells.length&&!buys.length){el.innerHTML='<div class="empty"><i class="ti ti-mood-empty"></i><span>No open orders</span></div>';return;}
    el.innerHTML=`<div style="overflow-x:auto"><table class="market-table">
      <thead><tr><th>Type</th><th>Item</th><th>Price</th><th>Qty</th><th>Claim</th></tr></thead>
      <tbody>
        ${sells.map(o=>`<tr><td><span class="badge badge-sell">Sell</span></td><td>${escHtml(o.itemName||'Item '+o.itemId)}</td><td class="price-sell">${fmtCoin(o.priceThreshold||o.price)}</td><td>${fmtNum(o.quantity)}</td><td>${escHtml(o.claimName||'—')}</td></tr>`).join('')}
        ${buys.map(o=>`<tr><td><span class="badge badge-buy">Buy</span></td><td>${escHtml(o.itemName||'Item '+o.itemId)}</td><td class="price-buy">${fmtCoin(o.priceThreshold||o.price)}</td><td>${fmtNum(o.quantity)}</td><td>${escHtml(o.claimName||'—')}</td></tr>`).join('')}
      </tbody></table></div>`;
  } catch(e){el.innerHTML=errBox(e);}
}

function renderMarketResults() {
  const el = document.getElementById('market-results');
  if (!el) return;

  ['all','sell','buy'].forEach(f => {
    const btn = document.getElementById('mf-'+f);
    if (btn) btn.className = 'btn'+(marketOrderFilter===f?' primary':'');
  });

  // Count orders: handles both array and numeric API responses.
  // When a region is selected and orders are arrays with regionId, count only matching-region orders.
  // Empty array [] is truthy in JS — must check .length, not truthiness.
  const ocRegion = (val, fallback, regionId) => {
    if (Array.isArray(val)) return regionId ? val.filter(o => String(o.regionId) === String(regionId)).length : val.length;
    return +(val || fallback || 0);
  };
  const sellCount = it => ocRegion(it.sellOrders, it.sellOrderCount, marketSelectedRegion);
  const buyCount  = it => ocRegion(it.buyOrders,  it.buyOrderCount,  marketSelectedRegion);

  const q = ((document.getElementById('market-q')?.value)||'').toLowerCase().trim();
  let items = [...marketRawItems].filter(it => it.id||it.itemId);
  // Always hide items with no listings at all, and user-hidden items
  items = items.filter(it => sellCount(it) > 0 || buyCount(it) > 0);
  items = items.filter(it => !marketHiddenItems.has(String(it.id||it.itemId)));
  items = items.filter(it => !marketHiddenCategories.has(it.tag||it.category||'Other'));
  if (q.length >= 2) items = items.filter(it => (it.name||'').toLowerCase().includes(q)||(it.tag||'').toLowerCase().includes(q));
  if (marketOrderFilter === 'sell') items = items.filter(it => sellCount(it) > 0);
  if (marketOrderFilter === 'buy') items = items.filter(it => buyCount(it) > 0);
  if (marketTierFilter) items = items.filter(it => String(it.tier) === String(marketTierFilter));
  if (marketRarityFilter) items = items.filter(it => rarityName(it.rarityStr ?? it.rarity) === marketRarityFilter);

  if (!marketRawItems.length) { el.innerHTML = '<div class="card"><div class="empty"><i class="ti ti-mood-empty"></i><span>No items found</span></div></div>'; return; }
  if (!items.length) { el.innerHTML = '<div class="card"><div class="empty"><i class="ti ti-mood-empty"></i><span>No results match your filters</span></div></div>'; return; }

  // Store items in lookup list so onclick can use a safe integer index (avoids quoting issues with apostrophes in names)
  marketItemList = items;

  const byCategory = {};
  items.forEach((it,idx) => { const cat = it.tag||it.category||'Other'; if(!byCategory[cat]) byCategory[cat]=[]; byCategory[cat].push({it,idx}); });
  Object.values(byCategory).forEach(arr => arr.sort((a,b) => (a.it.tier||0) - (b.it.tier||0)));

  window._mktCats = [];
  const catHtml = Object.entries(byCategory).sort(([a],[b])=>a.localeCompare(b)).map(([cat,entries], ci) => {
    window._mktCats[ci] = cat;
    const catId = 'mcat-' + ci;
    return `
    <div class="card" style="margin-bottom:1rem;padding:0;overflow:hidden">
      <div class="market-cat-hdr" onclick="toggleMarketCategory('${catId}')" style="display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem;cursor:pointer;user-select:none">
        <div class="card-title">${escHtml(cat)}</div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <span style="font-size:11px;color:var(--text3)">${entries.length} item${entries.length!==1?'s':''}</span>
          <button class="mkt-hide-btn" onclick="event.stopPropagation();hideMarketCategory(window._mktCats[${ci}])" title="Hide this category" style="font-size:13px">×</button>
          <i class="ti ti-chevron-down" id="chevron-${catId}" style="font-size:14px;color:var(--text3);transition:transform .2s"></i>
        </div>
      </div>
      <div id="${catId}" style="padding:0 1.25rem 1.25rem">
        <div class="market-items-grid">
          ${entries.map(({it,idx})=>{
            const itemId=it.id||it.itemId;
            const tierBadge = it.tier > 0 ? `<span class="badge badge-tier">T${it.tier}</span>` : '';
            const rar = rarityName(it.rarityStr ?? it.rarity);
            const rarBadge = rar ? `<span class="badge ${rarityClass(rar)}">${escHtml(rar)}</span>` : '';
            return `<div class="market-item-card" onclick="openMarketItem(${idx})">
            <div class="market-item-left">
              <div class="market-item-name">${escHtml(it.name||'Unknown')}</div>
              <div class="market-item-tag">${escHtml(it.tag||'')}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
                ${(tierBadge||rarBadge) ? `<div style="display:flex;gap:4px;align-items:center">${tierBadge}${rarBadge}</div>` : ''}
                <div style="display:flex;gap:4px">
                  ${sellCount(it)?'<span class="badge badge-sell">Sell</span>':''}
                  ${buyCount(it)?'<span class="badge badge-buy">Buy</span>':''}
                </div>
              </div>
              <button class="mkt-hide-btn" onclick="event.stopPropagation();hideMarketItem('${itemId}')" title="Hide this item">×</button>
            </div>
          </div>`; }).join('')}
        </div>
      </div>
    </div>`;
  }).join('');

  // Regional verification complete note
  let footerHtml = '';
  if (marketSelectedRegion && marketOrderFilter !== 'all') {
    const rn = escHtml((marketRegions.find(r=>(r.id||r.regionId||r.entityId)==marketSelectedRegion)||{}).regionName || ('Region '+marketSelectedRegion));
    footerHtml = `<div style="text-align:center;padding:.75rem;font-size:12px;color:var(--text3)"><i class="ti ti-circle-check"></i> All items checked for ${rn}</div>`;
  }

  el.innerHTML = catHtml + footerHtml;

  // Update hidden-items button count
  const countEl = document.getElementById('mkt-hidden-count');
  const hiddenBtn = document.getElementById('mkt-hidden-btn');
  const totalHidden = marketHiddenItems.size + marketHiddenCategories.size;
  if (countEl) countEl.textContent = totalHidden ? `(${totalHidden})` : '';
  if (hiddenBtn) {
    hiddenBtn.style.opacity = totalHidden ? '1' : '0.45';
    hiddenBtn.title = totalHidden ? `${totalHidden} hidden` : 'No hidden items';
  }
}

function setMarketFilter(f) {
  marketOrderFilter = f;
  if (marketSelectedRegion) loadAllMarketItems();

}

function toggleMarketCategory(catId) {
  const body = document.getElementById(catId);

function backToMarketResults() {
  const pos = marketScrollPos;

function openMarketItem(idx) {
  const it = marketItemList[idx];

  const id = it.id||it.itemId;
  const isCargo = it.type === 'cargo' || it.isCargo || it.itemType === 1 || it.itemType === 'cargo';

}

    el.innerHTML = `
      <div style="margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem">
        <button class="btn" onclick="backToMarketResults()"><i class="ti ti-arrow-left"></i> Back</button>
        <span style="font-size:14px;font-weight:500;color:var(--text)">${escHtml(name)}</span>
        ${regionNote}
      </div>
      <div class="stat-row">
        <div class="stat"><div class="stat-label">Lowest sell</div><div class="stat-val price-sell">${fmtCoin(stats.lowestSell||stats.lowestSellPrice)}</div></div>
        <div class="stat"><div class="stat-label">Highest buy</div><div class="stat-val price-buy">${fmtCoin(stats.highestBuy||stats.highestBuyPrice)}</div></div>
        <div class="stat"><div class="stat-label">24h volume</div><div class="stat-val">${fmtNum(stats.volume24h||0)}</div></div>
        <div class="stat"><div class="stat-label">Sell orders</div><div class="stat-val">${sells.length}</div></div>
      </div>
      <div id="mkt-history"></div>
      <div class="grid2">
        <div class="card">
          <div class="card-header"><div class="card-title"><i class="ti ti-tag"></i> Sell orders</div></div>
          ${sells.length ? `<div style="overflow-x:auto"><table class="market-table">
            <thead><tr><th>Price</th><th>Qty</th><th>Seller</th><th>Claim</th><th>Region</th></tr></thead>
            <tbody>${sells.slice(0,30).map(o=>orderRow(o,'price-sell')).join('')}</tbody>
          </table></div>` : '<div class="empty" style="padding:1.5rem"><i class="ti ti-mood-empty"></i><span>No sell orders</span></div>'}
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title"><i class="ti ti-shopping-cart"></i> Buy orders</div></div>
          ${buys.length ? `<div style="overflow-x:auto"><table class="market-table">
            <thead><tr><th>Price</th><th>Qty</th><th>Buyer</th><th>Claim</th><th>Region</th></tr></thead>
            <tbody>${buys.slice(0,30).map(o=>orderRow(o,'price-buy')).join('')}</tbody>
          </table></div>` : '<div class="empty" style="padding:1.5rem"><i class="ti ti-mood-empty"></i><span>No buy orders</span></div>'}
        </div>
      </div>`;
    renderPriceHistory(type, id); // Tier 2: fill the sparkline from the backend (no-op if unavailable)
  } catch(e) {
    el.innerHTML = `<div style="margin-bottom:.75rem"><button class="btn" onclick="backToMarketResults()"><i class="ti ti-arrow-left"></i> Back</button></div>` + errBox(e);
  }
}

// ── Price history sparkline (Tier 2 backend) ──
async function renderPriceHistory(type, id){
  const host = document.getElementById('mkt-history'); if (!host) return;
  let pts = [];
  try {
    const r = await fetch(`${API}/history/${type}/${id}`);
    if (r.ok){ const j = await r.json(); pts = Array.isArray(j.points) ? j.points : []; }
    if (!pts.length){ const r2 = await fetch(`${API}/history/${type==='item'?'cargo':'item'}/${id}`); if (r2.ok){ const j2 = await r2.json(); if (Array.isArray(j2.points) && j2.points.length) pts = j2.points; } }
  } catch(e){ host.innerHTML = ''; return; } // backend unavailable → just omit the section
  if (pts.length < 2){
    host.innerHTML = `<div style="font-size:11px;color:var(--text3);padding:.3rem 0 .6rem"><i class="ti ti-chart-line"></i> Price history builds up as the backend records snapshots over time.</div>`;
    return;
  }
  host.innerHTML = priceHistoryHtml(pts);
}
function priceHistoryHtml(pts){
  const series = pts.map(p => ({ t:p.t, v: (p.s != null ? p.s : p.b) })).filter(p => p.v != null);
  if (series.length < 2) return '';
  const vals = series.map(p => p.v);
  const min = Math.min(...vals), max = Math.max(...vals), range = (max - min) || 1;
  const W = 280, H = 46, n = series.length;
  const xx = i => (i/(n-1))*W;
  const yy = v => (H-3) - ((v-min)/range)*(H-6);
  const path = series.map((p,i) => `${i?'L':'M'}${xx(i).toFixed(1)},${yy(p.v).toFixed(1)}`).join(' ');
  const cur = vals[vals.length-1];
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  const pct = avg ? Math.round((cur/avg - 1)*100) : 0;
  let label, color;
  if (pct <= -10){ label = 'cheaper than usual'; color = 'var(--green-light)'; }
  else if (pct >= 10){ label = 'pricier than usual'; color = '#f09595'; }
  else { label = 'around typical'; color = 'var(--text2)'; }
  return `<div class="card" style="margin-bottom:.75rem;padding:.55rem .8rem">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.25rem">
      <div style="font-size:12px;color:var(--text2)"><i class="ti ti-chart-line" style="color:var(--teal-light)"></i> Sell price history <span style="color:var(--text3);font-size:10px">(${n} snapshots)</span></div>
      <div style="font-size:11px;color:${color}">${pct>0?'+':''}${pct}% vs avg · ${label}</div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" style="display:block">
      <path d="${path}" fill="none" stroke="var(--teal-light)" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:.15rem">
      <span>low ${fmtCoin(min)}</span><span>now ${fmtCoin(cur)}</span><span>high ${fmtCoin(max)}</span>
    </div>
  </div>`;
}

// ── SHOPPING LIST (multiple named lists) ──
function _newListId(){ return 'L' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function saveShoppingLists() {
  safeSetItem(SHOPPING_LISTS_LS, JSON.stringify({lists: shoppingLists, activeId: activeShoppingListId}));
}
// Alias kept so existing add/remove code persists correctly
function saveShoppingItems() { saveShoppingLists(); }
function _syncActiveShoppingList() {
  let l = shoppingLists.find(x => x.id === activeShoppingListId);
  if (!l) { l = shoppingLists[0]; activeShoppingListId = l ? l.id : null; }
  shoppingItems = l ? l.items : [];
}
function getActiveShoppingList() { return shoppingLists.find(x => x.id === activeShoppingListId) || null; }
function loadShoppingLists() {
  try {
    const v = localStorage.getItem(SHOPPING_LISTS_LS);
    if (v) {
      const data = JSON.parse(v);
      shoppingLists = Array.isArray(data.lists) ? data.lists : [];
      activeShoppingListId = data.activeId || (shoppingLists[0] && shoppingLists[0].id) || null;
    }
  } catch(e) {}
  // Migrate from legacy single-list storage, or create a default list
  if (!shoppingLists.length) {
    let oldItems = [];
    try { const ov = localStorage.getItem(SHOPPING_LS); if (ov) oldItems = JSON.parse(ov) || []; } catch(e) {}
    shoppingLists = [{ id: _newListId(), name: 'My List', items: oldItems }];
    activeShoppingListId = shoppingLists[0].id;
    saveShoppingLists();
  }
  // Ensure every list has an items array
  shoppingLists.forEach(l => { if (!Array.isArray(l.items)) l.items = []; });
  _syncActiveShoppingList();
}
function shoppingSwitchList(id) {
  if (id === activeShoppingListId) return;
  activeShoppingListId = id;
  _syncActiveShoppingList();
  shoppingExpandedItem = null;
  saveShoppingLists();
  renderShoppingTab();
  fetchAllShoppingPrices();
}
function shoppingNewList() {
  const name = prompt('Name for the new list:', 'New List');
  if (name === null) return;
  const l = { id: _newListId(), name: (name.trim() || 'New List'), items: [] };
  shoppingLists.push(l);
  activeShoppingListId = l.id;
  _syncActiveShoppingList();
  saveShoppingLists();
  renderShoppingTab();
}
function shoppingRenameList() {
  const l = getActiveShoppingList();
  if (!l) return;
  const name = prompt('Rename list:', l.name);
  if (name === null) return;
  l.name = name.trim() || l.name;
  saveShoppingLists();
  renderShoppingTab();
}
function shoppingDeleteList() {
  const l = getActiveShoppingList();
  if (!l) return;
  if (shoppingLists.length <= 1) { alert('You need at least one list. Create another before deleting this one.'); return; }
  if (!confirm(`Delete the list "${l.name}" and all its items?`)) return;
  shoppingLists = shoppingLists.filter(x => x.id !== l.id);
  activeShoppingListId = shoppingLists[0].id;
  _syncActiveShoppingList();
  saveShoppingLists();
  renderShoppingTab();
  fetchAllShoppingPrices();
}

  if (!el) return;

  // Load saved lists on first render

  _syncActiveShoppingList();

    const active = l.id === activeShoppingListId;
    return `<button class="btn${active?' primary':''}" style="font-size:12px" onclick="shoppingSwitchList('${l.id}')">
      ${escHtml(l.name)} <span style="opacity:.55;margin-left:.15rem">${l.items.length}</span>
    </button>`;
  }).join('');
  const listBar = `<div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.6rem;flex-wrap:wrap">
    ${listTabs}
    <button class="btn" style="font-size:12px" onclick="shoppingNewList()"><i class="ti ti-plus"></i> New list</button>
    <span style="flex:1"></span>
    <button class="btn" style="font-size:12px;padding:5px 9px" onclick="shoppingRenameList()" title="Rename current list"><i class="ti ti-pencil"></i></button>
    <button class="btn" style="font-size:12px;padding:5px 9px" onclick="shoppingDeleteList()" title="Delete current list"><i class="ti ti-trash"></i></button>
