function initPlannerResize() {
  const handle = document.getElementById('planner-resize-handle');
  const layout  = document.querySelector('.planner-layout');
  if (!handle || !layout) return;

  // Restore previously saved height
  try {
    const saved = localStorage.getItem('bc_planner_h');
    if (saved) layout.style.height = saved;
  } catch(e) {}

  let startY = 0, startH = 0, dragging = false;

  handle.addEventListener('mousedown', e => {
    startY  = e.clientY;
    startH  = layout.offsetHeight;
    dragging = true;
    document.body.style.userSelect  = 'none';
    document.body.style.cursor      = 'ns-resize';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newH = Math.max(150, Math.min(window.innerHeight * 0.85, startH + (e.clientY - startY)));
    layout.style.height = newH + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    document.body.style.userSelect = '';
    document.body.style.cursor     = '';
    safeSetItem('bc_planner_h', layout.style.height);
  });
}

function plannerIsSeasonal(item) { return /^seasonal/i.test((item && item.tag) || ''); }
// A recipe is "blocked" when hiding seasonal items and any of its inputs is seasonal/unobtainable
// (e.g. "Water Bucket ← 3x Winter Snow" is dropped so that dead path never appears).
function plannerRecipeBlocked(r) {
  if (!plannerHideSeasonal) return false;
  return r.inputs.some(inp => { const it = craftingData.itemsById[inp.itemId]; return it && plannerIsSeasonal(it); });
}
// Recipes that actually craft an item — excludes pack/unpack "convert" recipes, research, and
// (when the toggle is on) recipes requiring seasonal inputs. Items left with no real recipe are
// gathered raws (e.g. Basic Sand → leaf node).
function plannerRealRecipes(itemId) {
  const recipes = craftingData.recipesByOutput[itemId] || [];
  return recipes.filter(r => !/unpack|research/i.test(r.name || '') && !plannerRecipeBlocked(r));
}
let plannerHideSeasonal = true; // toggle; when on, hides the whole Seasonal* tag family
function plannerLoadSeasonalPref(){ try { const v = localStorage.getItem('bc_planner_hide_seasonal'); if (v !== null) plannerHideSeasonal = v === '1'; } catch(e){} }
function plannerToggleSeasonal(on){ plannerHideSeasonal = on; safeSetItem('bc_planner_hide_seasonal', on ? '1' : '0'); plannerFilter(); }

function plannerGetCraftableItems() {
  if (!craftingData) return [];
  return craftingData.items.filter(i => {
    if (!plannerRealRecipes(i.id).length) return false;          // gathered/raw (or only convert) → not craftable
    if (plannerHideSeasonal && plannerIsSeasonal(i)) return false; // hide seasonal/unobtainable
    return true;
  });
}

function plannerGetSkillForItem(itemId) {
  const recipes = craftingData.recipesByOutput[itemId] || [];
  const best = plannerBestRecipe(itemId);
  if (!best) return null;
  return craftingData.skillsById[best.skillId];
}

function plannerFilter() {
  if (!craftingData) return;
  const q = (document.getElementById('planner-search')?.value || '').toLowerCase().trim();
  const tier = document.getElementById('planner-tier')?.value || '';
  const skillId = document.getElementById('planner-skill')?.value || '';

  let items = plannerGetCraftableItems();
  if (q) items = items.filter(i => (i.name||'').toLowerCase().includes(q) || (i.tag||'').toLowerCase().includes(q));
  if (tier) items = items.filter(i => String(i.tier) === String(tier));
  if (skillId) {
    items = items.filter(i => {
      const r = plannerBestRecipe(i.id);
      return r && String(r.skillId) === String(skillId);
    });
  }

  const countEl = document.getElementById('planner-item-count');
  if (countEl) countEl.textContent = `(${items.length})`;

  const listEl = document.getElementById('planner-item-list');
  if (!listEl) return;
  if (!items.length) { listEl.innerHTML = '<div class="empty" style="padding:2rem"><i class="ti ti-search-off"></i><span>No items found</span></div>'; return; }

  // Detect duplicate names for disambiguation chips
  const plannerNameCount = {};
  items.forEach(i => { plannerNameCount[i.name] = (plannerNameCount[i.name]||0) + 1; });

  listEl.innerHTML = items.map(i => {
    const skill = plannerGetSkillForItem(i.id);
    const tierStr = i.tier > 0 ? `T${i.tier} · ` : '';
    const skillStr = skill ? skill.name : '';
    const tagStr = i.tag || '';
    const rarStr = rarityName(i.rarityStr || i.rarity);
    const needsChips = plannerNameCount[i.name] > 1;
    const chips = needsChips ? `<div style="display:flex;gap:3px;margin-top:3px;flex-wrap:wrap">
      ${i.tier > 0 ? `<span class="badge badge-tier" style="font-size:9px;padding:1px 4px">T${i.tier}</span>` : ''}
      ${rarStr ? `<span class="badge ${rarityClass(rarStr)}" style="font-size:9px;padding:1px 4px">${escHtml(rarStr)}</span>` : ''}
    </div>` : '';
    return `<div class="planner-item-row${plannerSelId === i.id ? ' pactive' : ''}" onclick="plannerSelectItem(${i.id})">
      <div class="planner-item-name">${escHtml(i.name)}</div>
      ${chips || `<div class="planner-item-meta">${escHtml(tierStr + skillStr + (skillStr && tagStr ? ' · ' : '') + tagStr)}</div>`}
    </div>`;
  }).join('');
}

function plannerSelectItem(itemId) {
  plannerSelId = itemId;
  // Re-render item list to update active state
  document.querySelectorAll('.planner-item-row').forEach(r => r.classList.remove('pactive'));
  // Find the clicked row and mark active
  const rows = document.querySelectorAll('.planner-item-row');
  // Rebuild to update active class efficiently
  plannerFilter();
  // Scroll selected into view
  const activeRow = document.querySelector('.planner-item-row.pactive');
  if (activeRow) activeRow.scrollIntoView({block:'nearest'});
  renderRecipePanel(itemId);
  // Refresh plan list so the clicked plan item highlights
  if (plannerPlan.some(p => p.itemId === itemId)) renderPlanPanel();
}

function plannerBestRecipe(itemId, preferredId) {
  // Only consider real crafting recipes. If none exist (only convert/unpack, or nothing),
  // the item is gathered/raw → return null so the tree shows it as a leaf.
  const real = plannerRealRecipes(itemId);
  if (!real.length) return null;
  if (preferredId) { const f = real.find(r => r.id === preferredId); if (f) return f; }
  if (plannerSelRecipe[itemId]) { const f = real.find(r => r.id === plannerSelRecipe[itemId]); if (f) return f; }
  // Sort by fewest inputs, then by id (most basic first)
  return real.slice().sort((a,b) => a.inputs.length - b.inputs.length || a.id - b.id)[0];
}

function renderRecipePanel(itemId) {
  const panel = document.getElementById('planner-recipe-panel');
  const addBar = document.getElementById('planner-add-bar');
  if (!panel) return;
  const item = craftingData.itemsById[itemId];
  if (!item) { panel.innerHTML = '<div class="empty"><i class="ti ti-question-mark"></i><span>Item not found</span></div>'; return; }

  const planEntry = plannerPlan.find(p => p.itemId === itemId);
  const planQty = planEntry ? planEntry.qty : 1;

  // Build recipe tree HTML
  const treeHtml = buildRecipeTreeHTML(itemId, planQty, new Set(), 0);
  panel.innerHTML = `
    <div class="rn-controls">
      <button class="btn rn-ctrl-btn" onclick="plannerExpandAll()"><i class="ti ti-arrows-maximize"></i> Expand All</button>
      <button class="btn rn-ctrl-btn" onclick="plannerCollapseAll()"><i class="ti ti-arrows-minimize"></i> Collapse All</button>
    </div>
    <div class="recipe-tree">${treeHtml}</div>`;

  // Add bar
  if (addBar) {
    const inPlan = !!planEntry;
    addBar.innerHTML = `
      <input type="number" id="planner-qty-inp" min="1" value="${planQty}" style="width:56px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 6px;font-size:12px;text-align:center;outline:none">
      <button class="btn primary" style="padding:3px 10px;font-size:12px" onclick="addToPlan(${itemId})">
        <i class="ti ti-${inPlan ? 'refresh' : 'plus'}"></i> ${inPlan ? 'Update' : 'Add to Plan'}
      </button>`;
  }
}

function buildRecipeTreeHTML(itemId, qty, visited, depth) {
  const item = craftingData.itemsById[itemId];
  const name = item ? escHtml(item.name) : `Item ${itemId}`;
  const recipe = plannerBestRecipe(itemId);

  // No recipe = raw material (gathered or only-convert)
  if (!recipe || depth > 8) {
    return `<div class="rn-raw"><i class="ti ti-leaf"></i> <span>${name}</span> <span class="rn-qty">${fmtCount(qty)}×</span></div>`;
  }

  const outEntry = recipe.outputs.find(o => o.itemId === itemId) || {quantity:1};
  const outQty = outEntry.quantity;
  const mult = Math.ceil(qty / outQty);
  const skill = craftingData.skillsById[recipe.skillId];

  // Recipe selector if multiple real recipes exist. Label shows the actual conversion, e.g.
  // "10x Chemical Base → 10x Honey + 1x Water Bucket"
  const pool = plannerRealRecipes(itemId);
  let selHtml = '';
  if (pool.length > 1) {
    const outName = (craftingData.itemsById[itemId] || {}).name || `Item ${itemId}`;
    const itemNm = id => { const it = craftingData.itemsById[id]; return it ? it.name : `#${id}`; };
    const outQ = r => { const o = r.outputs.find(o => o.itemId === itemId) || {quantity:1}; return o.quantity; };
    const sorted = pool.slice().sort((a,b) => outQ(a) - outQ(b)); // by output amount, ascending
    const opts = sorted.map(r => {
      const rOut = r.outputs.find(o => o.itemId === itemId) || {quantity: 1};
      const ins  = r.inputs.map(i => `${fmtCount(i.quantity)}x ${itemNm(i.itemId)}`).join(' + ') || '(no inputs)';
      const label = `${fmtCount(rOut.quantity)}x ${outName} → ${ins}`;
      return `<option value="${r.id}"${r.id === recipe.id ? ' selected' : ''}>${escHtml(label)}</option>`;
    }).join('');
    selHtml = `<select class="rn-sel" onchange="plannerSetRecipe(${itemId},+this.value)">${opts}</select>`;
  }

  // Children
  let childHtml = '';
  if (!visited.has(itemId)) {
    const newVisited = new Set(visited).add(itemId);
    childHtml = recipe.inputs.map(inp => {
      const needQty = inp.quantity * mult;
      return buildRecipeTreeHTML(inp.itemId, needQty, newVisited, depth + 1);
    }).join('');
  }

  const hasKids    = !!childHtml;
  const itemCls    = `rn-item${depth === 0 ? ' rn-root' : ''}${hasKids ? ' rn-has-children' : ''}`;
  const clickAttr  = hasKids ? ' onclick="plannerToggleRn(this)"' : '';
  const chevron    = hasKids ? '<i class="ti ti-chevron-down rn-chevron"></i>' : '';

  return `<div class="rn">
    <div class="${itemCls}"${clickAttr}>
      ${chevron}
      <span class="rn-name">${name}</span>
      <span class="rn-qty">${fmtCount(qty)}×</span>
      ${skill && depth > 0 ? `<span class="rn-skill">${escHtml(skill.name)}</span>` : ''}
      ${skill && depth === 0 ? `<span class="rn-skill" style="color:var(--teal-light)">${escHtml(skill.name)} Lv${recipe.skillLevel}</span>` : ''}
      ${selHtml}
    </div>
    ${hasKids ? `<div class="rn-children">${childHtml}</div>` : ''}
  </div>`;
}

function plannerSetRecipe(itemId, recipeId) {
  plannerSelRecipe[itemId] = recipeId;
  // Re-render the whole displayed tree (the changed recipe may be any node within it),
  // plus the plan/material breakdown which depends on every sub-recipe choice.
  if (plannerSelId != null) renderRecipePanel(plannerSelId);
  if (plannerPlan.length) renderPlanPanel();
}

function plannerToggleRn(header) {
  // Don't collapse when clicking the recipe <select> dropdown
  if (event.target.closest('select')) return;
  const rn       = header.closest('.rn');
  const children = rn && rn.querySelector(':scope > .rn-children');
  if (!children) return;
  const collapsed = children.style.display === 'none';
  children.style.display = collapsed ? '' : 'none';
  const chevron = header.querySelector('.rn-chevron');
  if (chevron) chevron.style.transform = collapsed ? '' : 'rotate(-90deg)';
}

function plannerExpandAll() {
  const panel = document.getElementById('planner-recipe-panel');
  if (!panel) return;
  panel.querySelectorAll('.rn-children').forEach(el => { el.style.display = ''; });
  panel.querySelectorAll('.rn-chevron').forEach(el => { el.style.transform = ''; });
}

function plannerCollapseAll() {
  const panel = document.getElementById('planner-recipe-panel');
  if (!panel) return;
  panel.querySelectorAll('.rn-children').forEach(el => { el.style.display = 'none'; });
  panel.querySelectorAll('.rn-chevron').forEach(el => { el.style.transform = 'rotate(-90deg)'; });
}

// ── Plan persistence ──
function savePlanToStorage() {
  try {
    safeSetItem('bc_plan_v1', JSON.stringify(plannerPlan));
    safeSetItem('bc_plan_bs_v1', JSON.stringify([...bsChecked]));
  } catch(e) {}
}
function loadPlanFromStorage() {
  try {
    const p = localStorage.getItem('bc_plan_v1');
    if (p) plannerPlan = JSON.parse(p);
    const b = localStorage.getItem('bc_plan_bs_v1');
    if (b) bsChecked = new Set(JSON.parse(b));
  } catch(e) {}
}

function addToPlan(itemId) {
  const qtyInp = document.getElementById('planner-qty-inp');
  const qty = Math.max(1, parseInt(qtyInp?.value) || 1);
  const existing = plannerPlan.find(p => p.itemId === itemId);
  if (existing) {
    existing.qty = qty;
  } else {
    plannerPlan.push({itemId, qty});
  }
  savePlanToStorage();
  renderPlanPanel();
  renderRecipePanel(itemId); // update "Update" button state
}

function setPlanQty(itemId, qty) {
  qty = Math.max(1, parseInt(qty) || 1);
  const existing = plannerPlan.find(p => p.itemId === itemId);
  if (existing) existing.qty = qty;
  savePlanToStorage();
  renderPlanPanel();
  if (plannerSelId === itemId) renderRecipePanel(itemId);
}

function removeFromPlan(itemId) {
  plannerPlan = plannerPlan.filter(p => p.itemId !== itemId);
  savePlanToStorage();
  renderPlanPanel();
  if (plannerSelId === itemId) renderRecipePanel(itemId);
}

function clearPlan() {
  plannerPlan = [];
  bsChecked = new Set();
  savePlanToStorage();
  renderPlanPanel();
  if (plannerSelId) renderRecipePanel(plannerSelId);
}

function renderPlanPanel() {
  const listEl = document.getElementById('planner-plan-list');
  const countEl = document.getElementById('planner-plan-count');
  const matEl = document.getElementById('planner-materials');
  if (!listEl) return;

  if (countEl) countEl.textContent = plannerPlan.length ? `(${plannerPlan.length})` : '';

  if (!plannerPlan.length) {
    listEl.innerHTML = '<div class="empty" style="padding:2rem"><i class="ti ti-clipboard"></i><span>Plan is empty</span></div>';
    if (matEl) matEl.innerHTML = '';
    const cvbEl = document.getElementById('planner-cvb-total'); if (cvbEl) cvbEl.innerHTML = '';
    renderBuildingSteps();
    return;
  }

  listEl.innerHTML = plannerPlan.map(p => {
    const item = craftingData.itemsById[p.itemId];
    const name = item ? escHtml(item.name) : `Item ${p.itemId}`;
    const tierStr = item && item.tier > 0 ? `T${item.tier}` : '';
    const active = plannerSelId === p.itemId ? ' pactive' : '';
    return `<div class="plan-item-row${active}">
      <div style="flex:1;min-width:0;cursor:pointer" onclick="plannerSelectItem(${p.itemId})" title="View recipe tree">
        <div class="plan-item-name">${name}</div>
        ${tierStr ? `<div class="plan-item-meta">${tierStr} · ${escHtml(item.tag||'')}</div>` : ''}
        <div class="plan-cvb" id="cvb-${p.itemId}" style="font-size:10.5px;color:var(--text2);margin-top:3px;line-height:1.35"><span style="color:var(--text3)">pricing…</span></div>
      </div>
      <input type="number" class="plan-qty-inp" min="1" value="${p.qty}" onchange="setPlanQty(${p.itemId},this.value)" onblur="setPlanQty(${p.itemId},this.value)">
      <span class="plan-remove" onclick="removeFromPlan(${p.itemId})" title="Remove"><i class="ti ti-x"></i></span>
    </div>`;
  }).join('');

  // Calculate aggregated raw materials
  if (matEl) {
    const mats = {};
    plannerPlan.forEach(p => {
      const sub = flattenToRawMaterials(p.itemId, p.qty, new Set());
      Object.entries(sub).forEach(([id, qty]) => { mats[id] = (mats[id]||0) + qty; });
    });
    const matEntries = Object.entries(mats).sort((a,b) => b[1]-a[1]);
    if (!matEntries.length) { matEl.innerHTML = ''; return; }
    matEl.innerHTML = `<div class="plan-mat-title"><i class="ti ti-package"></i> Raw Materials</div>` +
      matEntries.map(([id, qty]) => planMatChip(qty, id)).join('');
  }
  renderBuildingSteps();
  renderCraftVsBuy(); // async; fills per-item lines + total when prices arrive
}

function flattenToRawMaterials(itemId, qty, visited) {
  if (visited.has(itemId)) return {[itemId]: qty}; // cycle
  const recipe = plannerBestRecipe(itemId);
  if (!recipe) return {[itemId]: qty}; // raw material
  const outEntry = recipe.outputs.find(o => o.itemId === itemId) || {quantity:1};
  const mult = Math.ceil(qty / outEntry.quantity);
  const newVisited = new Set(visited).add(itemId);
  const result = {};
  recipe.inputs.forEach(inp => {
    const sub = flattenToRawMaterials(inp.itemId, inp.quantity * mult, newVisited);
    Object.entries(sub).forEach(([id, q]) => { result[id] = (result[id]||0) + q; });
  });
  return result;
}

// ── CRAFT vs BUY (market price comparison) ──────────────────────────────────────
// For each plan item: compare the cost to BUY it outright (cheapest sell order) vs the cost to
// CRAFT it (sum of cheapest sell prices of its raw/leaf materials, from flattenToRawMaterials).
// Prices come from the in-memory _mktCache (fetchWithCache), so repeated renders are instant.
let _cvbTypeHint = {};   // itemId -> 'item' | 'cargo' (resolved market-detail type, cached)
let _cvbRunToken = 0;    // guards against overlapping runs when the plan is edited mid-fetch

function cheapestSell(detail, region){
  if (!detail) return null;
  let orders = detail.sellOrders || [];
  if (region) orders = orders.filter(o => String(o.regionId) === String(region));
  const prices = orders.map(o => +(o.price || o.priceThreshold || 0)).filter(v => v > 0);
  return prices.length ? Math.min(...prices) : null;
}
// Market details are split into item vs cargo endpoints. Prefer a known type (from the market list
// or a prior resolve); otherwise try item then cargo. Caches the resolved type to avoid re-probing.
async function fetchItemDetailSafe(id){
  id = String(id);
  let order = ['item','cargo'];
  if (_cvbTypeHint[id] && _cvbTypeHint[id] !== 'none') order = [_cvbTypeHint[id]];
  else {
    const m = marketRawItems.find(it => String(it.id||it.itemId) === id);
    if (m) order = (m.itemType===1 || m.isCargo || m.type==='cargo') ? ['cargo','item'] : ['item','cargo'];
  }
  for (const t of order){
    try {
      const d = await fetchWithCache(t, id);
      if (d && (Array.isArray(d.sellOrders) || Array.isArray(d.buyOrders))){ _cvbTypeHint[id] = t; return d; }
    } catch(e){}
  }
  return null;
}

function cvbCoin(v){ return fmtCoin(Math.round(v)); } // fmtCoin already includes the ⬡ symbol
function cvbLineHtml(r){
  if (!r.craftable){
    return r.buyCost==null ? `<span style="color:var(--text3)">no market price</span>`
                           : `<span style="color:var(--text3)">Buy ${cvbCoin(r.buyCost)}</span>`;
  }
  const craftKnown = !(r.partial && r.craftCost===0); // at least one material is priced
  const comparable = r.buyCost!=null && !r.partial;
  const craftWins = comparable && r.craftCost <= r.buyCost;
  const buyWins   = comparable && r.buyCost < r.craftCost;
  const win = 'color:var(--green-light);font-weight:600';
  const craftStr = craftKnown
    ? `<span style="${craftWins?win:''}">Craft ${r.partial?'≥':''}${cvbCoin(r.craftCost)}${r.partial?`<span style="color:var(--text3)" title="excludes ${r.missing} gather-only material(s) with no market listing">*</span>`:''}</span>`
    : `<span style="color:var(--text3)">Craft: mats not listed</span>`;
  const buyStr   = r.buyCost==null ? `<span style="color:var(--text3)">Buy —</span>`
                                   : `<span style="${buyWins?win:''}">Buy ${cvbCoin(r.buyCost)}</span>`;
  let verdict = '';
  if (comparable){
    const save = Math.round((1 - Math.min(r.craftCost,r.buyCost)/Math.max(r.craftCost,r.buyCost||1))*100);
    verdict = ` <span style="color:var(--text3)">→ ${craftWins?'craft':'buy'} saves ${save}%</span>`;
  } else if (r.buyCost==null && craftKnown){
    verdict = ` <span style="color:var(--text3)">→ craft only</span>`;
  }
  return `${craftStr} · ${buyStr}${verdict}`;
}

async function renderCraftVsBuy(){
  const totalEl = document.getElementById('planner-cvb-total');
  if (!craftingData || !plannerPlan.length){ if (totalEl) totalEl.innerHTML=''; return; }
  const myToken = ++_cvbRunToken;
  const region = null; // cheapest anywhere

  const perItem = plannerPlan.map(p => ({
    p,
    craftable: !!plannerBestRecipe(p.itemId),
    leaves: flattenToRawMaterials(p.itemId, p.qty, new Set())
  }));
  const need = new Set();
  perItem.forEach(({p, leaves}) => { need.add(String(p.itemId)); Object.keys(leaves).forEach(id => need.add(String(id))); });

  const price = {};
  await Promise.all([...need].map(async id => { const d = await fetchItemDetailSafe(id); price[id] = cheapestSell(d, region); }));
  if (myToken !== _cvbRunToken) return; // a newer run superseded this one

  let totCraft = 0, totBuy = 0, totCraftPartial = false, totBuyMissing = false, anyComparable = false;
  perItem.forEach(({p, craftable, leaves}) => {
    const buyUnit = price[String(p.itemId)];
    const buyCost = buyUnit==null ? null : buyUnit * p.qty;
    let craftCost = 0, partial = false, missing = 0;
    Object.entries(leaves).forEach(([id,q]) => { const pr = price[id]; if (pr==null){ partial = true; missing++; } else craftCost += pr * q; });
    const lineEl = document.getElementById('cvb-'+p.itemId);
    if (lineEl) lineEl.innerHTML = cvbLineHtml({ craftable, craftCost, partial, missing, buyCost });
    if (buyCost!=null) totBuy += buyCost; else totBuyMissing = true;
    if (craftable){ totCraft += craftCost; if (partial) totCraftPartial = true; anyComparable = true; }
    else totCraft += (buyCost!=null ? buyCost : 0);
  });

  if (totalEl){
    if (!anyComparable){ totalEl.innerHTML = ''; return; }
    const complete = !totCraftPartial && !totBuyMissing && totBuy>0 && totCraft>0;
    const cheaper = totCraft <= totBuy ? 'craft' : 'buy';
    const save = complete ? Math.round((1 - Math.min(totCraft,totBuy)/Math.max(totCraft,totBuy))*100) : 0;
    const win = 'color:var(--green-light);font-weight:600';
    totalEl.innerHTML = `<div class="plan-mat-title" style="margin-top:.6rem"><i class="ti ti-scale"></i> Craft vs Buy <span style="font-weight:400;color:var(--text3);font-size:10px">cheapest anywhere</span></div>
      <div style="display:flex;gap:.85rem;flex-wrap:wrap;font-size:12px;padding:.1rem 0">
        <span style="${complete&&cheaper==='craft'?win:''}">Craft total ≈ <b>${fmtCoin(Math.round(totCraft))}</b>${totCraftPartial?'<span style="color:var(--text3)">*</span>':''}</span>
        <span style="${complete&&cheaper==='buy'?win:''}">Buy total ≈ <b>${totBuyMissing?'partial':fmtCoin(Math.round(totBuy))}</b></span>
        ${complete?`<span style="color:var(--text3)">→ ${cheaper==='craft'?'crafting':'buying'} saves ~${save}%</span>`:''}
      </div>
      ${(totCraftPartial||totBuyMissing)?'<div style="font-size:10px;color:var(--text3)">* some items have gather-only / unlisted materials — totals are partial</div>':''}`;
  }
}

// ── PLANNER INVENTORY ──
async function loadPlannerInventory() {
  if (!currentPlayer) return;
  if (invData) return; // already loaded (e.g. from Inventory tab)
  try {
    const id = currentPlayer.entityId;
    // Fetch main inventories + housing in parallel (same as loadInventory)
    const [d, housingList] = await Promise.all([
      apiFetch(`/api/players/${id}/inventories`),
      apiFetch(`/api/players/${id}/housing`).catch(() => [])
    ]);
    const houses = Array.isArray(housingList) ? housingList.filter(h => !h.isEmpty) : [];
    const houseDetails = await Promise.all(
      houses.map(h => apiFetch(`/api/players/${id}/housing/${h.buildingEntityId}`).catch(() => null))
    );
    const housingInvs = [];
    houseDetails.forEach((hd, i) => {
      if (!hd) return;
      const house = houses[i];
      (hd.items  || []).forEach(item  => { d.items [item.id]  = item;  });
      (hd.cargos || []).forEach(cargo => { d.cargos[cargo.id] = cargo; });
      (hd.inventories || []).forEach(inv => {
        const slots = (inv.inventory || [])
          .filter(slot => slot.contents && slot.contents.item_id)
          .map(slot => ({
            contents: {
              itemId:   slot.contents.item_id,
              itemType: (slot.contents.item_type === 'cargo' || slot.contents.item_type === 1) ? 1 : 0,
              quantity: slot.contents.quantity
            }
          }));
        if (!slots.length) return;
        housingInvs.push({
          inventoryName: inv.buildingNickname || inv.buildingName || hd.buildingName || 'House',
          claimName:     hd.claimName  || house.claimName  || 'Housing',
          regionId:      hd.regionId   || house.regionId   || null,
          _isHousing: true,
          pockets: slots
        });
      });
    });
    invData = { ...d, inventories: [...(d.inventories || []), ...housingInvs] };
  } catch(e) { /* silently ignore */ }
}

function computePlannerInvMap() {
  if (!invData || !plannerTrackedInvs) { plannerInvMap = {}; return; }

  // Build name → crafting-data ID lookup (bitjita uses different IDs than crafting data)
  const nameToId = {};
  if (craftingData) {
    craftingData.items.forEach(i => {
      if (i.name) nameToId[i.name.toLowerCase()] = i.id;
    });
  }

  const map = {};
  const {inventories=[], items={}, cargos={}} = invData;
  inventories.forEach((inv, idx) => {
    if (!plannerTrackedInvs.has(idx)) return;
    (inv.pockets || []).forEach(pocket => {
      const s = slotContents(pocket);
      if (!s) return;
      const isCargo = s.itemType === 1;
      const meta = isCargo ? cargos[s.itemId] : items[s.itemId];
      // Cross-reference to crafting data by name; fall back to raw ID
      const itemName = meta?.name || meta?.itemName || '';
      const craftId = itemName ? nameToId[itemName.toLowerCase()] : undefined;
      const key = craftId !== undefined ? craftId : s.itemId;
      map[key] = (map[key] || 0) + s.quantity;
    });
  });
  plannerInvMap = map;
}

function renderPlannerInventory() {
  const el = document.getElementById('planner-inv-body');
  if (!el) return;
  if (!currentPlayer) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:.25rem 0"><i class="ti ti-user-x"></i> Search for a player to load inventory</div>';
    return;
  }
  if (!invData) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:.25rem 0"><span class="dot-spin"></span> Loading inventory…</div>';
    return;
  }
  const invs = invData.inventories || [];
  if (!invs.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:.25rem 0">No inventory locations found</div>';
    return;
  }
  // Init tracked set on first load — restore from localStorage or default to none
  if (plannerTrackedInvs === null) {
    const saved = _loadPlannerTrackedNames();
    if (saved === 'all') plannerTrackedInvs = new Set(invs.map((_,i)=>i));
    else if (saved !== null) plannerTrackedInvs = _resolveTrackedByName(invs, saved);
    else plannerTrackedInvs = new Set(); // default: none
    computePlannerInvMap();
  }

  // Categorize inventories into 3 groups
  const cats = { personal: [], house: [], bank: [] };
  invs.forEach((inv, idx) => {
    if (inv._isHousing)      cats.house.push({ inv, idx });
    else if (inv.claimName)  cats.bank.push({ inv, idx });
    else                     cats.personal.push({ inv, idx });
  });

  const makeChip = ({ inv, idx }) => {
    const name   = escHtml(inv.inventoryName || inv.buildingName || 'Inventory');
    // Only show claim name for bank/storage, not for housing
    const claim  = (!inv._isHousing && inv.claimName) ? `<span class="inv-loc-claim">· ${escHtml(inv.claimName)}</span>` : '';
    const slots  = (inv.pockets || []).filter(p => slotContents(p)).length;
    const active = plannerTrackedInvs.has(idx);
    const icon   = active ? 'ti-checkbox' : 'ti-square';
    return `<span class="planner-inv-loc${active ? ' active' : ''}" onclick="togglePlannerInvLoc(${idx})">
      <i class="ti ${icon}" style="font-size:13px"></i>${name}${claim}
      <span class="inv-loc-count">${slots}</span>
    </span>`;
  };

  const renderCat = (label, icon, items) => {
    if (!items.length) return '';
    return `<div class="planner-inv-cat">
      <div class="planner-inv-cat-hdr"><i class="ti ${icon}"></i>${label}</div>
      <div class="planner-inv-chips">${items.map(makeChip).join('')}</div>
    </div>`;
  };

  const trackedQty = Object.values(plannerInvMap).reduce((s, v) => s + v, 0);
  el.innerHTML = `
    <div class="planner-inv-cats">
      ${renderCat('Personal', 'ti-user', cats.personal)}
      ${renderCat('House', 'ti-home', cats.house)}
      ${renderCat('Town Banks', 'ti-building-bank', cats.bank)}
    </div>
    <div class="planner-inv-footer">
      <span>${plannerTrackedInvs.size}/${invs.length} tracked · ${fmtCount(trackedQty)} items</span>
      <span class="planner-inv-toggle" onclick="toggleAllPlannerInvs(true)">All</span>
      <span style="color:var(--text3)">·</span>
      <span class="planner-inv-toggle" onclick="toggleAllPlannerInvs(false)">None</span>
      <span style="flex:1"></span>
      <button id="live-btn-planner" class="btn live-btn" onclick="toggleTabLive('planner')"><i class="ti ti-player-play"></i> Live</button>
      <button class="btn ctrl-btn" onclick="refreshPlannerInv()"><i class="ti ti-refresh"></i> Refresh</button>
    </div>`;
  updateLiveBtns();
}

function togglePlannerInvSection() {
  plannerInvOpen = !plannerInvOpen;
  const body = document.getElementById('planner-inv-body');
  const chevron = document.getElementById('planner-inv-chevron');
  if (body) body.style.display = plannerInvOpen ? '' : 'none';
  if (chevron) chevron.className = `ti ti-chevron-${plannerInvOpen?'down':'right'}`;
  if (plannerInvOpen && currentPlayer && !invData) {
    loadPlannerInventory().then(() => {
      if (plannerTrackedInvs === null && invData) {
        const saved = _loadPlannerTrackedNames();
        const invs = invData.inventories || [];
        if (saved === 'all') plannerTrackedInvs = new Set(invs.map((_,i)=>i));
        else if (saved !== null) plannerTrackedInvs = _resolveTrackedByName(invs, saved);
        else plannerTrackedInvs = new Set();
        computePlannerInvMap();
      }
      renderPlannerInventory();
      renderPlanPanel();
      renderBuildingSteps();
    });
  }
}

function togglePlannerInvLoc(idx) {
  if (!plannerTrackedInvs) plannerTrackedInvs = new Set();
  if (plannerTrackedInvs.has(idx)) plannerTrackedInvs.delete(idx);
  else plannerTrackedInvs.add(idx);
  computePlannerInvMap();
  _savePlannerTrackedNames();
  renderPlannerInventory();
  renderPlanPanel();
  renderBuildingSteps();
}

function toggleAllPlannerInvs(all) {
  if (!invData) return;
  plannerTrackedInvs = all ? new Set((invData.inventories||[]).map((_,i)=>i)) : new Set();
  computePlannerInvMap();
  _savePlannerTrackedNames();
  renderPlannerInventory();
  renderPlanPanel();
  renderBuildingSteps();
}

function invAwareChip(qty, itemId, extraCls) {
  const id = +itemId;
  const item = craftingData.itemsById[id];
  const name = item ? escHtml(item.name) : `Item ${id}`;
  const have = plannerInvMap[id] || 0;
  const hasInv = Object.keys(plannerInvMap).length > 0;
  let invCls = '', tag = '';
  if (hasInv) {
    if (have >= qty)      { invCls = ' inv-have';    tag = `<span class="inv-tag have">${fmtCount(have)}</span>`; }
    else if (have > 0)   { invCls = ' inv-partial';  tag = `<span class="inv-tag partial">${fmtCount(have)}</span>`; }
    else                 { invCls = ' inv-missing'; }
  }
  return `<span class="bs-chip ${extraCls}${invCls}"><span class="bq">${fmtCount(qty)}×</span> ${name}${tag}</span>`;
}

function planMatChip(qty, itemId) {
  const item = craftingData.itemsById[+itemId];
  const name = item ? escHtml(item.name) : `Item ${itemId}`;
  const have = plannerInvMap[+itemId] || 0;
  const hasInv = Object.keys(plannerInvMap).length > 0;
  let invCls = '', tag = '';
  if (hasInv) {
    if (have >= qty)     { invCls = ' inv-have';    tag = `<span class="inv-tag have">${fmtCount(have)}</span>`; }
    else if (have > 0)   { invCls = ' inv-partial';  tag = `<span class="inv-tag partial">${fmtCount(have)}</span>`; }
    else                 { invCls = ' inv-missing'; }
  }
  return `<span class="plan-mat-chip${invCls}"><span class="mc-qty">${fmtCount(qty)}×</span>${name}${tag}</span>`;
}

// ── BUILDING STEPS ──
function buildBuildingSteps() {
  if (!craftingData || !plannerPlan.length) return {gather:[], craft:[]};

  // Pass 1: accumulate raw requested quantities for every item in the plan trees
  const requested = {}; // itemId -> total qty requested across all plan items
  function accReq(itemId, qty, vis) {
    if (vis.has(itemId)) return;
    const recipe = plannerBestRecipe(itemId);
    if (!recipe) {
      requested[itemId] = (requested[itemId] || 0) + qty;
      return;
    }
    const outEntry = recipe.outputs.find(o => o.itemId === itemId) || {quantity: 1};
    const mult = Math.ceil(qty / outEntry.quantity);
    const produced = mult * outEntry.quantity;
    requested[itemId] = (requested[itemId] || 0) + produced;
    const newVis = new Set(vis).add(itemId);
    recipe.inputs.forEach(inp => accReq(inp.itemId, inp.quantity * mult, newVis));
  }
  plannerPlan.forEach(p => accReq(p.itemId, p.qty, new Set()));

  // Pass 2: topological sort (dependencies before dependents)
  const order = [];
  const sorted = new Set();
  function topoSort(itemId, vis) {
    if (sorted.has(itemId) || vis.has(itemId)) return;
    const recipe = plannerBestRecipe(itemId);
    if (recipe) {
      const newVis = new Set(vis).add(itemId);
      recipe.inputs.forEach(inp => topoSort(inp.itemId, newVis));
    }
    sorted.add(itemId);
    order.push(itemId);
  }
  plannerPlan.forEach(p => topoSort(p.itemId, new Set()));

  // Pass 3: generate steps
  const gather = [], craft = [];
  order.forEach(itemId => {
    const qty = requested[itemId];
    if (!qty) return;
    const recipe = plannerBestRecipe(itemId);
    if (!recipe) {
      gather.push({itemId, qty});
    } else {
      const outEntry = recipe.outputs.find(o => o.itemId === itemId) || {quantity: 1};
      const mult = Math.ceil(qty / outEntry.quantity);
      const produced = mult * outEntry.quantity;
      const inputs = recipe.inputs.map(inp => ({itemId: inp.itemId, qty: inp.quantity * mult}));
      craft.push({itemId, qty: produced, inputs});
    }
  });

  return {gather, craft};
}

function renderBuildingSteps() {
  const el = document.getElementById('planner-building-steps');
  if (!el) return;
  if (!craftingData || !plannerPlan.length) {
    el.innerHTML = '<div class="empty" style="padding:.5rem 0"><i class="ti ti-list-check"></i><span>Add items to your plan to see building steps</span></div>';
    return;
  }

  const {gather, craft} = buildBuildingSteps();
  const total = gather.length + craft.length;
  const checkedCount = [...bsChecked].filter(k => {
    const [t, id] = k.split('_');
    return (t==='g' && gather.some(s=>String(s.itemId)===id)) || (t==='c' && craft.some(s=>String(s.itemId)===id));
  }).length;

  let gHtml = '';
  if (gather.length) {
    gHtml = `<div class="bs-section-label"><i class="ti ti-antenna" style="color:var(--amber)"></i> GATHER <span class="bs-label-count">${gather.length}</span></div>`;
    gather.forEach((s, i) => {
      const key = `g_${s.itemId}`;
      const done = bsChecked.has(key);
      gHtml += `<div class="bs-row${done?' bs-done':''}">
        <input type="checkbox"${done?' checked':''} onchange="toggleBsStep('${key}',this)">
        <span class="bs-num">${i+1}.</span>
        <div class="bs-body">
          <div class="bs-line1"><span class="bs-verb">Gather</span>${invAwareChip(s.qty, s.itemId, 'gather')}</div>
        </div>
      </div>`;
    });
  }

  let cHtml = '';
  if (craft.length) {
    cHtml = `<div class="bs-section-label"><i class="ti ti-bolt" style="color:var(--teal)"></i> CRAFT <span class="bs-label-count">${craft.length}</span></div>`;
    craft.forEach((s, i) => {
      const key = `c_${s.itemId}`;
      const done = bsChecked.has(key);
      const inputChips = s.inputs.map(inp => invAwareChip(inp.qty, inp.itemId, '')).join(' ');
      cHtml += `<div class="bs-row${done?' bs-done':''}">
        <input type="checkbox"${done?' checked':''} onchange="toggleBsStep('${key}',this)">
        <span class="bs-num">${i+1}.</span>
        <div class="bs-body">
          <div class="bs-line1"><span class="bs-verb">Craft</span>${invAwareChip(s.qty, s.itemId, 'craft-out')}</div>
          <div class="bs-line2"><span class="bs-from">from</span>${inputChips}</div>
        </div>
      </div>`;
    });
  }

  el.innerHTML = `
    <div class="bs-hdr">
      <div class="bs-hdr-title"><i class="ti ti-checklist"></i> Building Steps</div>
      <span class="bs-hdr-count">${checkedCount}/${total}</span>
    </div>
    ${gHtml}${cHtml}`;
}

function toggleBsStep(key, cb) {
  if (cb.checked) bsChecked.add(key); else bsChecked.delete(key);
  savePlanToStorage();
  const row = cb.closest('.bs-row');
  if (row) row.classList.toggle('bs-done', cb.checked);
  const countEl = document.querySelector('#planner-building-steps .bs-hdr-count');
  if (countEl) {
    const el = document.getElementById('planner-building-steps');
    const total = el.querySelectorAll('input[type=checkbox]').length;
    const checked = el.querySelectorAll('input[type=checkbox]:checked').length;
    countEl.textContent = `${checked}/${total}`;
  }
}

// ── HELPERS ──
function fmtRegion(o){const n=o.regionName,i=o.regionId;if(n&&i)return escHtml(n)+' (R'+i+')';if(n)return escHtml(n);if(i)return'R'+i;return'—';}
// Uniform region dropdown styling/order across Market, Shopping, Deals: "Name (R##)", sorted by region id.
function regionOptLabel(r){const id=r.id||r.regionId||r.entityId||'';const name=r.regionName||r.name||('Region '+id);return id?`${escHtml(name)} (R${id})`:escHtml(name);}
function regionsSorted(){return [...marketRegions].sort((a,b)=>(+(a.id||a.regionId||a.entityId||0))-(+(b.id||b.regionId||b.entityId||0)));}
function regionOptionsHtml(selected){
  const sel = (selected==null) ? '' : String(selected);
  return '<option value=""'+(sel===''?' selected':'')+'>All regions</option>'+
    regionsSorted().map(r=>{const id=String(r.id||r.regionId||r.entityId||'');return `<option value="${id}"${id===sel?' selected':''}>${regionOptLabel(r)}</option>`;}).join('');
}
function fmtNum(n){if(n===null||n===undefined)return'—';n=Number(n);if(isNaN(n))return'—';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.round(n).toLocaleString();}
function fmtCount(n){if(n===null||n===undefined)return'—';n=Number(n);if(isNaN(n))return'—';return Math.round(n).toLocaleString();}
// Rarity may arrive as a number (0-6, market API) or a string ("Rare", crafting data). Normalize both.
const RARITY_NAMES = ['', 'Common', 'Uncommon', 'Rare', 'Epic', 'Legendary', 'Mythic'];
function rarityName(r){
  if(r===null||r===undefined||r==='')return'';
  if(typeof r==='number')return RARITY_NAMES[r]||'';
  const s=String(r).trim();
  if(/^\d+$/.test(s))return RARITY_NAMES[+s]||'';
  const l=s.toLowerCase();
  if(l==='default'||l==='none')return'';
  return s;
}
function rarityClass(r){
  const s=rarityName(r).toLowerCase();
  if(s.includes('mythic'))return'badge-mythic';
  if(s.includes('legendary'))return'badge-legendary';
  if(s.includes('epic'))return'badge-epic';
  if(s.includes('rare'))return'badge-rare';
  if(s.includes('uncommon'))return'badge-uncommon';
  return'badge-common';
}
function fmtCoin(n){if(n===null||n===undefined)return'—';n=Number(n);if(isNaN(n)||n===0)return'—';return fmtNum(n)+' ⬡';}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cap(s){return s?s[0].toUpperCase()+s.slice(1):'';}
function loading(){return'<div class="loading"><span class="dot-spin"></span> Loading...</div>';}
function errBox(e){return`<div class="error-msg"><i class="ti ti-alert-circle"></i> ${e?escHtml(e.message):'Error loading data'}</div>`;}
function itemLabel(meta, itemId, itemType) {
  if (!meta) return (itemType === 1 ? 'Cargo ' : 'Item ') + itemId;
  const name = meta.name || '';
  if (meta.tier && meta.tier > 0) return 'T' + meta.tier + ' - ' + name;
  return name;
}
function slotContents(slot) {
  // API may return pockets as {itemId,itemType,quantity} or {contents:{itemId,...}}
  return (slot.contents && slot.contents.itemId) ? slot.contents : (slot.itemId ? slot : null);
}

// Bootstrap. Pull any server-backed prefs FIRST (fills keys missing locally — restores a fresh or
// cleared browser from the backup) so the initial render doesn't overwrite the backup with defaults.
// restorePrefsFromServer has a short timeout, so a slow/absent backend never blocks the UI for long.
(async () => {
  try { await restorePrefsFromServer(); } catch(e) {}
  try { const t = localStorage.getItem('bc_tab'); if (t && document.getElementById('tab-'+t)) currentTab = t; } catch(e) {}
  // Load saved shopping lists so in-memory state mirrors storage before the Shopping tab is opened.
  try { loadShoppingLists(); } catch(e) {}
  initSearch();
  // Restore last player (calls loadTab for player-dependent tabs)
  try { const saved = JSON.parse(localStorage.getItem('bc_player')); if (saved?.entityId) selectPlayer(saved); } catch(e) {}
  // Switch to saved tab: updates nav highlight, renders non-player tabs (market, deals, shopping)
  switchTab(currentTab);
})();
</script>
