  el.innerHTML = `
    ${listBar}
    <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:.35rem;flex:1;min-width:180px;position:relative">
        <i class="ti ti-search" style="position:absolute;left:8px;color:var(--text3);font-size:13px;pointer-events:none"></i>
        <input type="text" id="shopping-search-inp" placeholder="Search items to add…"
          style="flex:1;padding:7px 10px 7px 28px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:6px;font-size:13px;outline:none"
          oninput="shoppingSearchType(this.value)"
          onkeydown="if(event.key==='Enter'){shoppingAddFirst();this.value='';shoppingSearchType('')}
                     else if(event.key==='Escape'){this.value='';shoppingSearchType('')}">
        <button class="btn primary" onclick="shoppingAddFirst()"><i class="ti ti-plus"></i> Add</button>
      </div>
      <select id="shopping-region-sel" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:6px 8px;font-size:12px;outline:none;cursor:pointer"
        onchange="shoppingRegionFilter=this.value;shoppingInvalidatePrices();fetchAllShoppingPrices()">
        ${regionOpts}
      </select>
      <button class="btn" onclick="fetchAllShoppingPrices()" title="Refresh market prices for all items">
        <i class="ti ti-refresh"></i> Refresh prices
      </button>
      <button id="live-btn-shopping" class="btn live-btn" onclick="toggleTabLive('shopping')" title="Auto-refresh prices every 5 minutes"></button>
      <span id="shopping-live-label" class="live-status-label"></span>
    </div>
    <div id="shopping-search-dropdown" style="position:relative;z-index:20;margin-bottom:.25rem"></div>
    <div id="shopping-list-el">${renderShoppingListHtml()}</div>`;

  updateLiveBtns();
}

function shoppingSearchType(q) {
  shoppingSearchQ = q.trim().toLowerCase();
  const dd = document.getElementById('shopping-search-dropdown');
  if (!dd) return;
  if (!shoppingSearchQ || shoppingSearchQ.length < 2) { dd.innerHTML = ''; return; }

  // Search market API items (loaded on tab open)
  const pool = shoppingMarketItems.length ? shoppingMarketItems : marketRawItems;
  let results = [];
  if (pool.length) {
    results = pool
      .filter(it => (it.name||'').toLowerCase().includes(shoppingSearchQ))
      .sort((a,b) => {
        const an = (a.name||'').toLowerCase(), bn = (b.name||'').toLowerCase();
        const ai = an.indexOf(shoppingSearchQ), bi = bn.indexOf(shoppingSearchQ);
        if (ai !== bi) return ai - bi;
        return an.localeCompare(bn);
      })
      .slice(0, 12)
      .map(it => ({
        id:      it.id || it.itemId,
        name:    it.name || ('Item ' + (it.id||it.itemId)),
        isCargo: it.type === 'cargo' || it.isCargo || it.itemType === 1,
        tier:    it.tier > 0 ? it.tier : 0,
        rarity:  rarityName(it.rarityStr ?? it.rarity)
      }));
  }
  shoppingSearchResults = results;

  if (!results.length) {
    dd.innerHTML = `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem;font-size:12px;color:var(--text3)">${pool.length ? 'No items found' : 'Loading market items… try again in a moment'}</div>`;
    return;
  }

  const alreadyInList = new Set(shoppingItems.map(s => String(s.id)));

  dd.innerHTML = `<div style="background:var(--bg2);border:1px solid var(--border2);border-radius:6px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.4)">
    ${results.map((r,i) => {
      const inList = alreadyInList.has(String(r.id));
      const tierChip = r.tier ? `<span class="badge badge-tier" style="font-size:9px;padding:0 4px">T${r.tier}</span>` : '';
      const rarChip  = r.rarity ? `<span class="badge ${rarityClass(r.rarity)}" style="font-size:9px;padding:0 4px">${escHtml(r.rarity)}</span>` : '';
      const chips = (tierChip || rarChip) ? `<span style="display:inline-flex;gap:3px;margin-left:.35rem;vertical-align:middle">${tierChip}${rarChip}</span>` : '';
      return `<div class="shopping-dd-row" onclick="shoppingAddItem(${i})"
        style="padding:.4rem .75rem;cursor:pointer;font-size:13px;color:${inList?'var(--text3)':'var(--text)'};border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.35rem">
        <i class="ti ti-box" style="color:var(--text3);font-size:12px;flex-shrink:0"></i>
        <span style="flex:1">${escHtml(r.name)}${chips}</span>
        ${inList ? '<span style="font-size:10px;color:var(--text3)">added</span>' : ''}
      </div>`;
    }).join('')}
  </div>`;
}

function shoppingAddItem(resultIdx) {
  const it = shoppingSearchResults[resultIdx];
  if (!it) return;
  // Don't add the exact same item ID twice (same-named different-tier items have different IDs)
  if (!shoppingItems.find(s => String(s.id) === String(it.id))) {
    shoppingItems.push({
      id: it.id, name: it.name, isCargo: !!it.isCargo,
      tier: it.tier > 0 ? it.tier : 0,
      rarity: rarityName(it.rarity ?? it.rarityStr)
    });
    saveShoppingItems();
  }
  // Clear search
  const inp = document.getElementById('shopping-search-inp');
  if (inp) inp.value = '';
  shoppingSearchQ = '';
  const dd = document.getElementById('shopping-search-dropdown');
  if (dd) dd.innerHTML = '';
  // Re-render list
  const listEl = document.getElementById('shopping-list-el');
  if (listEl) listEl.innerHTML = renderShoppingListHtml();
  // Fetch price for the new item
  if (shoppingItems.length) fetchShoppingPrice(it.id, it.isCargo);
}

function shoppingAddFirst() {
  if (shoppingSearchResults.length) shoppingAddItem(0);
}

function shoppingRemove(idx) {
  const item = shoppingItems[idx];
  if (!item) return;
  if (String(shoppingExpandedItem) === String(item.id)) shoppingExpandedItem = null;
  shoppingItems.splice(idx, 1);
  delete shoppingPrices[item.id];
  saveShoppingItems();
  const listEl = document.getElementById('shopping-list-el');
  if (listEl) listEl.innerHTML = renderShoppingListHtml();
}

function shoppingToggleExpand(id) {
  shoppingExpandedItem = (String(shoppingExpandedItem) === String(id)) ? null : String(id);
  const listEl = document.getElementById('shopping-list-el');
  if (listEl) listEl.innerHTML = renderShoppingListHtml();
}

function renderShoppingListHtml() {
  if (!shoppingItems.length) {
    return `<div class="empty" style="padding:3rem 1rem">
      <i class="ti ti-shopping-cart" style="font-size:2.5rem;color:var(--text3);margin-bottom:.75rem"></i>
      <span>Your shopping list is empty.<br>Search for items above to add them.</span>
    </div>`;
  }

  // Build lookup from shoppingMarketItems for tier/rarity
  const mktById = {};
  shoppingMarketItems.forEach(it => { mktById[String(it.id||it.itemId)] = it; });
  marketRawItems.forEach(it => { if (!mktById[String(it.id||it.itemId)]) mktById[String(it.id||it.itemId)] = it; });

  function orderCell(o, priceColor) {
    if (!o) return `<span style="color:var(--text3);font-size:12px">—</span>`;
    const locParts = [];
    if (o.regionId) locParts.push(`R${o.regionId}`);
    if (o.claim)    locParts.push(escHtml(o.claim));
    const loc = locParts.join(' · ');
    return `<div style="line-height:1.45">
      <span style="font-weight:600;color:${priceColor}">${fmtNum(o.price)}</span>
      <span style="font-size:11px;color:var(--text3);margin-left:.3rem">${fmtNum(o.qty)} avail</span>
      ${loc ? `<br><span style="font-size:11px;color:var(--text2)">${loc}</span>` : ''}
    </div>`;
  }

  function allOrdersHtml(pd, regionId) {
    if (!pd || pd === 'loading' || pd === 'error' || (!pd.allSell && !pd.allBuy)) return '';
    const filter = orders => regionId ? orders.filter(o => String(o.regionId) === String(regionId)) : orders;
    const sells = filter(pd.allSell||[]).slice().sort((a,b) => +(a.price||0) - +(b.price||0));
    const buys  = filter(pd.allBuy||[]).slice().sort((a,b) => +(b.price||b.priceThreshold||0) - +(a.price||a.priceThreshold||0));

    // Fixed column layout so Price / Amount / Location align across both sub-tables.
    const colgroup = `<colgroup><col style="width:30%"><col style="width:22%"><col style="width:48%"></colgroup>`;
    const headerRow = `<tr style="font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);background:var(--bg3)">
      <th style="padding:.3rem .75rem;text-align:left;font-weight:600">Price</th>
      <th style="padding:.3rem .5rem;text-align:left;font-weight:600">Amount</th>
      <th style="padding:.3rem .75rem;text-align:left;font-weight:600">Location</th>
    </tr>`;

    const orderRow = (o, priceColor) => {
      const price = +(o.price||o.priceThreshold||0);
      const qty   = +(o.quantity||0);
      const loc   = [o.regionId ? `R${o.regionId}` : '', o.claimName||o.settlementName||''].filter(Boolean).join(' · ');
      return `<tr style="border-top:1px solid var(--border)">
        <td style="padding:.3rem .75rem;font-weight:600;color:${priceColor}">${fmtNum(price)}</td>
        <td style="padding:.3rem .5rem;color:var(--text2);font-size:12px">${fmtNum(qty)}</td>
        <td style="padding:.3rem .75rem;font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(loc)||'—'}</td>
      </tr>`;
    };

    const section = (title, icon, iconColor, orders, priceColor, kind) =>
      `<div style="padding:.5rem .75rem .35rem;border-top:1px solid var(--border)">
        <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)"><i class="ti ${icon}" style="color:${iconColor};margin-right:.3rem"></i>${title} (${orders.length})</span>
      </div>` + (orders.length
        ? `<table style="width:100%;border-collapse:collapse;table-layout:fixed">${colgroup}
            <thead>${headerRow}</thead>
            <tbody>${orders.map(o=>orderRow(o,priceColor)).join('')}</tbody>
          </table>`
        : `<div style="padding:0 .75rem .5rem;font-size:12px;color:var(--text3)">No ${kind} orders${regionId?' in this region':''}</div>`);

    const sellSection = section('Sell orders','ti-tag','#f09595',sells,'var(--green-light)','sell');
    const buySection  = section('Buy orders','ti-shopping-cart','var(--green-light)',buys,'var(--amber-light)','buy');

    return `<tr><td colspan="4" style="padding:0;background:var(--bg2)">${sellSection}${buySection}</td></tr>`;
  }

  const rows = shoppingItems.map((item, i) => {
    const pd = shoppingPrices[item.id];
    let sellCell = '<span style="color:var(--text3)">—</span>';
    let buyCell  = '<span style="color:var(--text3)">—</span>';
    const isExpanded = shoppingExpandedItem !== null && String(shoppingExpandedItem) === String(item.id);

    if (pd === 'loading') {
      sellCell = buyCell = `<span style="color:var(--text3);font-size:12px"><i class="ti ti-loader-2" style="animation:spin 1s linear infinite;display:inline-block"></i></span>`;
    } else if (pd === 'error') {
      sellCell = buyCell = `<span style="font-size:11px;color:var(--red-light)">Error</span>`;
    } else if (pd) {
      sellCell = orderCell(pd.sell || null, 'var(--green-light)');
      buyCell  = orderCell(pd.buy  || null, 'var(--amber-light)');
    }

    // Tier/rarity chips (normalize rarity which may be number or string)
    const mkt = mktById[String(item.id)];
    const rawTier = item.tier || mkt?.tier || 0;
    const tier   = rawTier > 0 ? rawTier : 0;
    const rarity = rarityName(item.rarity || mkt?.rarityStr || mkt?.rarity);
    const chips = (tier || rarity) ? `
      ${tier ? `<span class="badge badge-tier" style="font-size:10px;padding:1px 5px">T${tier}</span>` : ''}
      ${rarity ? `<span class="badge ${rarityClass(rarity)}" style="font-size:10px;padding:1px 5px">${escHtml(rarity)}</span>` : ''}
    ` : '';

    const expandedRows = isExpanded ? allOrdersHtml(pd, shoppingRegionFilter||null) : '';

    return `<tr style="border-bottom:${isExpanded?'none':'1px solid var(--border)'};cursor:pointer;${isExpanded?'background:var(--bg3)':''}" onclick="shoppingToggleExpand('${item.id}')">
      <td style="padding:.5rem .75rem">
        <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:500;color:var(--text)">${escHtml(item.name)}</span>
          ${item.isCargo ? '<span style="font-size:10px;background:var(--bg3);color:var(--text3);border-radius:3px;padding:1px 5px">cargo</span>' : ''}
          ${chips}
          <i class="ti ti-chevron-${isExpanded?'up':'down'}" style="font-size:11px;color:var(--text3);margin-left:auto"></i>
        </div>
      </td>
      <td style="padding:.5rem .75rem">${sellCell}</td>
      <td style="padding:.5rem .75rem">${buyCell}</td>
      <td style="padding:.5rem .5rem;text-align:right" onclick="event.stopPropagation()">
        <button class="btn" style="padding:3px 7px;min-width:0;font-size:12px" onclick="shoppingRemove(${i})" title="Remove from list">
          <i class="ti ti-x" style="font-size:11px"></i>
        </button>
      </td>
    </tr>${expandedRows}`;
  }).join('');

  return `<div class="card" style="overflow:hidden">
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="background:var(--bg3);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)">
          <th style="padding:.4rem .75rem;text-align:left;font-weight:600">Item</th>
          <th style="padding:.4rem .75rem;text-align:left;font-weight:600"><i class="ti ti-tag" style="color:#f09595;font-size:12px"></i> Best sell</th>
          <th style="padding:.4rem .75rem;text-align:left;font-weight:600"><i class="ti ti-shopping-cart" style="color:var(--green-light);font-size:12px"></i> Best buy</th>
          <th style="padding:.4rem .5rem;width:36px"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    ${shoppingPricingActive ? `<div style="padding:.5rem .75rem;font-size:11px;color:var(--text3);border-top:1px solid var(--border)"><i class="ti ti-loader-2" style="animation:spin 1s linear infinite;display:inline-block;margin-right:.35rem"></i>Fetching prices…</div>` : ''}
  </div>`;
}

async function fetchShoppingPrice(id, isCargo) {
  shoppingPrices[id] = 'loading';
  _refreshShoppingRow(id);
  try {
    const type = isCargo ? 'cargo' : 'item';
    const d = await fetchWithCache(type, id, 15000);
    const regionId = shoppingRegionFilter || null;

    const pickOrder = (orders, compareFn) => {
      if (!orders || !orders.length) return null;
      const filtered = regionId ? orders.filter(o => String(o.regionId) === String(regionId)) : orders;
      if (!filtered.length) return null;
      filtered.sort(compareFn);
      const best = filtered[0];
      return {
        price:    +(best.price||best.priceThreshold||0),
        qty:      +(best.quantity||0),
        claim:    best.claimName || best.settlementName || '',
        regionId: best.regionId || null
      };
    };

    shoppingPrices[id] = {
      sell: pickOrder(d.sellOrders||[], (a,b) => +(a.price||0) - +(b.price||0)),  // cheapest sell
      buy:  pickOrder(d.buyOrders||[],  (a,b) => +(b.price||b.priceThreshold||0) - +(a.price||a.priceThreshold||0)),   // highest buy
      allSell: d.sellOrders || [],
      allBuy:  d.buyOrders  || []
    };
  } catch(e) {
    shoppingPrices[id] = 'error';
  }
  _refreshShoppingRow(id);
}

function _refreshShoppingRow(id) {
  // Re-render just the list to show new prices
  const listEl = document.getElementById('shopping-list-el');
  if (listEl) listEl.innerHTML = renderShoppingListHtml();
}

async function fetchAllShoppingPrices() {
  if (shoppingPricingActive) return;
  shoppingPricingActive = true;
  // Ensure market regions are loaded for region name lookup
  if (!marketRegions.length) {
    try { const d = await apiFetch('/api/regions'); marketRegions = Array.isArray(d)?d:(d.regions||[]); } catch(e){}
  }
  const items = [...shoppingItems];
  for (const item of items) {
    await fetchShoppingPrice(item.id, item.isCargo);
  }
  shoppingPricingActive = false;
  const listEl = document.getElementById('shopping-list-el');
  if (listEl) listEl.innerHTML = renderShoppingListHtml();
}

function shoppingInvalidatePrices() {
  // Clear cached prices so region change forces a re-fetch
  shoppingPrices = {};
  const listEl = document.getElementById('shopping-list-el');
  if (listEl) listEl.innerHTML = renderShoppingListHtml();
}

// ── MAP ──
// Leaflet map. The custom CRS + base-image approach is adapted from the open-source
// bitcraftmap project (BSD-2-Clause). Map data: bitcraftmap · bitjita.
let bcMap = null;            // Leaflet map instance (created once)
let bcMapInited = false;
const BC_APOTHEM = 2 / Math.sqrt(3);
const BC_MAP_W = 38400, BC_MAP_H = 38400;
// Persist the map view (center + zoom) so a refresh returns to the same spot instead of zooming out.
function bcSaveMapView(){
  if (!bcMap) return;
  try { const c = bcMap.getCenter(); safeSetItem('bc_map_view', JSON.stringify({ lat:c.lat, lng:c.lng, zoom:bcMap.getZoom() })); } catch(e){}
}
function bcLoadMapView(){
  try {
    const v = JSON.parse(localStorage.getItem('bc_map_view')||'null');
    return (v && Number.isFinite(v.lat) && Number.isFinite(v.lng) && Number.isFinite(v.zoom)) ? v : null;
  } catch(e){ return null; }
}
const BC_TIER_COLORS = {
  0:'#8a8f9c',1:'#9aa3ad',2:'#c08a5a',3:'#7fa355',4:'#55a0f5',
  5:'#9b5af0',6:'#f0a83a',7:'#f0653a',8:'#f03a6e',9:'#3af0d0',10:'#ffffff'
};

function bcMapCRS() {
  // BitCraft hex grid: vertical axis scaled by the hex apothem. Identity pixel transform.
  return L.extend({}, L.CRS.Simple, {
    projection: {
      project(latlng){ return new L.Point(latlng.lng, -latlng.lat / BC_APOTHEM); },
      unproject(point){ return new L.LatLng(-point.y * BC_APOTHEM, point.x); },
      bounds: L.bounds([0,0],[BC_MAP_W, BC_MAP_H])
    },
    transformation: new L.Transformation(1,0,1,0),
    scale(z){ return Math.pow(2, z); },
    infinite: true   // content projects to negative Y; infinite:false would clamp those tiles away
  });
}

async function bcLoadGeo(name){
  // Live datasets from bitjita's map exports (proxied). Either FeatureCollections or plain arrays.
  try {
    const r = await fetch(`${API}/bcexports/${name}`);
    if (!r.ok) return [];
    const d = await r.json();
    return Array.isArray(d) ? d : (d.features || []);
  } catch(e){ return []; }
}

function bcFeatLatLng(f){
  // GeoJSON [x, y] → Leaflet latLng(y, x); lat = Z (north), lng = X (east)
  const c = f && f.geometry && f.geometry.coordinates;
  if (!c || c.length < 2) return null;
  return L.latLng(c[1], c[0]);
}

// ----- Hexite Vault world events (live, timed POIs from events.geojson) -----
// These are world events (not resources — bcmap-api has no point layer for them), served live with a
// reset timer. Rendered as their own toggleable map layer that refreshes periodically.
let bcEventsLayer = null, bcVaultIcon = null, bcEventsTimer = null;
function bcGetVaultIcon(){
  if (bcVaultIcon) return bcVaultIcon;
  const svg = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='2.5' y='3.5' width='19' height='17' rx='3' fill='%23161d29' stroke='%235eead4' stroke-width='1.7'/><path d='M12 6.2l4.8 2.8v5.6L12 17.4 7.2 14.6V9z' fill='%230d9488' stroke='%235eead4' stroke-width='1'/><circle cx='12' cy='12' r='2.1' fill='%23fbbf24'/></svg>";
  bcVaultIcon = L.icon({ iconUrl: svg, iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-14] });
  return bcVaultIcon;
}
function bcFmtDur(ms){ const s=Math.max(0,Math.floor(ms/1000)); const h=Math.floor(s/3600), m=Math.floor((s%3600)/60); return h>0?`${h}h ${m}m`:`${m}m`; }
function bcVaultPopup(name, ll, timer){
  let t = '';
  if (timer && !isNaN(+timer)){
    const ms = timer - Date.now();
    t = ms > 0
      ? `<br><span style="color:var(--teal-light)">Timer: ${bcFmtDur(ms)}</span> <span style="color:var(--text3)">(${timer.toLocaleTimeString()})</span>`
      : `<br><span style="color:var(--amber-light)">Active</span>`;
  }
  return `<b>${escHtml(name)}</b> <span style="color:var(--text3)">· World event</span>${t}<br><span style="color:var(--text3)">N ${Math.round(ll.lat)} · E ${Math.round(ll.lng)}</span>`;
}
async function bcRefreshEvents(){
  if (!bcEventsLayer) return 0;
  const feats = await bcLoadGeo('events.geojson');
  bcEventsLayer.clearLayers();
  const icon = bcGetVaultIcon();
  feats.forEach(f => {
    const ll = bcFeatLatLng(f); if (!ll) return;
    const p = f.properties || {};
    const m = L.marker(ll, { icon, title: p.name || 'World Event' });
    m.bindPopup(bcVaultPopup(p.name || 'World Event', ll, p.timer ? new Date(p.timer) : null));
    m.addTo(bcEventsLayer);
  });
  return feats.length;
}

async function bcInitMap(){
  bcMap = L.map('map-el', {
    crs: bcMapCRS(), preferCanvas:true, attributionControl:false,
    minZoom:-5, maxZoom:5, zoomSnap:0.1, zoomAnimation:false, boxZoom:false
  });

  // Base terrain — tiled pyramid (apothem handled entirely by the CRS).
  // No `bounds` option: with the negative-Y hex projection it wrongly rejects every tile;
  // out-of-range tiles simply 404 and render blank via errorTileUrl.
  const de = [[0,0],[BC_MAP_H, BC_MAP_W]];
  L.tileLayer(`${API}/bcexports/maps/terrain/tiles/{z}/{x}/{y}.webp`, {
    minZoom:-5, maxZoom:5, minNativeZoom:-5, maxNativeZoom:0,
    tileSize:256, keepBuffer:2, updateWhenZooming:false, errorTileUrl:'', noWrap:true
  }).addTo(bcMap);
  // Restore the last center + zoom (persisted on every pan/zoom); otherwise frame the whole map.
  const savedView = bcLoadMapView();
  if (savedView) bcMap.setView([savedView.lat, savedView.lng], savedView.zoom);
  else bcMap.fitBounds(de);
  bcMap.setMaxBounds([[-3000,-3000],[BC_MAP_H + 3000, BC_MAP_W + 3000]]);
  bcMap.on('moveend', bcSaveMapView); // fires on both pan and zoom

  // ----- Claims — tier banner icons, split into per-tier toggleable layers -----
  const claimIconCache = {};
  const claimIcon = (tier) => {
    const t = (tier >= 0 && tier <= 10) ? tier : 'X';
    if (!claimIconCache[t]) claimIconCache[t] = L.icon({ iconUrl: `${API}/mapassets/${t==='X'?'claim':'claimT'+t}.png`, iconSize:[36,36], iconAnchor:[18,18], popupAnchor:[0,-18] });
    return claimIconCache[t];
  };
  const claimTierLayers = {}, claimTierCount = {}, allClaimMarkers = [];
  const claimsFeats = await bcLoadGeo('claims.geojson');
  claimsFeats.forEach(f => {
    const ll = bcFeatLatLng(f); if (!ll) return;
    const p = f.properties || {};
    const tier = (p.tier >= 0 && p.tier <= 10) ? p.tier : 0;
    if (!claimTierLayers[tier]) { claimTierLayers[tier] = L.layerGroup(); claimTierCount[tier] = 0; }
    claimTierCount[tier]++;
    const m = L.marker(ll, { icon: claimIcon(p.tier), title: p.name || '' });
    m.feature = f; // lets leaflet-search read properties.name
    const tags = [p.has_bank?'Bank':null, p.has_market?'Market':null, p.has_waystone?'Waystone':null].filter(Boolean).join(' · ') || '—';
    m.bindPopup(`<b>${escHtml(p.name||'Claim')}</b> <span style="color:var(--text3)">T${p.tier??'?'}</span><br><span style="color:var(--text3)">N ${Math.round(ll.lat)} · E ${Math.round(ll.lng)}</span><br>${escHtml(tags)}<br><a href="https://bitjita.com/claims/${escHtml(String(p.entityId||''))}" target="_blank">View on bitjita ↗</a>`);
    m.addTo(claimTierLayers[tier]);
    allClaimMarkers.push(m);
  });
  // Layers are placed on the map by bcApplyLayerState() (respecting saved toggles), not here.
  const claimSearchLayer = L.featureGroup(allClaimMarkers); // search data source

  // ----- Caves — split into per-tier toggleable layers -----
  const caveTierLayers = {}, caveTierCount = {};
  const caveFeats = await bcLoadGeo('caves.geojson');
  const oreIconCache = {};
  const oreIcon = (tier) => {
    const t = Math.min(Math.max(tier||1, 1), 10);
    if (!oreIconCache[t]) oreIconCache[t] = L.icon({ iconUrl:`${API}/mapassets/ore_t${t}.webp`, iconSize:[20,20], iconAnchor:[10,10], popupAnchor:[0,-10] });
    return oreIconCache[t];
  };
  caveFeats.forEach(f => {
    const ll = bcFeatLatLng(f); if (!ll) return;
    const p = f.properties || {};
    const tier = (p.tier != null) ? p.tier : 0;
    if (!caveTierLayers[tier]) { caveTierLayers[tier] = L.layerGroup(); caveTierCount[tier] = 0; }
    caveTierCount[tier]++;
    const m = L.marker(ll, { icon: oreIcon(tier), title: p.name || 'Cave' });
    m.bindPopup(`<b>${escHtml(p.name||'Cave')}</b><br><span style="color:var(--text3)">Cave T${p.tier??'?'} · N ${Math.round(ll.lat)} · E ${Math.round(ll.lng)}</span>`);
    m.addTo(caveTierLayers[tier]);
  });

  // ----- Other POI overlay layers (icon-based, like bitcraftmap) -----
  const poiLayer = async (file, iconUrl, size, label) => {
    const icon = L.icon({ iconUrl:`${API}/mapassets/${iconUrl}`, iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2] });
    const layer = L.layerGroup();
    const feats = await bcLoadGeo(file);
    feats.forEach(f => {
      const ll = bcFeatLatLng(f); if (!ll) return;
      const p = f.properties || {};
      const nm = p.name || p.popupText || label;
      const m = L.marker(ll, { icon, title: nm });
      m.bindPopup(`<b>${escHtml(nm)}</b><br><span style="color:var(--text3)">${label} · N ${Math.round(ll.lat)} · E ${Math.round(ll.lng)}</span>`);
      m.addTo(layer);
    });
    return { layer, count: feats.length };
  };
  const dungeons = await poiLayer('dungeons.geojson', 'dungeon.png',      28, 'Dungeon');
  const temples  = await poiLayer('temples.geojson',  'temple.svg',       26, 'Temple');
  const ruined   = await poiLayer('ruined.geojson',   'ruinedCity.png',   28, 'Ruined City');
  const wonders  = await poiLayer('trees.geojson',    'travelerTree.svg', 26, 'Wonder');
  // Hexite Vault world events — own live layer (refreshed on a timer; default on so they're visible)
  bcEventsLayer = L.layerGroup();
  const eventsCount = await bcRefreshEvents();
  if (bcEventsTimer) clearInterval(bcEventsTimer);
  bcEventsTimer = setInterval(() => { if (currentTab === 'map' && !document.hidden) bcRefreshEvents(); }, 120000);
  // (added to the map by bcApplyLayerState)

  // ----- Roads (tiled overlay) -----
  const roadsLayer = L.tileLayer(`${API}/bcexports/roads/tiles/{z}/{x}/{y}.webp`, {
    minZoom:-5, maxZoom:5, minNativeZoom:-5, maxNativeZoom:0,
    tileSize:256, keepBuffer:2, updateWhenZooming:false, errorTileUrl:'', noWrap:true, opacity:0.9
  });

  // ----- Custom layer control (Claims/Caves expand to per-tier toggles) -----
  bcLoadLayers();
  bcLayerReg = { roads:roadsLayer, dungeons:dungeons.layer, temples:temples.layer, ruined:ruined.layer, wonders:wonders.layer, events:bcEventsLayer };
  Object.keys(claimTierLayers).forEach(t => bcLayerReg['claimT'+t] = claimTierLayers[t]);
  Object.keys(caveTierLayers).forEach(t => bcLayerReg['caveT'+t] = caveTierLayers[t]);
  const lc = L.control({ position:'topright' });
  lc.onAdd = function(){
    const div = L.DomUtil.create('div','bc-layerctrl');
    const dot = c => `<span class="bc-lsw" style="background:${c}"></span>`;
    const flat = (k,label,sw) => `<label class="bc-lrow"><input type="checkbox" data-lk="${k}" checked onchange="bcToggleLayer('${k}',this.checked)">${sw}<span>${label}</span></label>`;
    const group = (prefix,label,total,tierMap,counts,color) => {
      const tiers = Object.keys(tierMap).map(Number).sort((a,b)=>a-b);
      return `<div class="bc-lgroup">
        <div class="bc-lghdr">
          <input type="checkbox" id="bc-lgm-${prefix}" checked onchange="bcToggleLayerGroup('${prefix}T',this.checked)">
          ${dot(color)}<span class="bc-lgname" onclick="bcExpandLayerGroup('${prefix}')">${label} (${total})</span>
          <i class="ti ti-chevron-down bc-lgchev" id="bc-lgchev-${prefix}" onclick="bcExpandLayerGroup('${prefix}')"></i>
        </div>
        <div class="bc-lgbody" id="bc-lg-${prefix}" style="display:none">
          ${tiers.map(t=>`<label class="bc-lrow bc-lsub"><input type="checkbox" data-lk="${prefix}T${t}" checked onchange="bcToggleLayer('${prefix}T${t}',this.checked);bcSyncMaster('${prefix}')">T${t} <span class="bc-lcount">(${counts[t]})</span></label>`).join('')}
        </div>
      </div>`;
    };
    div.innerHTML =
      flat('roads','Roads','<span class="bc-lsw" style="background:none;border-top:2px solid #d9b88a;height:0;width:13px;border-radius:0"></span>') +
      group('claim','Claims',claimsFeats.length,claimTierLayers,claimTierCount,'#9aa3ad') +
      group('cave','Caves',caveFeats.length,caveTierLayers,caveTierCount,'#b07cc6') +
      flat('dungeons',`Dungeons (${dungeons.count})`,dot('#e0556e')) +
      flat('temples',`Temples (${temples.count})`,dot('#ffd580')) +
      flat('ruined',`Ruined Cities (${ruined.count})`,dot('#c8c8c8')) +
      flat('wonders',`Wonders (${wonders.count})`,dot('#63c45a')) +
      flat('events',`Hexite Vaults (${eventsCount})`,dot('#5eead4'));
    L.DomEvent.disableClickPropagation(div);
    L.DomEvent.disableScrollPropagation(div);
    return div;
  };
  lc.addTo(bcMap);

  // ----- Search over claims -----
  if (L.Control && L.Control.Search){
    try {
      bcMap.addControl(new L.Control.Search({
        layer: claimSearchLayer, propertyName: 'name',
        initial:false, zoom:2, marker:false, textPlaceholder:'Search claims…',
        moveToLocation: (latlng, title, map) => { map.setView(latlng, 2); }
      }));
    } catch(e){ /* search optional */ }
  }
  // leaflet-search adds its source layer (all claim markers) to the map — remove it so the
  // per-tier toggles fully control claim visibility. Then apply saved toggle state (adds ON layers).
  if (bcMap.hasLayer(claimSearchLayer)) bcMap.removeLayer(claimSearchLayer);
  bcApplyLayerState();

  // ----- Resource canvas overlay + sidebar wiring -----
  bcResourceLayer = new (bcPointLayerClass())({ radius:3 }).addTo(bcMap);
  await bcLoadIndexes();
  bcLoadHidden();
  bcLoadMapRegion();
  bcInitRegionSelect();
  bcInitResourceFilters();
  bcRenderResourceList();
  bcRenderTrackedResList();
  bcRenderHiddenPanel();
  bcRenderTrackedList();
  const meBtn = document.getElementById('bc-track-me');
  if (meBtn && !currentPlayer) meBtn.style.display = 'none';

  // Restore tracked resources/enemies (refetch their points)
  const savedRes = bcLoadTrackedRes();
  savedRes.forEach(t => { bcTrackedRes[bcResKey(t.kind,t.id)] = { kind:t.kind, id:t.id, name:t.name, tier:t.tier, tag:t.tag, color:t.color, count:0, pts:[] }; });
  if (savedRes.length){ bcRenderTrackedResList(); bcRenderResourceList(); bcRefreshAllTracked(); bcScheduleResourcePoll(); }

  // Restore tracked players (refetch positions + resubscribe)
  bcLoadTrackedPlayers().forEach(p => bcTrackPlayer(p.id, p.name, p.color, p.follow));

  setTimeout(() => bcMap.invalidateSize(), 80);
}

// ===== Map layer control (expandable Claims/Caves by tier) =====
let bcLayerReg = {};
let bcLayersOff = new Set();   // layer keys currently toggled OFF (default = all on); persisted
function bcLoadLayers(){ try { const v = localStorage.getItem('bc_map_layers_v1'); if (v) bcLayersOff = new Set(JSON.parse(v)); } catch(e){} }
function bcSaveLayers(){ safeSetItem('bc_map_layers_v1', JSON.stringify([...bcLayersOff])); }
function bcToggleLayer(k, on){
  const l = bcLayerReg[k]; if (!l || !bcMap) return;
  if (on){ bcLayersOff.delete(k); if (!bcMap.hasLayer(l)) l.addTo(bcMap); }
  else { bcLayersOff.add(k); bcMap.removeLayer(l); }
  bcSaveLayers();
}
function bcToggleLayerGroup(prefix, on){
  Object.keys(bcLayerReg).filter(k => k.startsWith(prefix)).forEach(k => {
    bcToggleLayer(k, on);
    const cb = document.querySelector(`input[data-lk="${k}"]`); if (cb) cb.checked = on;
  });
}
function bcApplyLayerState(){
  // On load: ADD the layers that should be on and remove the ones saved as off, then set checkboxes.
  Object.keys(bcLayerReg).forEach(k => {
    const on = !bcLayersOff.has(k);
    const l = bcLayerReg[k];
    if (l){
      if (on){ if (!bcMap.hasLayer(l)) l.addTo(bcMap); }
      else { if (bcMap.hasLayer(l)) bcMap.removeLayer(l); }
    }
    const cb = document.querySelector(`input[data-lk="${k}"]`); if (cb) cb.checked = on;
  });
  ['claim','cave'].forEach(p => bcSyncMaster(p));
}
function bcExpandLayerGroup(gid){
  const b = document.getElementById('bc-lg-'+gid), c = document.getElementById('bc-lgchev-'+gid);
  if (!b) return; const open = b.style.display === 'none'; b.style.display = open ? '' : 'none';
  if (c) c.style.transform = open ? '' : 'rotate(-90deg)';
}
function bcSyncMaster(prefix){
  const any = Object.keys(bcLayerReg).filter(k => k.startsWith(prefix+'T')).some(k => { const cb = document.querySelector(`input[data-lk="${k}"]`); return cb && cb.checked; });
  const m = document.getElementById('bc-lgm-'+prefix); if (m) m.checked = any;
}

// ===== Phase 2: live player tracking (wss://live.bitjita.com) =====
// Initial position comes from /api/players/{id} (locationX/locationZ, already in map space);
// the websocket then pushes movement updates (location_x/z in ×1000 units).
let bcPlayerSocket = null, bcTracked = {}, bcWsReconnect = null, bcWsPing = null, bcWsManualClose = false;
let bcLastWsMsg = 0; // ms timestamp of the last message received — used to detect a stale/half-open socket
let bcPlayerSearchResults = [];
let bcPlayerPollTimer = null;
const bcPlayerColors = ['#22c55e','#38bdf8','#f472b6','#fbbf24','#a78bfa','#fb7185','#34d399','#f97316'];

function bcPlayerIcon(color){
  return L.divIcon({ className:'bc-player-icon', html:`<div class="bc-player-pulse" style="--pc:${color}"></div>`, iconSize:[18,18], iconAnchor:[9,9], popupAnchor:[0,-9] });
}
async function bcFetchPlayerPos(id){
  try {
    const d = await apiFetch('/api/players/' + id);
    const p = d.player || d;
    return { username: p && p.username, x: (p && p.locationX), z: (p && p.locationZ) };
  } catch(e){ return null; }
}
function bcPlacePlayer(id, x, z, dest){
  const t = bcTracked[id]; if (!t || x == null || z == null) return;
  const ll = L.latLng(z, x);
  t.last = ll;
  if (!t.marker){
    t.marker = L.marker(ll, { icon: bcPlayerIcon(t.color), zIndexOffset:1000 }).addTo(bcMap);
    t.marker.bindTooltip(t.name, { permanent:true, direction:'top', className:'bc-player-tip', offset:[0,-10] });
  } else { t.marker.setLatLng(ll); }
  if (dest && dest.x != null && dest.z != null && (dest.x || dest.z)){
    const dll = L.latLng(dest.z, dest.x);
    if (!t.line) t.line = L.polyline([ll, dll], { color:t.color, weight:1.5, dashArray:'5,5', opacity:.7 }).addTo(bcMap);
    else t.line.setLatLngs([ll, dll]);
  } else if (t.line){ t.line.remove(); t.line = null; }
  if (t.follow) bcMap.panTo(ll);
  bcRenderTrackedList();
}
function bcStartPlayerPoll(){
  if (bcPlayerPollTimer) return;
  // Fallback refresh so stationary/just-logged-in players still update even without ws movement events.
  bcPlayerPollTimer = setInterval(() => {
    if (document.hidden) return;
    Object.keys(bcTracked).forEach(id => bcFetchPlayerPos(id).then(r => { if (r && r.x != null && r.z != null) bcPlacePlayer(id, r.x, r.z); }));
  }, 15000);
}
function bcStopPlayerPoll(){ if (bcPlayerPollTimer){ clearInterval(bcPlayerPollTimer); bcPlayerPollTimer = null; } }

function bcEnsureSocket(){
  if (bcPlayerSocket && (bcPlayerSocket.readyState === 0 || bcPlayerSocket.readyState === 1)) return;
  bcWsManualClose = false;
  try { bcPlayerSocket = new WebSocket('wss://live.bitjita.com'); } catch(e){ return; }
  bcPlayerSocket.onopen = () => {
    bcWsSubscribe();
    clearInterval(bcWsPing);
    bcWsPing = setInterval(() => { try { if (bcPlayerSocket && bcPlayerSocket.readyState === 1) bcPlayerSocket.send(JSON.stringify({type:'ping'})); } catch(e){} }, 30000);
  };
  bcPlayerSocket.onmessage = (e) => { bcLastWsMsg = Date.now(); bcWsHandle(e.data); };
  bcPlayerSocket.onclose = () => {
    clearInterval(bcWsPing);
    if (!bcWsManualClose && Object.keys(bcTracked).length){
      clearTimeout(bcWsReconnect);
      bcWsReconnect = setTimeout(bcEnsureSocket, 2500); // auto-reconnect
    }
  };
  bcPlayerSocket.onerror = () => {};
}
// Tear down the current socket (without letting its onclose schedule a duplicate reconnect) and open
// a fresh one. Used to recover from a half-open socket that still reports readyState OPEN but is dead.
function bcForceReconnect(){
  bcWsManualClose = false;
  clearTimeout(bcWsReconnect);
  try { if (bcPlayerSocket){ bcPlayerSocket.onclose = null; bcPlayerSocket.close(); } } catch(e){}
  bcPlayerSocket = null;
  bcEnsureSocket();
}
// Returning to a backgrounded tab: browsers throttle timers and can silently drop the websocket
// (sometimes half-open, with no close event). Heal everything immediately instead of waiting out the
// poll intervals. Registered once at load.
document.addEventListener('visibilitychange', () => {
  if (document.hidden || currentTab !== 'map') return;
  if (Object.keys(bcTracked).length){
    const stale = !bcPlayerSocket || bcPlayerSocket.readyState !== 1 || (bcLastWsMsg && Date.now() - bcLastWsMsg > 90000);
    if (stale) bcForceReconnect(); else bcWsSubscribe();
    // Snap markers to current positions via REST without waiting for the 15s fallback poll.
    Object.keys(bcTracked).forEach(id => bcFetchPlayerPos(id).then(r => { if (r && r.x != null && r.z != null) bcPlacePlayer(id, r.x, r.z); }));
  }
  if (Object.keys(bcTrackedRes).length) bcRefreshAllTracked().catch(()=>{});
  if (bcEventsLayer) bcRefreshEvents().catch(()=>{}); // keep Hexite Vault timers/positions current
});
function bcWsSubscribe(){
  if (!bcPlayerSocket || bcPlayerSocket.readyState !== 1) return;
  const ids = Object.keys(bcTracked);
  if (!ids.length) return;
  try { bcPlayerSocket.send(JSON.stringify({ type:'subscribe', channels: ids.map(id => 'mobile_entity_state:'+id) })); } catch(e){}
}
function bcWsHandle(raw){
  let msg; try { msg = JSON.parse(raw); } catch(e){ return; }
  if (msg.type !== 'event' || !msg.data) return;
  const d = msg.data, id = String(d.entity_id || '');
  const t = bcTracked[id];
  if (!t || typeof d.location_x !== 'number' || typeof d.location_z !== 'number') return;
  // ws coords are ×1000 of the map-space coords used by /api/players
  bcPlacePlayer(id, d.location_x/1000, d.location_z/1000,
    (typeof d.destination_x === 'number' && typeof d.destination_z === 'number') ? { x:d.destination_x/1000, z:d.destination_z/1000 } : null);
}
function bcSaveTrackedPlayers(){ safeSetItem('bc_map_tracked_players_v1', JSON.stringify(Object.entries(bcTracked).map(([id,t]) => ({ id, name:t.name, color:t.color, follow:t.follow })))); }
function bcLoadTrackedPlayers(){ try { const v = localStorage.getItem('bc_map_tracked_players_v1'); return v ? JSON.parse(v) : []; } catch(e){ return []; } }
function bcTrackPlayer(id, name, color, follow){
  id = String(id); if (!id || bcTracked[id]) return;
  color = color || bcPlayerColors[Object.keys(bcTracked).length % bcPlayerColors.length];
  bcTracked[id] = { name: name || ('Player '+id), marker:null, line:null, last:null, follow:!!follow, color };
  bcEnsureSocket();
  bcWsSubscribe();
  bcStartPlayerPoll();
  // Immediate position from REST (handles online-but-stationary players the ws won't emit for).
  bcFetchPlayerPos(id).then(r => {
    const t = bcTracked[id]; if (!t || !r) return;
    if (r.username) t.name = r.username;
    if (r.x != null && r.z != null) bcPlacePlayer(id, r.x, r.z);
    bcSaveTrackedPlayers();
    bcRenderTrackedList();
  });
  bcSaveTrackedPlayers();
  bcRenderTrackedList();
}
function bcTrackMe(){ if (currentPlayer) bcTrackPlayer(currentPlayer.entityId, currentPlayer.username || currentPlayer.userName || 'Me'); }
function bcUntrackPlayer(id){
  id = String(id); const t = bcTracked[id]; if (!t) return;
  if (t.marker) t.marker.remove();
  if (t.line) t.line.remove();
  delete bcTracked[id];
  bcSaveTrackedPlayers();
  bcRenderTrackedList();
  if (!Object.keys(bcTracked).length){
    bcStopPlayerPoll();
    if (bcPlayerSocket){ bcWsManualClose = true; clearInterval(bcWsPing); try { bcPlayerSocket.close(); } catch(e){} bcPlayerSocket = null; }
  }
}
function bcToggleFollow(id){
  id = String(id); const t = bcTracked[id]; if (!t) return;
  const turnOn = !t.follow;
  Object.values(bcTracked).forEach(x => x.follow = false);
  t.follow = turnOn;
  if (t.follow && t.last) bcMap.panTo(t.last);
  bcSaveTrackedPlayers();
  bcRenderTrackedList();
}
function bcRenderTrackedList(){
  const el = document.getElementById('bc-players-list'); if (!el) return;
  const ids = Object.keys(bcTracked);
  el.innerHTML = ids.length ? ids.map(id => {
    const t = bcTracked[id]; const online = t.last != null;
    return `<div class="bc-mp-prow">
      <span style="width:7px;height:7px;border-radius:50%;background:${online?'#22c55e':'#6b7280'};flex-shrink:0" title="${online?'Online':'Offline / no data'}"></span>
      <span class="nm" title="${escHtml(t.name)}">${escHtml(t.name)}</span>
      <i class="ti ti-focus-2" title="Follow" style="cursor:pointer;font-size:14px;color:${t.follow?'#22c55e':'var(--text3)'}" onclick="bcToggleFollow('${id}')"></i>
      <i class="ti ti-x" title="Stop tracking" style="cursor:pointer;font-size:14px;color:var(--text3)" onclick="bcUntrackPlayer('${id}')"></i>
    </div>`;
  }).join('') : '<div style="font-size:11px;color:var(--text3)">No players tracked</div>';
}
async function bcPlayerSearch(q){

let bcResourceIndex = {}, bcCreatureIndex = {};
let bcResourceLayer = null, bcResourcePollTimer = null;
let bcMapRegion = '';                  // '' = all regions; else a regionId (limits resource fetching)
function bcLoadMapRegion(){ try { const v = localStorage.getItem('bc_map_region'); if (v != null) bcMapRegion = v; } catch(e){} }
function bcSetMapRegion(v){ bcMapRegion = v || ''; safeSetItem('bc_map_region', bcMapRegion); bcRefreshAllTracked(); }
async function bcInitRegionSelect(){
  const sel = document.getElementById('bc-region-sel'); if (!sel) return;
  if (!marketRegions.length){ try { const d = await apiFetch('/api/regions'); marketRegions = Array.isArray(d)?d:(d.regions||[]); } catch(e){} }
  sel.innerHTML = regionOptionsHtml(bcMapRegion);  // "Name (R##)", first option = All regions
}
let bcResSearch = '', bcResTier = '', bcResTag = '';
const BC_RESOURCE_POLL_MS = 60000;

// Dot radius: scarcer resources draw bigger; dots shrink when zoomed out (less clutter) and grow
// when zoomed in (easier to see your surroundings). Combined with a thin border for visibility.
function bcDotRadius(count, zoom){
  let base;
  if (!count || count <= 300)      base = 6.5;
  else if (count <= 3000)          base = 5.5;
  else if (count <= 30000)         base = 4.5;
  else if (count <= 300000)        base = 3.5;
  else                             base = 2.6;   // hundreds of thousands → millions
  const mult = Math.max(0.5, Math.min(1.7, 0.55 + (zoom + 5) * 0.105)); // zoom -5 → ~0.55, +5 → ~1.6
  return Math.max(1, Math.min(13, base * mult));
}

// Canvas overlay that paints many points efficiently — resource sets can be >1M nodes,
// far too many for individual Leaflet markers. Draws several colored datasets at once.
// Each dataset: {pts:[[x,y]...], color, count}. Points are [x,y] (geojson) = latLng(y,x).
let _bcPointCls = null;
function bcPointLayerClass(){
  if (_bcPointCls) return _bcPointCls;
  _bcPointCls = L.Layer.extend({
    initialize(opts){ this._sets = []; this._r = (opts&&opts.radius)||4; },
    setDatasets(sets){ this._sets = sets||[]; this._draw(); return this; },
    onAdd(map){ this._map = map; this._c = L.DomUtil.create('canvas'); this._c.style.position='absolute'; map.getPane('overlayPane').appendChild(this._c); map.on('moveend zoomend resize viewreset', this._draw, this); this._draw(); },
    onRemove(map){ L.DomUtil.remove(this._c); map.off('moveend zoomend resize viewreset', this._draw, this); },
    _draw(){
      if (!this._map || !this._c) return;
      const map = this._map, size = map.getSize();
      L.DomUtil.setPosition(this._c, map.containerPointToLayerPoint([0,0]));
      this._c.width = size.x; this._c.height = size.y;
      const ctx = this._c.getContext('2d'); ctx.clearRect(0,0,size.x,size.y);
      const b = map.getBounds().pad(0.05), S=b.getSouth(), N=b.getNorth(), W=b.getWest(), E=b.getEast();
      const z = map.getZoom();
      for (const set of this._sets){
        const pts = set.pts; if (!pts || !pts.length) continue;
        // Sample only when zoomed out far on a huge set (perf); when zoomed in, stride=1 so every
        // node in view is drawn — fixes the "only 1 of many shown" problem. Inline cull (no array).
        const stride = (z <= -2 && pts.length > 300000) ? Math.ceil(pts.length / 300000) : 1;
        const r = bcDotRadius(set.count != null ? set.count : pts.length, z);
        ctx.fillStyle = set.color || '#5fd0ff';
        ctx.beginPath();
        for (let i=0; i<pts.length; i+=stride){
          const c = pts[i], lng = c[0], lat = c[1];
          if (lat<S || lat>N || lng<W || lng>E) continue; // viewport cull
          const p = map.latLngToContainerPoint([lat, lng]);
          ctx.moveTo(p.x + r, p.y);
          ctx.arc(p.x, p.y, r, 0, 6.283185307); // circles
        }
        ctx.fill();
        // Thin dark border for visibility — only when dots are big enough (zoomed in / scarce),
        // so we never pay the stroke cost on tiny zoomed-out clouds.
        if (r >= 3.5){ ctx.lineWidth = Math.min(1.4, r * 0.22); ctx.strokeStyle = 'rgba(8,10,14,0.85)'; ctx.stroke(); }
      }
    }
  });
  return _bcPointCls;
}

async function bcLoadIndexes(){
  try { const r = await fetch(`${API}/mapassets/resourceIndex.json`); if (r.ok) bcResourceIndex = await r.json(); } catch(e){}
  try { const r = await fetch(`${API}/mapassets/creatureIndex.json`); if (r.ok) bcCreatureIndex = await r.json(); } catch(e){}
}
// One combined list of resources + enemies (each entry knows its kind).
function bcAllEntries(){
  const out = [];
  for (const id in bcResourceIndex) out.push({ kind:'resource', id, ...bcResourceIndex[id] });
  for (const id in bcCreatureIndex) out.push({ kind:'enemy',    id, ...bcCreatureIndex[id] });
  return out;
}
function bcInitResourceFilters(){

// ----- Multi-track resources/enemies (each with its own color) -----
let bcTrackedRes = {};                 // "kind:id" -> {kind,id,name,color,count,pts}
const bcResColors = ['#5fd0ff','#ff7b7b','#7CFF7B','#ffd166','#c77dff','#5ce1e6','#ff9f45','#f178b6'];
let bcResColorIdx = 0;
function bcResKey(kind,id){ return kind + ':' + id; }
function bcSaveTrackedRes(){ safeSetItem('bc_map_tracked_res_v1', JSON.stringify(Object.values(bcTrackedRes).map(t => ({ kind:t.kind, id:t.id, name:t.name, tier:t.tier, tag:t.tag, color:t.color })))); }
function bcLoadTrackedRes(){ try { const v = localStorage.getItem('bc_map_tracked_res_v1'); return v ? JSON.parse(v) : []; } catch(e){ return []; } }

async function bcFetchResourcePts(kind, id){
  if (!marketRegions.length){ try { const d = await apiFetch('/api/regions'); marketRegions = Array.isArray(d)?d:(d.regions||[]); } catch(e){} }
  // Region filter: only fetch the chosen region (lighter), or all regions when unset.
  const regionsToScan = bcMapRegion ? marketRegions.filter(r => String(r.regionId||r.id||r.entityId) === String(bcMapRegion)) : marketRegions;
  const pts = [];
  await Promise.all(regionsToScan.map(async r => {
    const rid = r.regionId || r.id || r.entityId; if (rid == null) return;
    try {
      const res = await fetch(`${API}/bcmap/region${rid}/${kind}/${id}`);
      if (!res.ok) return;
      const d = await res.json();
      (d.features || []).forEach(f => {
        const g = f.geometry; if (!g) return;
        if (g.type === 'MultiPoint') g.coordinates.forEach(c => pts.push(c));
        else if (g.type === 'Point') pts.push(g.coordinates);
      });
    } catch(e){}
  }));
  return pts;
}
function bcRedrawTracked(){
  if (!bcResourceLayer) return;
  bcResourceLayer.setDatasets(Object.values(bcTrackedRes).map(t => ({ pts: t.pts||[], color: t.color, count: t.count })));
}
function bcUpdateResStatus(){
  const status = document.getElementById('bc-res-status'); if (!status) return;
  const ts = Object.values(bcTrackedRes);
  if (!ts.length){ status.textContent = ''; return; }
  const total = ts.reduce((s,t)=>s+(t.count||0), 0);
  status.textContent = `${ts.length} tracked · ${total.toLocaleString()} nodes · ${new Date().toLocaleTimeString()}`;
}
async function bcToggleMapItem(kind, id){
  const key = bcResKey(kind, id);
  if (bcTrackedRes[key]){ bcUntrackRes(key); return; }
  const meta = (kind==='enemy'?bcCreatureIndex:bcResourceIndex)[id] || {};
  const color = meta.color || bcResColors[bcResColorIdx++ % bcResColors.length];
  bcTrackedRes[key] = { kind, id, name: meta.name || ('#'+id), tier: meta.tier||0, tag: meta.tag||'', color, count:0, pts:[] };
  bcRenderResourceList(); bcRenderTrackedResList();
  const status = document.getElementById('bc-res-status');
  if (status) status.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite;display:inline-block"></i> Loading…';
  bcSaveTrackedRes();
  const pts = await bcFetchResourcePts(kind, id);
  const t = bcTrackedRes[key]; if (!t) return; // untracked while loading
  t.pts = pts; t.count = pts.length;
  bcRedrawTracked(); bcRenderTrackedResList(); bcUpdateResStatus();
  bcScheduleResourcePoll();
}
function bcUntrackRes(key){
  delete bcTrackedRes[key];
  bcSaveTrackedRes();
  bcRedrawTracked(); bcRenderResourceList(); bcRenderTrackedResList(); bcUpdateResStatus();
  if (!Object.keys(bcTrackedRes).length) bcStopResourcePoll();
}
// Live update while dragging in the picker: update the map only — do NOT re-render the tracked
// list, which would replace the <input type=color> and close the native picker.
function bcSetResColorLive(key, color){
  const t = bcTrackedRes[key]; if (!t) return;
  t.color = color;
  bcRedrawTracked();
}
// Committed (picker closed): persist and re-render lists so swatches/dots sync everywhere.
function bcSetResColor(key, color){
  const t = bcTrackedRes[key]; if (!t) return;
  t.color = color;
  bcSaveTrackedRes();
  bcRedrawTracked(); bcRenderResourceList(); bcRenderTrackedResList();
}
function bcRenderTrackedResList(){
  const el = document.getElementById('bc-tracked-res'); if (!el) return;
  const ts = Object.values(bcTrackedRes);
  if (!ts.length){ el.innerHTML = ''; el.style.display = 'none'; return; }
  el.style.display = '';
  el.innerHTML = `<div class="bc-trk-hdr">Tracked (${ts.length})</div>` + ts.map(t => {

      <input type="color" class="bc-trk-col" value="${t.color}" oninput="bcSetResColorLive('${key}', this.value)" onchange="bcSetResColor('${key}', this.value)" title="Change color">
      <i class="ti ti-x bc-trk-x" onclick="bcUntrackRes('${key}')" title="Untrack"></i>
    </div>`;
  }).join('');
}
async function bcRefreshAllTracked(){
  await Promise.all(Object.keys(bcTrackedRes).map(async key => {
    const t = bcTrackedRes[key]; if (!t) return;
    const pts = await bcFetchResourcePts(t.kind, t.id);
    if (bcTrackedRes[key]){ bcTrackedRes[key].pts = pts; bcTrackedRes[key].count = pts.length; }
  }));
  bcRedrawTracked(); bcRenderTrackedResList(); bcUpdateResStatus();
}
function bcScheduleResourcePoll(){
  bcStopResourcePoll();
  bcResourcePollTimer = setTimeout(() => {
    // ALWAYS reschedule the next tick — even if this refresh throws. Chaining the next poll off a
    // bare .then() meant a single rejected fetch (network blip, 429, a draw error) killed the loop
    // permanently. .catch swallows the error so the timer keeps ticking and self-heals.
    if (currentTab === 'map' && !document.hidden && Object.keys(bcTrackedRes).length){
      bcRefreshAllTracked().catch(()=>{}).then(bcScheduleResourcePoll);
    } else {
      bcScheduleResourcePoll(); // tab hidden / not on map — keep timer alive, resume when visible
    }
  }, BC_RESOURCE_POLL_MS);
}
function bcStopResourcePoll(){ if (bcResourcePollTimer){ clearTimeout(bcResourcePollTimer); bcResourcePollTimer = null; } }

async function loadCraftingData() {
  if (craftingData) return;
  const d = await apiFetch('/crafting-data');
  craftingData = d;
  // Build indexes
  craftingData.itemsById = {};
  d.items.forEach(i => { craftingData.itemsById[i.id] = i; });
  craftingData.recipesByOutput = {};
  d.recipes.forEach(r => {
    r.outputs.forEach(o => {
      if (!craftingData.recipesByOutput[o.itemId]) craftingData.recipesByOutput[o.itemId] = [];
      craftingData.recipesByOutput[o.itemId].push(r);
    });
  });
  craftingData.skillsById = {};
  d.skills.forEach(s => { craftingData.skillsById[s.id] = s; });
  craftingData.recipesById = {};
  d.recipes.forEach(r => { craftingData.recipesById[r.id] = r; });
}

function passiveCraftDuration(recipeId) {
  if (!craftingData || !craftingData.recipesById) return null;

  return (r && typeof r.timeRequirement === 'number' && r.timeRequirement > 0) ? r.timeRequirement : null;
