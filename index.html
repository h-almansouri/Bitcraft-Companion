<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcraft Companion</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2l8.66 5v10L12 22l-8.66-5V7z' fill='%230d9488' stroke='%235eead4' stroke-width='1.3' stroke-linejoin='round'/><circle cx='12' cy='12' r='3.2' fill='%235eead4'/></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<!-- Leaflet (map) + leaflet-search plugin -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-search@3.0.9/dist/leaflet-search.min.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-search@3.0.9/dist/leaflet-search.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0d0f14;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
:root{
  --bg:#0d0f14;--bg2:#13171f;--bg3:#1a1f2b;--bg4:#222836;--bg5:#2a3040;
  --border:#2a3040;--border2:#3a4257;
  --text:#e2e8f0;--text2:#8fa3bf;--text3:#5a6a82;
  --teal:#1d9e75;--teal-light:#9fe1cb;--teal-dim:#0f6e56;
  --amber:#ba7517;--amber-light:#fac775;
  --red:#e24b4a;--red-dim:rgba(226,75,74,.15);
  --green:#639922;--green-light:#97c459;--green-dim:rgba(99,153,34,.15);
  --purple:#7f77dd;--purple-light:#afa9ec;--purple-dim:rgba(127,119,221,.15);
  --sidebar:220px;
}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
aside{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:10}
.sidebar-logo{padding:1rem 1.25rem .75rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid var(--border)}
.sidebar-logo-icon{width:28px;height:28px;background:var(--teal-dim);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--teal-light);font-size:15px;flex-shrink:0}
.sidebar-logo-text{font-size:14px;font-weight:600;color:var(--teal-light)}
.sidebar-logo-text span{color:var(--text2);font-weight:400}

.player-section{padding:.75rem 1rem;border-bottom:1px solid var(--border)}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px 6px 30px;font-size:12px;outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--teal)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.search-btn{width:100%;margin-top:.4rem;background:var(--teal-dim);border:1px solid var(--teal);color:var(--teal-light);border-radius:6px;padding:5px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s}
.search-btn:hover{background:var(--teal)}
.search-results{position:absolute;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;z-index:100;width:100%;top:100%;left:0;margin-top:4px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.search-result-item{padding:7px 10px;font-size:12px;cursor:pointer;color:var(--text);display:flex;flex-direction:column;gap:1px}
.search-result-item:hover{background:var(--bg4)}
.search-result-item small{color:var(--text3);font-size:10px}
.player-badge{display:flex;align-items:center;gap:.5rem;padding:.4rem .5rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px}
.player-badge-avatar{width:24px;height:24px;background:var(--teal-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--teal-light);flex-shrink:0}
.player-badge-name{font-size:12px;font-weight:500;color:var(--teal-light);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-badge-x{color:var(--text3);cursor:pointer;font-size:14px;flex-shrink:0}
.player-badge-x:hover{color:var(--text)}

.nav-section{padding:.75rem 0}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:.25rem 1.25rem .4rem}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.5rem 1.25rem;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;border-left:2px solid transparent}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--teal-light);background:rgba(29,158,117,.08);border-left-color:var(--teal)}

/* ── MAIN ── */
.main-wrap{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:500;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:.5rem;font-size:12px;color:var(--text2)}
main{flex:1;padding:1.5rem;max-width:1200px;width:100%}
main.planner-mode{max-width:none;padding:1rem}

/* ── CARDS / COMMON ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1.25rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.card-title{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px}
.card-title i{color:var(--teal);font-size:15px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.75rem;margin-bottom:1.25rem}
.stat{background:var(--bg3);border-radius:6px;padding:.75rem 1rem}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:600;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.badge-tier{background:var(--bg4);color:var(--text2)}
.badge-sell{background:var(--red-dim);color:#f09595}
.badge-buy{background:var(--green-dim);color:var(--green-light)}
.badge-common{background:var(--bg4);color:var(--text2)}
.badge-uncommon{background:rgba(99,153,34,.15);color:#97c459}
.badge-rare{background:rgba(85,160,245,.22);color:#a8d0ff;border:1px solid rgba(85,160,245,.35)}
.badge-epic{background:rgba(155,90,240,.28);color:#d4aaff;border:1px solid rgba(155,90,240,.45)}
.badge-legendary{background:rgba(250,185,50,.22);color:#ffd580;border:1px solid rgba(250,185,50,.38)}
.badge-mythic{background:rgba(240,90,120,.24);color:#ffb3c6;border:1px solid rgba(240,90,120,.42)}
.price-sell{color:#f09595}
.price-buy{color:var(--green-light)}
.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg4);border-color:var(--teal)}
.btn.primary{background:var(--teal-dim);border-color:var(--teal);color:var(--teal-light)}
.btn.primary:hover{background:var(--teal)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;color:var(--text3);gap:.5rem;font-size:13px}
.empty i{font-size:32px;opacity:.4}
.loading{display:flex;align-items:center;gap:.5rem;color:var(--text2);font-size:13px;padding:2rem;justify-content:center}
.dot-spin{display:inline-block;width:6px;height:6px;background:var(--teal);border-radius:50%;animation:dot .7s infinite alternate}
@keyframes dot{to{opacity:.2}}
.error-msg{color:#f09595;font-size:13px;padding:1rem;background:var(--red-dim);border-radius:6px;border:1px solid rgba(226,75,74,.2);display:flex;align-items:center;gap:.5rem}
.search-bar{display:flex;gap:.5rem;margin-bottom:1rem}
.search-bar input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 12px;font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--teal)}
.search-bar input::placeholder{color:var(--text3)}

/* ── SKILLS ── */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem}
.skill-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.9rem 1rem;cursor:pointer;transition:border-color .15s}
.skill-card:hover{border-color:var(--border2)}
.skill-card.active{border-color:var(--teal)}
.skill-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.skill-card-name{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:.4rem}
.skill-card-name i{font-size:15px;color:var(--text3)}
.skill-card-level{font-size:18px;font-weight:700;color:var(--text)}
.skill-card-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:.4rem}
.skill-bar-wrap{background:var(--bg4);border-radius:3px;height:4px;overflow:hidden;margin-bottom:.35rem}
.skill-bar{height:100%;background:var(--teal);border-radius:3px;transition:width .5s}
.skill-xp-row{font-size:11px;color:var(--text2)}
.category-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:1.25rem 0 .6rem;display:flex;align-items:center;gap:.5rem}
.category-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── INVENTORY ── */
.inv-group{margin-bottom:1rem}
/* Collapsible section header */
.inv-group-header{display:flex;align-items:center;gap:.5rem;padding:.4rem .75rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;margin-bottom:.35rem;transition:background .15s;user-select:none}
.inv-group-header:hover{background:var(--bg4)}
.inv-group-name{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:.4rem;flex:1}
.inv-group-name i{color:var(--teal);font-size:14px}
.inv-group-meta{font-size:11px;color:var(--text3)}
/* Compact chip row */
.inv-chips-row{display:flex;flex-wrap:wrap;gap:.4rem;padding:.1rem 0 .5rem}
.inv-loc-chip{display:inline-flex;flex-direction:column;gap:3px;padding:.45rem .8rem;background:var(--bg3);border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all .12s;min-width:110px;max-width:300px}
.inv-loc-chip:hover{border-color:var(--border2);background:var(--bg4)}
.inv-loc-chip.active{border-color:var(--teal);background:rgba(29,158,117,.08)}
.inv-loc-chip-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-loc-chip-sub{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-loc-chip-count{font-size:11px;color:var(--teal-light)}
/* Expanded chip content panel */
.inv-chip-content{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:.6rem;margin-bottom:.5rem}
/* Flat / grid view */
.inv-items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.5rem}
.inv-item-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.6rem .75rem;display:flex;align-items:center;gap:.6rem}
.inv-item-info{flex:1;min-width:0}
.inv-item-name{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-item-tag{font-size:10px;color:var(--text3);margin-top:1px}
.inv-item-qty{font-size:13px;font-weight:600;color:var(--teal-light);flex-shrink:0}
.inv-toggle{display:flex;gap:.4rem;margin-bottom:.75rem}
.inv-toggle button{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:5px;padding:4px 12px;font-size:12px;cursor:pointer;transition:all .15s}
.inv-toggle button.active{background:var(--bg4);border-color:var(--border2);color:var(--text)}

/* ── CRAFTING ── */
.craft-location-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:1rem;overflow:hidden}
.craft-location-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;cursor:pointer;background:var(--bg3);transition:background .15s}
.craft-location-header:hover{background:var(--bg4)}
.craft-location-name{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:.5rem}
.craft-location-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:.75rem}
.craft-card{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 1rem;border-top:1px solid var(--border)}
.craft-card-icon{width:32px;height:32px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal);font-size:16px}
.craft-card-body{flex:1;min-width:0}
.craft-card-name{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.craft-card-meta{font-size:11px;color:var(--text2);margin-top:2px}
.craft-progress-wrap{margin-top:.4rem;background:var(--bg4);border-radius:3px;height:4px}
.craft-progress{height:100%;border-radius:3px;transition:width .3s}
.craft-progress.done{background:var(--green-light)}
.craft-progress.active{background:var(--amber-light)}
.craft-status{font-size:11px;font-weight:500;padding:2px 8px;border-radius:12px;flex-shrink:0;white-space:nowrap}
.status-ready{background:var(--green-dim);color:var(--green-light)}
.status-active{background:rgba(29,158,117,.15);color:var(--teal-light)}
.status-passive{background:rgba(186,117,23,.15);color:var(--amber-light)}
.craft-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem}
.craft-tab{padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;transition:color .15s}
.craft-tab:hover{color:var(--text)}
.craft-tab.active{color:var(--teal-light);border-bottom-color:var(--teal)}
.craft-search{margin-bottom:1rem}

/* ── TASKS ── */
.task-rotation{display:flex;align-items:center;gap:.75rem;padding:.6rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;margin-bottom:1.25rem;font-size:13px}
.task-rotation i{color:var(--text3)}
.task-countdown{font-family:monospace;font-size:14px;font-weight:600;color:var(--teal-light);background:var(--bg4);padding:3px 10px;border-radius:5px}
.task-npc-block{margin-bottom:1rem;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.task-npc-header{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1rem;background:var(--bg3);cursor:pointer}
.task-npc-header:hover{background:var(--bg4)}
.task-npc-name{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:.5rem}
.task-npc-skill{font-size:11px;color:var(--text3)}
.task-items-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;padding:.75rem 1rem}
.task-item-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.6rem .75rem}
.task-item-status{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem;display:flex;align-items:center;gap:.3rem}
.status-all{color:var(--green-light)}
.status-some{color:var(--amber-light)}
.status-none{color:var(--text3)}
.task-item-name{font-size:12px;color:var(--text);font-weight:500}
.task-item-needed{font-size:11px;color:var(--text3);margin-top:2px}
.task-item-qty{font-size:12px;font-weight:600;float:right;margin-top:-16px}
.task-item-qty.full{color:var(--green-light)}
.task-item-qty.partial{color:var(--amber-light)}
.task-item-qty.empty{color:var(--text3)}
.todo-section{margin-top:1.25rem}

/* ── MARKET ── */
.market-table{width:100%;border-collapse:collapse;font-size:13px}
.market-table th{text-align:left;color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:6px 8px;border-bottom:1px solid var(--border)}
.market-table td{padding:8px;border-bottom:1px solid var(--border);color:var(--text2)}
.market-table td:first-child{color:var(--text)}
.market-table tr:last-child td{border-bottom:none}
.market-table tr:hover td{background:var(--bg3)}
.market-item-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.75rem 1rem;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;justify-content:space-between;gap:.75rem;position:relative}
.market-item-card:hover{border-color:var(--border2)}
.market-item-left{flex:1;min-width:0}
.market-item-name{font-size:13px;color:var(--text);font-weight:500}
.market-item-tag{font-size:11px;color:var(--text3);margin-top:2px}
.market-item-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.market-items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.5rem;margin-top:.75rem}
.mkt-hide-btn{background:none;border:none;color:#c07070;cursor:pointer;font-size:15px;line-height:1;padding:3px 5px;border-radius:4px;opacity:0.35;transition:opacity .12s,color .12s,background .12s;flex-shrink:0}
.market-item-card:hover .mkt-hide-btn,.market-cat-hdr:hover .mkt-hide-btn{opacity:0.8}
.mkt-hide-btn:hover{color:#fff!important;background:var(--red-light)!important;opacity:1!important}
.mkt-removed-panel{position:absolute;top:100%;right:0;z-index:50;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.5);min-width:260px;max-width:360px;max-height:360px;overflow-y:auto;margin-top:4px}

/* ── DEALS ── */
.deal-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:.75rem;transition:border-color .15s,background .15s;cursor:pointer}
.deal-card:hover{border-color:var(--teal);background:var(--bg3)}
.deal-loc{background:var(--bg3);border-radius:8px;padding:.75rem 1rem;flex:1;min-width:0}
.deal-flow{display:flex;align-items:stretch;gap:.75rem;margin-top:.75rem}
.deal-arrow{color:var(--teal);font-size:24px;display:flex;align-items:center;flex-shrink:0}
.deal-meta{display:flex;flex-wrap:wrap;gap:.75rem;margin-top:.75rem;font-size:12px;color:var(--text2);padding-top:.75rem;border-top:1px solid var(--border)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── CRAFTING PLANNER ── */
.planner-layout{display:grid;grid-template-columns:250px 1fr 270px;gap:.75rem;height:min(450px,48vh)}
.planner-panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.planner-panel-hdr{padding:.6rem .75rem;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.planner-panel-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:.4rem}
.planner-panel-title i{color:var(--teal);font-size:14px}
.planner-panel-body{flex:1;overflow-y:auto;min-height:0}
.planner-filters{padding:.5rem .6rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:.35rem;flex-shrink:0}
.planner-filters input,.planner-filters select{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 8px;font-size:12px;outline:none;width:100%}
.planner-filters input:focus,.planner-filters select:focus{border-color:var(--teal)}
.planner-filters .pf-row{display:flex;gap:.35rem}
.planner-item-row{padding:.45rem .6rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;border-left:3px solid transparent}
.planner-item-row:hover{background:var(--bg3)}
.planner-item-row.pactive{background:rgba(29,158,117,.1);border-left-color:var(--teal)}
.planner-item-name{font-size:12px;font-weight:500;color:var(--text)}
.planner-item-meta{font-size:10px;color:var(--text3);margin-top:1px}
.recipe-tree{padding:.75rem;font-size:13px}
.rn{margin-bottom:.4rem}
.rn-item{display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;flex-wrap:wrap}
.rn-item.rn-root{background:rgba(29,158,117,.06);border-color:var(--teal-dim)}
.rn-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.rn-qty{font-size:11px;color:var(--teal-light);font-weight:600;background:var(--bg4);padding:2px 8px;border-radius:10px;white-space:nowrap}
.rn-skill{font-size:10px;color:var(--text3)}
.rn-raw{display:flex;align-items:center;gap:.4rem;padding:.3rem .6rem;background:var(--bg4);border-radius:4px;font-size:12px;color:var(--text2);margin-bottom:.25rem}
.rn-raw i{color:var(--text3);font-size:12px}
.rn-has-children{cursor:pointer}
.rn-has-children:hover{background:var(--bg4)!important}
.rn-chevron{font-size:11px;color:var(--text3);flex-shrink:0;transition:transform .15s;pointer-events:none}
.rn-controls{display:flex;gap:.35rem;padding:.4rem .5rem;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:2}
.rn-ctrl-btn{font-size:10px;padding:3px 9px;gap:3px}
.rn-children{margin-left:1.25rem;margin-top:.3rem;border-left:2px solid var(--border);padding-left:.6rem}
.rn-sel{width:100%;background:var(--bg4);border:1px solid var(--border);color:var(--text2);border-radius:4px;padding:3px 5px;font-size:10px;margin-top:.3rem;outline:none;cursor:pointer}
.rn-sel:focus{border-color:var(--teal)}
.recipe-add-bar{padding:.6rem .75rem;border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:.5rem}
.plan-item-row{display:flex;align-items:center;gap:.5rem;padding:.45rem .6rem;border-bottom:1px solid var(--border)}
.plan-item-name{flex:1;font-size:12px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-item-meta{font-size:10px;color:var(--text3)}
.plan-qty-inp{width:52px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:2px 5px;font-size:12px;text-align:center;outline:none}
.plan-qty-inp:focus{border-color:var(--teal)}
.plan-remove{color:var(--text3);cursor:pointer;font-size:14px;flex-shrink:0;line-height:1;padding:2px}
.plan-remove:hover{color:var(--red)}
.plan-materials{padding:.6rem .75rem;border-top:2px solid var(--border);flex-shrink:0;max-height:200px;overflow-y:auto}
.plan-mat-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}
.plan-mat-title i{color:var(--amber);font-size:12px}
.plan-mat-chip{display:inline-flex;align-items:center;gap:.3rem;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--text);margin:2px;white-space:nowrap}
.mc-qty{color:var(--amber-light);font-weight:700;margin-right:1px}
/* Inventory section in planner */
.planner-inv-section{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:.75rem;overflow:hidden}
.planner-inv-hdr{display:flex;align-items:center;gap:.5rem;padding:.6rem 1rem;cursor:pointer;transition:background .1s;user-select:none}
.planner-inv-hdr:hover{background:var(--bg3)}
.planner-inv-hdr-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:.4rem;flex:1}
.planner-inv-hdr-sub{font-size:11px;color:var(--text3)}
.planner-inv-body{padding:.5rem 1rem .75rem;border-top:1px solid var(--border)}
.planner-inv-loc{display:inline-flex;align-items:center;gap:.3rem;padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .12s;margin:2px;user-select:none}
.planner-inv-loc:hover{background:var(--bg4);border-color:var(--border2)}
.planner-inv-loc.active{background:rgba(29,158,117,.12);border-color:var(--teal);color:var(--text)}
.planner-inv-loc.active i{color:var(--teal-light)}
.inv-loc-count{font-size:10px;background:var(--bg4);padding:1px 6px;border-radius:8px;color:var(--text3);margin-left:2px}
.planner-inv-loc.active .inv-loc-count{background:rgba(29,158,117,.2);color:var(--teal-light)}
/* Resize handle between panels and building steps */
.planner-resize-handle{height:14px;display:flex;align-items:center;justify-content:center;cursor:ns-resize;color:var(--text3);font-size:16px;opacity:.4;transition:opacity .15s,color .15s;margin:.1rem 0;user-select:none;flex-shrink:0}
.planner-resize-handle:hover{opacity:1;color:var(--teal-light)}
.planner-inv-cats{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.4rem}
.planner-inv-cat-hdr{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:.3rem;margin-bottom:.25rem}
.planner-inv-cat-hdr i{font-size:12px}
.planner-inv-chips{display:flex;flex-wrap:wrap;gap:.25rem}
.inv-loc-claim{font-size:10px;color:var(--text3);margin-left:.2rem}
.planner-inv-footer{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:.4rem;padding-top:.25rem;border-top:1px solid var(--border)}
.planner-inv-toggle{cursor:pointer;color:var(--teal-light)}
.planner-inv-toggle:hover{text-decoration:underline}
/* Live / Refresh buttons — uniform size matching the standard .btn */
.live-btn{font-size:12px;padding:5px 13px;gap:5px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.live-btn-on{background:rgba(29,158,117,.15)!important;border-color:var(--teal)!important;color:var(--teal-light)!important}
.ctrl-btn{font-size:12px;padding:5px 13px;gap:5px}  /* matches live-btn sizing */
.live-status-label{font-size:11px;color:var(--text3);margin-left:.25rem}
.shopping-dd-row{transition:background .1s}
.shopping-dd-row:hover{background:var(--bg4)!important}
/* Tasks toolbar — unified bar holding rotation + buttons */
.tasks-toolbar{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.35rem .75rem}
.tasks-toolbar .task-rotation{padding:0;background:none;border:none;border-radius:0;margin:0}
/* Task inventory selector (mirrors planner) */
.task-inv-selector{margin-bottom:.6rem}
/* Inventory-aware chips */
.inv-have{border-color:rgba(99,153,34,.55)!important;background:rgba(99,153,34,.1)!important}
.inv-have .bq,.inv-have .mc-qty{color:var(--green-light)!important}
.inv-partial{border-color:rgba(186,117,23,.55)!important;background:rgba(186,117,23,.1)!important}
.inv-partial .bq,.inv-partial .mc-qty{color:var(--amber-light)!important}
.inv-missing{border-color:rgba(226,75,74,.5)!important;background:rgba(226,75,74,.07)!important}
.inv-missing .bq,.inv-missing .mc-qty{color:#f09595!important}
.inv-tag{font-size:10px;padding:1px 5px;border-radius:7px;margin-left:3px;font-weight:600;line-height:1.3}
.inv-tag.have{background:rgba(99,153,34,.25);color:var(--green-light)}
.inv-tag.partial{background:rgba(186,117,23,.25);color:var(--amber-light)}
.inv-tag.missing{background:rgba(226,75,74,.2);color:#f09595}

/* ── BUILDING STEPS ── */
.building-steps{margin-top:.75rem;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1rem 1.25rem}
.bs-hdr{display:flex;align-items:center;gap:.5rem;margin-bottom:.85rem}
.bs-hdr-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:.4rem}
.bs-hdr-title i{color:var(--teal);font-size:15px}
.bs-hdr-count{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:10px}
.bs-section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:.75rem 0 .35rem;display:flex;align-items:center;gap:.4rem}
.bs-section-label i{font-size:13px}
.bs-label-count{background:var(--bg3);border-radius:8px;padding:1px 6px;margin-left:2px}
.bs-row{display:flex;align-items:flex-start;gap:.6rem;padding:.45rem .5rem;border-radius:6px;transition:background .1s;border-bottom:1px solid var(--border)}
.bs-row:last-child{border-bottom:none}
.bs-row:hover{background:var(--bg3)}
.bs-row input[type=checkbox]{accent-color:var(--teal);width:14px;height:14px;cursor:pointer;flex-shrink:0;margin-top:3px}
.bs-row.bs-done .bs-body{opacity:.38;text-decoration:line-through}
.bs-num{font-size:11px;color:var(--text3);min-width:22px;text-align:right;flex-shrink:0;padding-top:2px}
.bs-body{flex:1;display:flex;flex-direction:column;gap:3px}
.bs-line1{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}
.bs-line2{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}
.bs-verb{font-size:11px;font-weight:600;color:var(--text3);min-width:32px}
.bs-chip{display:inline-flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:12px;color:var(--text);white-space:nowrap}
.bs-chip.gather{border-color:rgba(186,117,23,.5);background:rgba(186,117,23,.08)}
.bs-chip.gather .bq{color:var(--amber-light)}
.bs-chip.craft-out{border-color:rgba(29,158,117,.5);background:rgba(29,158,117,.06)}
.bs-chip.craft-out .bq{color:var(--teal-light)}
.bq{font-weight:700}
.bs-from{font-size:10px;color:var(--text3);margin-left:2px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:768px){
  aside{width:100%;height:auto;position:relative;flex-direction:row}
  .main-wrap{margin-left:0}
}

/* ── MAP TAB ── */
#map-el{flex:1;min-width:0;height:100%;border-radius:10px;overflow:hidden;background:#0a0c10;border:1px solid var(--border)}
.leaflet-container{background:#0a0c10;font-family:inherit;outline:none}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--bg2);color:var(--text);border:1px solid var(--border2)}
.leaflet-popup-content{font-size:12px;line-height:1.55;margin:.6rem .8rem}
.leaflet-popup-content a{color:var(--teal-light);text-decoration:none}
.leaflet-popup-content a:hover{text-decoration:underline}
.leaflet-popup-close-button{color:var(--text3)!important}
.leaflet-bar a,.leaflet-bar a:hover{background:var(--bg3);color:var(--text);border-bottom-color:var(--border)}
.leaflet-control-zoom a{font-size:16px}
.leaflet-control-layers{background:var(--bg2)!important;color:var(--text);border:1px solid var(--border2)!important;border-radius:8px!important}
.leaflet-control-layers-expanded{padding:.5rem .7rem!important}
.leaflet-control-layers label{font-size:12px;margin:2px 0}
.leaflet-control-layers-separator{border-top-color:var(--border)!important}
.leaflet-control-search{background:var(--bg2)!important;border:1px solid var(--border2)!important;border-radius:8px!important;box-shadow:none!important}
.leaflet-control-search .search-input{background:var(--bg3)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:6px!important}
.leaflet-control-search .search-button{background:var(--bg3)!important;border-radius:6px!important}
.leaflet-control-search .search-tooltip{background:var(--bg2)!important;border:1px solid var(--border2)!important}
.leaflet-control-search .search-tip{color:var(--text)!important;background:var(--bg2)!important}
.leaflet-control-search .search-tip.over,.leaflet-control-search .search-tip:hover{background:var(--bg4)!important}
.map-legend{font-size:11px;color:var(--text2);line-height:1.7}
.map-legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
.map-attrib{font-size:10px;color:var(--text3);margin-top:.4rem;text-align:right}
.map-attrib a{color:var(--text3)}
/* Map tab: left sidebar (search/filter) + map */
.map-wrap{display:flex;gap:.6rem;height:calc(100vh - 130px);min-height:460px}
.map-side{width:260px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.6rem;display:flex;flex-direction:column;gap:.6rem;overflow:hidden}
.map-side-sec{display:flex;flex-direction:column}
.map-side-grow{flex:1;min-height:0}
.map-side-hdr{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:.4rem;display:flex;align-items:center;gap:.3rem}
.map-side input,.map-side select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 7px;font-size:12px;outline:none}
.map-side input:focus,.map-side select:focus{border-color:var(--teal)}
.bc-mp-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 9px;font-size:12px;cursor:pointer;white-space:nowrap}
.bc-mp-btn:hover{background:var(--bg4)}
.bc-res-row{padding:.3rem .5rem;cursor:pointer;border-radius:4px;font-size:12px}
.bc-res-row:hover{background:var(--bg4)}
.bc-mp-list{margin-top:6px;display:flex;flex-direction:column;gap:3px;max-height:130px;overflow-y:auto}
.bc-mp-prow{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 7px}
.bc-mp-prow .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-mp-status{margin-top:6px;font-size:10px;color:var(--text3);line-height:1.45;flex-shrink:0}
.bc-player-tip{background:rgba(13,15,20,.45)!important;border:none!important;color:rgba(255,255,255,.82)!important;font-size:9px!important;font-weight:500;padding:0 3px!important;box-shadow:none!important;text-shadow:0 1px 2px rgba(0,0,0,.9);border-radius:3px}
.bc-player-tip::before{display:none!important}
/* resource search/filter tabs + list */
.bc-tabs{display:flex;gap:4px;margin-bottom:6px}
.bc-tab{flex:1;text-align:center;font-size:12px;padding:5px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer}
.bc-tab.on{background:rgba(29,158,117,.15);border-color:var(--teal);color:var(--text)}
.bc-res-list{flex:1;min-height:0;overflow-y:auto;margin-top:6px;border:1px solid var(--border);border-radius:6px;background:var(--bg)}
.bc-li{display:flex;align-items:center;gap:7px;padding:5px 8px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px}
.bc-li:hover{background:var(--bg3)}
.bc-li.on{background:rgba(29,158,117,.16)}
.bc-li-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.bc-li-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-li-t{font-size:10px;color:var(--text3);flex-shrink:0}
.bc-li-tag{font-size:9px;color:var(--text2);background:var(--bg4);border-radius:3px;padding:0 4px;flex-shrink:0;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-li-empty{padding:.6rem .75rem;font-size:11px;color:var(--text3)}
/* tracked resources panel */
.bc-tracked-res{margin-top:6px;border:1px solid var(--border);border-radius:6px;background:var(--bg);padding:4px;max-height:120px;overflow-y:auto;flex-shrink:0}
.bc-trk-hdr{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);padding:2px 4px}
.bc-trk{display:flex;align-items:center;gap:6px;padding:2px 4px;font-size:12px}
.bc-trk-col{width:18px;height:18px;padding:0;border:1px solid var(--border);border-radius:4px;background:none;cursor:pointer;flex-shrink:0}
.bc-trk-col::-webkit-color-swatch{border:none;border-radius:3px}
.bc-trk-col::-webkit-color-swatch-wrapper{padding:0}
.bc-trk-nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:96px}
.bc-trk-t{font-size:10px;color:var(--text3);flex-shrink:0}
.bc-trk-tag{font-size:9px;color:var(--text2);background:var(--bg4);border-radius:3px;padding:0 4px;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-trk-ct{font-size:10px;color:var(--text3);flex-shrink:0}
.bc-trk-col{margin-left:auto;border-radius:50%!important;width:18px!important;height:18px!important;padding:0!important;border:1px solid var(--border)!important;background:none;cursor:pointer;flex-shrink:0}
.bc-trk-col::-webkit-color-swatch{border:none;border-radius:50%}
.bc-trk-col::-webkit-color-swatch-wrapper{padding:0}
.bc-trk-x{cursor:pointer;color:var(--text3);font-size:14px;flex-shrink:0}
.bc-trk-x:hover{color:var(--red-light)}
/* hide button on resource rows + hidden panel */
.bc-li{position:relative}
.bc-li-hide{margin-left:auto;color:#c07070;opacity:0;font-size:14px;cursor:pointer;flex-shrink:0;transition:opacity .1s}
.bc-li:hover .bc-li-hide{opacity:.6}
.bc-li-hide:hover{opacity:1!important;color:var(--red-light)}
.bc-hidden-row{margin-top:5px;flex-shrink:0}
.bc-hidden-toggle{font-size:11px;color:var(--text3);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.bc-hidden-toggle:hover{color:var(--text)}
.bc-hidden-panel{margin-top:4px;border:1px solid var(--border);border-radius:6px;background:var(--bg);max-height:130px;overflow-y:auto;flex-shrink:0}
.bc-hid-top{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border)}
.bc-hid-all{background:none;border:none;color:var(--red-light);font-size:11px;cursor:pointer;padding:0}
.bc-hid-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-bottom:1px solid var(--border);font-size:12px}
.bc-hid-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-hid-restore{background:none;border:none;color:var(--teal-light);font-size:11px;cursor:pointer;padding:0;flex-shrink:0}
/* custom map layer control */
.bc-layerctrl{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:6px 8px;font-size:12px;max-height:74vh;overflow-y:auto;min-width:150px}
.bc-lrow{display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer}
.bc-lrow input{cursor:pointer;margin:0}
.bc-lsub{padding-left:4px;font-size:11px;color:var(--text2)}
.bc-lsw{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bc-lcount{color:var(--text3);font-size:10px}
.bc-lgroup{margin:1px 0}
.bc-lghdr{display:flex;align-items:center;gap:6px;padding:2px 0}
.bc-lgname{flex:1;cursor:pointer}
.bc-lgchev{cursor:pointer;font-size:13px;color:var(--text3);transition:transform .15s}
.bc-lgbody{padding-left:16px}
/* live player pulse marker */
.bc-player-icon{background:none;border:none}
.bc-player-pulse{position:relative;width:12px;height:12px;border-radius:50%;background:var(--pc);border:2px solid #0a0c10;box-shadow:0 0 6px var(--pc)}
.bc-player-pulse::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--pc);opacity:.7;animation:bcpulse 1.6s ease-out infinite}
@keyframes bcpulse{0%{transform:scale(.55);opacity:.7}100%{transform:scale(1.9);opacity:0}}
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<aside>
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon"><i class="ti ti-hexagon"></i></div>
    <div class="sidebar-logo-text">Bitcraft <span>Companion</span></div>
  </div>

  <div class="player-section">
    <div id="player-area">
      <div class="search-wrap">
        <i class="ti ti-search si"></i>
        <input type="text" id="player-input" placeholder="Search player..." autocomplete="off">
        <div class="search-results" id="search-results" style="display:none"></div>
      </div>
      <button class="search-btn" onclick="searchPlayers()"><i class="ti ti-search"></i> Search</button>
    </div>
  </div>

  <div class="nav-section">
    <div class="nav-label">Player</div>
    <div class="nav-item active" data-tab="skills" onclick="switchTab('skills')"><i class="ti ti-chart-bar"></i> Experience</div>
    <div class="nav-item" data-tab="inventory" onclick="switchTab('inventory')"><i class="ti ti-backpack"></i> Inventory</div>
    <div class="nav-item" data-tab="crafting" onclick="switchTab('crafting')"><i class="ti ti-hammer"></i> Crafts</div>
    <div class="nav-item" data-tab="tasks" onclick="switchTab('tasks')"><i class="ti ti-checklist"></i> Tasks</div>

// ── Market & Deals result persistence ──────────────────────────────────────────
// Results are kept in memory across tab switches AND mirrored to localStorage so returning to a
// tab (or reloading the page) shows the previous results instantly. When the cached results are
// older than RESULT_TTL a refresh runs in the *background* and swaps in the fresh data when ready —
// the old results stay on screen the whole time, so going AFK never drops you onto an empty page.
let marketLoadedAt = 0;          // ms timestamp of last successful market load
let marketLoading  = false;      // a market load/refresh is currently in flight
let marketServerOk = null;       // null=unknown · true=backend /market available · false=use /api passthrough

const RESULT_TTL = 5 * 60 * 1000; // results older than this trigger a silent background refresh

// Prefer the backend's shared market cache (/market); fall back to the bitjita passthrough. The full
// list works for every filter since renderMarketResults applies the buy/sell/tier/rarity filters itself.
async function fetchMarketList(){
  if (marketServerOk !== false){
    try {
      const r = await fetch(`${API}/market`);
      if (r.ok){ const j = await r.json(); if (j && Array.isArray(j.items) && j.items.length){ marketServerOk = true; return j.items; } }
      marketServerOk = false;
    } catch(e){ marketServerOk = false; }
  }
  let url = '/api/market?hasOrders=true';
  if (marketOrderFilter === 'buy')  url += '&hasBuyOrders=true';
  if (marketOrderFilter === 'sell') url += '&hasSellOrders=true';
  const d = await apiFetch(url);
  return (d.data && d.data.items) ? d.data.items : (d.items || []);
}

function marketCacheKey(){ return (marketOrderFilter||'all') + '|' + (marketSelectedRegion||''); }
function saveMarketCache(){
  try {
    // The list API returns sellOrders/buyOrders as plain numeric counts, so the list is already
    // compact. Only in the rare case they arrive as arrays do we collapse them to a length (which
    // renderMarketResults' ocRegion reads identically) to keep the cache small.
    const slim = marketRawItems.map(it => {
      if (!Array.isArray(it.sellOrders) && !Array.isArray(it.buyOrders)) return it;
      const o = Object.assign({}, it);
      if (Array.isArray(it.sellOrders)) o.sellOrders = it.sellOrders.length;
      if (Array.isArray(it.buyOrders))  o.buyOrders  = it.buyOrders.length;
      return o;
    });
    localStorage.setItem('bc_market_cache_v1', JSON.stringify({ ts: marketLoadedAt, key: marketCacheKey(), items: slim }));
  } catch(e){ /* quota or serialization issue — in-memory cache still works this session */ }
}
function loadMarketCache(){
  try {
    const v = localStorage.getItem('bc_market_cache_v1'); if (!v) return false;
    const d = JSON.parse(v);
    if (d.key !== marketCacheKey()) return false;        // cached view used a different filter context
    if (!Array.isArray(d.items) || !d.items.length) return false;
    marketRawItems = d.items;
    marketLoadedAt = d.ts || 0;
    return true;
  } catch(e){ return false; }
}

function trimOrderForCache(o){
  if (!o) return o;
  return { price:o.price, priceThreshold:o.priceThreshold, quantity:o.quantity,
    claimName:o.claimName, settlementName:o.settlementName, regionId:o.regionId, regionName:o.regionName,
    claimEntityId:o.claimEntityId, claimLocationX:o.claimLocationX, claimLocationZ:o.claimLocationZ };
}
function saveDealsCache(){
  try {
    const slim = dealsData.slice(0, 2500).map(d => ({
      item: { id:d.item.id||d.item.itemId, name:d.item.name, tier:d.item.tier, tag:d.item.tag, rarity:d.item.rarity, rarityStr:d.item.rarityStr },
      sellOrder: trimOrderForCache(d.sellOrder),
      buyOrder:  trimOrderForCache(d.buyOrder),
      profitPerUnit:d.profitPerUnit, maxUnits:d.maxUnits, maxProfit:d.maxProfit
    }));
    localStorage.setItem('bc_deals_cache_v1', JSON.stringify({ ts: dealsScannedAt, data: slim }));
  } catch(e){ /* quota — in-memory cache still works this session */ }
}
function loadDealsCache(){
  try {
    const v = localStorage.getItem('bc_deals_cache_v1'); if (!v) return false;
    const d = JSON.parse(v);
    if (!Array.isArray(d.data) || !d.data.length) return false;
    dealsData = d.data;
    dealsScannedAt = d.ts || 0;
    return true;
  } catch(e){ return false; }
}
// Shopping List — supports multiple named lists

let shoppingItems = [];           // live reference to the active list's items array
let shoppingPrices = {};      // id -> {sell:{price,qty,claim,regionName}, buy:{...}} | 'loading' | 'error'
let shoppingRegionFilter = '';
let shoppingExpandedItem = null; // id of expanded shopping list item (null = none)
let shoppingPricingActive = false;
let shoppingSearchResults = [];
let shoppingSearchQ = '';
let shoppingMarketItems = []; // market API items for search autocomplete
const SHOPPING_LS = 'bc_shopping_v2'; // legacy single-list key (migrated into bc_shopping_lists_v1)
const SHOPPING_LISTS_LS = 'bc_shopping_lists_v1';
let searchTimeout = null;
let craftingData = null;   // {items,recipes,skills,itemsById,recipesByOutput,skillsById}
let plannerPlan = [];      // [{itemId, qty}]
let plannerSelId = null;   // currently selected item id in left panel
let plannerSelRecipe = {}; // itemId -> recipeId overrides
let bsChecked = new Set();      // 'g_itemId' or 'c_itemId' for checked building steps
let tasksTrackedInvs  = new Set(); // Set of inv indices tracked for task material counts (null = all)
let tasksInvsInited   = false;     // whether tasksTrackedInvs has been restored from localStorage
let plannerTrackedInvs = null; // Set of inventory indices being tracked (null = not init)
let plannerInvMap = {};        // itemId -> total qty from tracked inventories
let plannerInvOpen = false;    // whether inventory section is expanded
let taskInvOpen = false;       // whether task inventory section is expanded

// ── Inventory tracking persistence helpers ──
function _invNameKey(inv) {
  return (inv.inventoryName || inv.buildingName || '') + '|' + (inv.claimName || '');
}
function _resolveTrackedByName(invs, names) {
  const nameSet = new Set(names);
  const result = new Set();
  invs.forEach((inv, i) => { if (nameSet.has(_invNameKey(inv))) result.add(i); });
  return result;
}
function _savePlannerTrackedNames() {
  if (!invData) return;
  if (!plannerTrackedInvs) {
    // null/falsy = "all" sentinel
    safeSetItem('bc_planner_tracked', '"all"');
    return;
  }
  const names = [];
  (invData.inventories||[]).forEach((inv, i) => { if (plannerTrackedInvs.has(i)) names.push(_invNameKey(inv)); });
  safeSetItem('bc_planner_tracked', JSON.stringify(names));
}
function _loadPlannerTrackedNames() {
  try { const v = localStorage.getItem('bc_planner_tracked'); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
// Returns null (no saved data), 'all', or array of names
function _saveTasksTrackedNames() {
  if (!invData) return;
  if (tasksTrackedInvs === null) {
    safeSetItem('bc_tasks_tracked', '"all"');

  }
  const names = [];

}

}

async function apiFetch(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

const CACHE_TTL = 5 * 60 * 1000; // 5 minutes
let mkt429Count = 0; // incremented whenever the market API returns 429 (used to adaptively throttle the deals scan)

// Per-item market detail cache lives in MEMORY, not localStorage. A single deal scan fetches every
// item's full order data (~2400 entries, several MB) — persisting that to localStorage exhausted the
// ~5MB origin quota, which then made *every* setItem (hidden items, shopping lists, …) silently fail.
// Its 5-minute TTL already makes it effectively session-scoped, so an in-memory Map is the right home:
// no quota pressure, and no JSON serialize/parse on every fetch.
const _mktCache = new Map(); // `${type}_${id}` -> { ts, data }
function isCached(type, id) {
  const c = _mktCache.get(`${type}_${id}`);
  return !!(c && (Date.now() - c.ts) < CACHE_TTL);
}
async function fetchWithCache(type, id, timeoutMs=12000, _retries=2) {
  const key = `${type}_${id}`;
  const c = _mktCache.get(key);
  if (c && (Date.now() - c.ts) < CACHE_TTL) return c.data;
  // Abort if the server doesn't respond within timeoutMs to prevent scan from hanging
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(`${API}/api/market/${type}/${id}`, {signal: ctrl.signal});
    clearTimeout(timer);
    if (r.status === 429) {
      mkt429Count++; // signal the adaptive scanner to slow down
      if (_retries > 0) {
        // Rate limited — wait and retry with backoff
        const wait = (3 - _retries) * 1500 + 1500; // 1500ms, then 3000ms
        await new Promise(res => setTimeout(res, wait));
        return fetchWithCache(type, id, timeoutMs, _retries - 1);
      }
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    _mktCache.set(key, { ts: Date.now(), data });
    return data;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}
function clearMarketCache() {
  const n = _mktCache.size;
  _mktCache.clear();
  // Sweep any legacy per-item entries left in localStorage by older versions.
  try { Object.keys(localStorage).filter(k => k.startsWith('bc_mkt_')).forEach(k => localStorage.removeItem(k)); } catch(e) {}
  return n;
}

// Optional, regenerable snapshots that may be evicted to free quota for critical user preferences.
function _evictOptionalCaches() {
  ['bc_deals_cache_v1', 'bc_market_cache_v1'].forEach(k => { try { localStorage.removeItem(k); } catch(e){} });
  try { Object.keys(localStorage).filter(k => k.startsWith('bc_mkt_')).forEach(k => localStorage.removeItem(k)); } catch(e){}
}
// Persist a critical preference. If the quota is full, evict the big regenerable snapshots and retry
// once — so user data (hidden items, shopping lists, map selections) NEVER silently fails to save.
// Also mirrors the value to the backend (best-effort) as a cross-device/cleared-browser backup.
let prefsServerOk = null; // null=unknown · true=backend reachable · false=skip server mirror
// Server-side prefs sync is OFF: the backend's /prefs store is global (no per-user identity), so on a
// SHARED hosted instance it would mix everyone's lists/hidden items together. Personal data therefore
// lives only in each person's own browser (localStorage) — giving everyone their own stuff for free.
// (Re-enable only if per-user auth/namespacing is added.)
const PREFS_SERVER_SYNC = false;
function safeSetItem(key, val) {
  let ok = true;
  try { localStorage.setItem(key, val); }
  catch(e) { _evictOptionalCaches(); try { localStorage.setItem(key, val); } catch(e2) { ok = false; } }
  mirrorPrefToServer(key, val);
  return ok;
}
function mirrorPrefToServer(key, val){
  if (!PREFS_SERVER_SYNC) return;
  if (prefsServerOk === false) return;
  if (key === 'bc_market_cache_v1' || key === 'bc_deals_cache_v1' || key.startsWith('bc_mkt_')) return; // regenerable, don't back up
  try { fetch(`${API}/prefs/${encodeURIComponent(key)}`, { method:'PUT', body: val }).then(r => { if (!r.ok) prefsServerOk = false; else prefsServerOk = true; }).catch(() => { prefsServerOk = false; }); } catch(e){}
}
// On startup, pull any server-backed prefs and fill in keys MISSING locally (restores a fresh or
// cleared browser from the server backup without clobbering local edits). Returns # of keys filled.
async function restorePrefsFromServer(){
  if (!PREFS_SERVER_SYNC) return 0; // per-user data is browser-local; nothing to restore from the server
  let all;
  try {
    const ctrl = new AbortController(); const timer = setTimeout(() => ctrl.abort(), 1200); // never hang the UI
    const r = await fetch(`${API}/prefs`, { signal: ctrl.signal }); clearTimeout(timer);
    if (!r.ok){ prefsServerOk = false; return 0; } all = await r.json(); prefsServerOk = true;
  }
  catch(e){ prefsServerOk = false; return 0; }
  if (!all || typeof all !== 'object') return 0;
  let filled = 0;
  Object.entries(all).forEach(([k,v]) => {
    if (typeof v === 'string' && localStorage.getItem(k) === null){ try { localStorage.setItem(k, v); filled++; } catch(e){} }
  });
  if (filled){
    try { loadMarketHiddenPrefs(); } catch(e){}
    try { const s = localStorage.getItem('bc_deals_sort'); if (s) dealsSortMode = s; } catch(e){}
    try { const t = localStorage.getItem('bc_tab'); if (t && document.getElementById('tab-'+t)) currentTab = t; } catch(e){}
  }
  return filled;
}

// One-time reclaim: older versions wrote the per-item market cache to localStorage, which could fill
// the whole quota and block preference saves. The cache now lives in memory, so purge those stragglers
// at startup to immediately free that space for existing users.
try { Object.keys(localStorage).filter(k => k.startsWith('bc_mkt_')).forEach(k => localStorage.removeItem(k)); } catch(e) {}

// ── Market hidden items & categories ──
let marketHiddenCategories = new Set(); // category names hidden from market view
function loadMarketHiddenPrefs() {
  try {
    const v = localStorage.getItem('bc_market_hidden_v1');
    if (v) marketHiddenItems = new Set(JSON.parse(v));
  } catch(e) {}
  try {
    const v = localStorage.getItem('bc_market_hidden_cats_v1');
    if (v) marketHiddenCategories = new Set(JSON.parse(v));
  } catch(e) {}
}
loadMarketHiddenPrefs();
function saveMarketHidden() {
  safeSetItem('bc_market_hidden_v1', JSON.stringify([...marketHiddenItems]));
}
function saveMarketHiddenCategories() {
  safeSetItem('bc_market_hidden_cats_v1', JSON.stringify([...marketHiddenCategories]));
}
function hideMarketCategory(cat) {
  marketHiddenCategories.add(cat);
  saveMarketHiddenCategories();
  renderMarketResults();
  // Update hidden count on button
  const countEl = document.getElementById('mkt-hidden-count');

  if (countEl) countEl.textContent = total ? `(${total})` : '';
}
function restoreMarketCategory(cat) {

  saveMarketHiddenCategories();

  if (panel) panel.remove();

}
function hideMarketItem(id) {

}
function restoreMarketItem(id) {

}
function toggleRemovedPanel(btn) {
  // Close if already open
  const existing = document.getElementById('mkt-removed-panel');
  if (existing) { existing.remove(); return; }
  const totalHidden = marketHiddenItems.size + marketHiddenCategories.size;
  if (!totalHidden) return;

  // Build list of hidden items (need names — scan rawItems + any we remember)
  const allKnown = [...marketRawItems, ...shoppingMarketItems];
  const seenItem = {};
  const itemRows = [...marketHiddenItems].map(id => {
    const found = allKnown.find(it => String(it.id||it.itemId) === id);
    const name  = found ? (found.name || 'Item '+id) : ('Item '+id);
    if (seenItem[id]) return '';
    seenItem[id] = true;
    return `<div style="display:flex;align-items:center;gap:.5rem;padding:.35rem .75rem;border-bottom:1px solid var(--border)">
      <span style="flex:1;font-size:13px;color:var(--text)">${escHtml(name)}</span>
      <button class="btn" style="padding:2px 8px;font-size:11px;color:var(--teal-light)" onclick="restoreMarketItem('${escHtml(id)}')">Restore</button>
    </div>`;
  }).filter(Boolean).join('');

  // Build collapsible category section.
  // Categories are passed by index via window array to avoid quoting issues with names in inline onclick.
  window._mktHiddenCatList = [...marketHiddenCategories];
  const catRows = window._mktHiddenCatList.map((cat, ci) => {
    const panelId = 'mkt-hidden-cat-' + ci;
    // Find items under this category (from rawItems before our filter)
    const catItems = marketRawItems.filter(it => (it.tag||it.category||'Other') === cat);
    const catItemRows = catItems.map(it => {
      return `<div style="padding:.3rem .75rem .3rem 1.5rem;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)">${escHtml(it.name||'Unknown')}</div>`;
    }).join('');
    return `<div style="border-bottom:1px solid var(--border)">
      <div onclick="document.getElementById('${panelId}').style.display=document.getElementById('${panelId}').style.display==='none'?'':'none'" style="display:flex;align-items:center;gap:.5rem;padding:.35rem .75rem;cursor:pointer">
        <i class="ti ti-chevron-right" style="font-size:12px;color:var(--text3)"></i>
        <span style="flex:1;font-size:13px;color:var(--text);font-weight:500">${escHtml(cat)}</span>
        <span style="font-size:11px;color:var(--text3)">${catItems.length} item${catItems.length!==1?'s':''}</span>
        <button class="btn" style="padding:2px 8px;font-size:11px;color:var(--teal-light)" onclick="event.stopPropagation();restoreMarketCategory(window._mktHiddenCatList[${ci}])">Restore</button>
      </div>
      <div id="${panelId}" style="display:none">${catItemRows || '<div style="padding:.3rem .75rem .3rem 1.5rem;font-size:12px;color:var(--text3)">No items</div>'}</div>
    </div>`;
  }).join('');

  const catSection = marketHiddenCategories.size ? `
    <div style="padding:.4rem .75rem;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border)">
      Hidden categories (${marketHiddenCategories.size})
    </div>
    ${catRows}` : '';

  const itemSection = marketHiddenItems.size ? `
    <div style="padding:.4rem .75rem;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border)">
      Hidden items (${marketHiddenItems.size})
    </div>
    ${itemRows}` : '';

  const panel = document.createElement('div');
  panel.id = 'mkt-removed-panel';
  panel.className = 'mkt-removed-panel';
  panel.innerHTML = `
    <div style="padding:.5rem .75rem;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <span>Hidden (${totalHidden})</span>
      <button onclick="marketHiddenItems.clear();marketHiddenCategories.clear();saveMarketHidden();saveMarketHiddenCategories();document.getElementById('mkt-removed-panel').remove();renderMarketResults()" style="font-size:11px;color:var(--red-light);background:none;border:none;cursor:pointer;padding:0">Restore all</button>
    </div>
    ${catSection}${itemSection || (!catSection ? '<div style="padding:.5rem .75rem;font-size:12px;color:var(--text3)">No hidden items</div>' : '')}`;

  // Position relative to the button
  const wrap = btn.closest('[style*="position:relative"]') || btn.parentElement;
  wrap.style.position = 'relative';
  wrap.appendChild(panel);

  // Close on outside click
  const close = e => { if (!panel.contains(e.target) && e.target !== btn) { panel.remove(); document.removeEventListener('click', close, true); } };
  setTimeout(() => document.addEventListener('click', close, true), 0);
}

// ── NAV ──
const TAB_TITLES = {skills:'Experience',inventory:'Player Inventory',crafting:'Player Crafts',tasks:'Tasks',market:'Market',deals:'Deals',shopping:'Shopping List',map:'Map',planner:'Crafting Planner'};
function switchTab(tab) {

// ── XP / LEVEL HELPERS ──
async function ensureThresholds() {
  if (xpThresholds.length) return;
  const d = await apiFetch('/static/experience/levels.json');
  const levels = d.levels || d || [];
  xpThresholds = levels.map(l => l.xp || l.experienceRequired || l.totalXp || 0);
}
function xpToLevel(xp) {
  let lvl = 0;
  for (let i = 0; i < xpThresholds.length; i++) { if (xp >= xpThresholds[i]) lvl = i+1; else break; }
  return lvl;
}
function levelPct(xp) {
  const lvl = xpToLevel(xp);
  if (!lvl) return 0;
  const floor = xpThresholds[lvl-1]||0, ceil = xpThresholds[lvl]||floor;
  if (ceil===floor) return 100;
  return Math.min(100, Math.round(((xp-floor)/(ceil-floor))*100));
}
function xpToNext(xp) {
  const lvl = xpToLevel(xp);
  const ceil = xpThresholds[lvl]||0;
  return Math.max(0, ceil - xp);
}
function xpIntoLevel(xp) {
  const lvl = xpToLevel(xp);
  const floor = xpThresholds[lvl-1]||0;
  return xp - floor;
}

// ── SKILLS ──
async function loadSkills(id, silent=false) {
  const el = document.getElementById('tab-skills');
  if (!silent) el.innerHTML = loading();
  try {
    await ensureThresholds();
    const [pData, rankData] = await Promise.all([
      apiFetch(`/api/players/${id}`),
      apiFetch(`/api/players/${id}/skill-rankings`)
    ]);
    const player = pData.player || {};
    const skillMap = player.skillMap || {};
    const experience = player.experience || [];
    const rankings = rankData.rankings || {};

    const skills = experience
      .filter(e => e.skill_id !== 1 && e.skill_id !== 22)
      .map(e => ({
        skillId: e.skill_id,
        xp: e.quantity,
        level: xpToLevel(e.quantity),
        pct: levelPct(e.quantity),
        toNext: xpToNext(e.quantity),
        intoLevel: xpIntoLevel(e.quantity),
        name: skillMap[e.skill_id]?.name || 'Skill '+e.skill_id,
        category: skillMap[e.skill_id]?.skillCategoryStr || 'Other'
      }))
      .sort((a,b) => b.xp - a.xp);

    const totalXP = skills.reduce((s,sk)=>s+sk.xp,0);
    const maxLvl = skills.reduce((m,sk)=>Math.max(m,sk.level),0);
    const totalLvl = skills.reduce((s,sk)=>s+sk.level,0);

    const professions = skills.filter(s => s.category === 'Profession');
    const adventure = skills.filter(s => s.category === 'Adventure');
    const other = skills.filter(s => s.category !== 'Profession' && s.category !== 'Adventure');

    function renderSkillCards(list) {
      return list.map(sk => {
        const rank = rankings[sk.skillId];
        return `<div class="skill-card" onclick="void(0)">
          <div class="skill-card-header">
            <div class="skill-card-name">${escHtml(sk.name)}</div>
            <div class="skill-card-level">${sk.level}</div>
          </div>
          <div class="skill-card-row">
            <span>Progress</span><span>${sk.pct}%</span>
          </div>
          <div class="skill-bar-wrap"><div class="skill-bar" style="width:${sk.pct}%"></div></div>
          <div class="skill-xp-row">${fmtNum(sk.intoLevel)} / ${fmtNum(sk.intoLevel + sk.toNext)} XP${rank?' &nbsp;·&nbsp; <span style="color:var(--text3)">#'+rank.rank+'</span>':''}</div>
        </div>`;
      }).join('');
    }

    el.innerHTML = `
      <div class="stat-row">
        <div class="stat"><div class="stat-label">Highest level</div><div class="stat-val">${maxLvl}</div></div>
        <div class="stat"><div class="stat-label">Total levels</div><div class="stat-val">${totalLvl}</div></div>
        <div class="stat"><div class="stat-label">Total XP</div><div class="stat-val">${fmtNum(totalXP)}</div></div>
      </div>
      ${professions.length?`<div class="category-label"><i class="ti ti-hammer"></i> Professions</div><div class="skills-grid">${renderSkillCards(professions)}</div>`:''}
      ${adventure.length?`<div class="category-label"><i class="ti ti-sword"></i> Adventure</div><div class="skills-grid">${renderSkillCards(adventure)}</div>`:''}
      ${other.length?`<div class="category-label"><i class="ti ti-dots"></i> Other</div><div class="skills-grid">${renderSkillCards(other)}</div>`:''}`;
    startLiveRefresh('skills');
  } catch(e) { if (!silent) el.innerHTML = errBox(e); }
}

// ── LIVE REFRESH ──
let liveRefreshId = null;
const tabLiveIds = {};   // user-controlled per-tab live refresh
const REFRESH_MS = {skills:60000, inventory:30000, crafting:30000, tasks:15000};
function startLiveRefresh(tab) {
  stopLiveRefresh();
  const ms = REFRESH_MS[tab];
  if (!ms || !currentPlayer) return;
  liveRefreshId = setInterval(() => {
    if (document.hidden) return;
    if (tab === 'tasks') loadTasks(currentPlayer.entityId, true);
    else loadTab(tab, true);
  }, ms);
}
function stopLiveRefresh() {
  if (liveRefreshId) { clearInterval(liveRefreshId); liveRefreshId = null; }
  stopPassiveCraftTimer();
}

// ── USER-CONTROLLED PER-TAB LIVE REFRESH ──
function isTabLive(tab) { return !!tabLiveIds[tab]; }

function toggleTabLive(tab) {
  if (tabLiveIds[tab]) {
    clearInterval(tabLiveIds[tab]);
    tabLiveIds[tab] = null;
  } else {
    if (!currentPlayer && tab !== 'shopping') return;
    const ms = tab === 'planner' ? 30000 : tab === 'shopping' ? 300000 : (REFRESH_MS[tab] || 30000);
    tabLiveIds[tab] = setInterval(() => {
      if (document.hidden) return;
      if (tab === 'tasks')   loadTasks(currentPlayer?.entityId, true);
      else if (tab === 'planner') refreshPlannerInv();
      else if (tab === 'shopping') fetchAllShoppingPrices();
      else loadTab(tab, true);
    }, ms);
  }
  updateLiveBtns();
}

function stopAllLive() {
  Object.keys(tabLiveIds).forEach(tab => {
    if (tabLiveIds[tab]) { clearInterval(tabLiveIds[tab]); tabLiveIds[tab] = null; }
  });
  updateLiveBtns();
}

function updateLiveBtns() {
  ['inventory', 'tasks', 'planner', 'shopping'].forEach(tab => {
    const btn = document.getElementById('live-btn-' + tab);
    if (!btn) return;
    const on = isTabLive(tab);
    btn.innerHTML = on
      ? '<i class="ti ti-player-stop"></i> Stop'
      : '<i class="ti ti-player-play"></i> Live';
    btn.className = 'btn live-btn' + (on ? ' live-btn-on' : '');
  });
}

async function refreshPlannerInv() {
  // Preserve tracked inventory names so selections survive a refresh
  const trackedNames = new Set();
  if (plannerTrackedInvs && invData) {
    (invData.inventories || []).forEach((inv, i) => {
      if (plannerTrackedInvs.has(i)) {
        trackedNames.add((inv.inventoryName || inv.buildingName || '') + '|' + (inv.claimName || ''));
      }
    });
  }
  invData = null;
  await loadPlannerInventory();
  // Restore selections by name
  if (invData && trackedNames.size > 0) {
    const invs = invData.inventories || [];
    plannerTrackedInvs = new Set();
    invs.forEach((inv, i) => {
      const key = (inv.inventoryName || inv.buildingName || '') + '|' + (inv.claimName || '');
      if (trackedNames.has(key)) plannerTrackedInvs.add(i);
    });
  } else {
    plannerTrackedInvs = new Set(); // default: none selected
  }
  computePlannerInvMap();
  renderPlannerInventory();
  renderPlanPanel();
  renderBuildingSteps();
}

}
function fmtTimeLeft(s) {
  if (s <= 0) return 'Finishing…';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  if (m > 0) return `${m}m ${String(sec).padStart(2,'0')}s`;
  return `${sec}s`;
}
function startPassiveCraftTimer() {
  stopPassiveCraftTimer();
  passiveCraftTimer = setInterval(() => {
    const now = Math.floor(Date.now() / 1000);
    document.querySelectorAll('[data-pts]').forEach(el => {
      const ts = +el.dataset.pts;
      const left = ts - now;
      el.textContent = left > 0 ? fmtTimeLeft(left) : (el.dataset.processing ? 'Processing' : 'Finishing…');
      el.style.color = left < 300 ? 'var(--green-light)' : 'var(--amber-light)';
    });
  }, 1000);
}
function stopPassiveCraftTimer() {
  if (passiveCraftTimer) { clearInterval(passiveCraftTimer); passiveCraftTimer = null; }
}

// ── INVENTORY ──
let invData = null;
async function loadInventory(id, silent=false) {
  const el = document.getElementById('tab-inventory');
  if (!silent) el.innerHTML = loading();
  try {
    const [d, housingList] = await Promise.all([
      apiFetch(`/api/players/${id}/inventories`),
      apiFetch(`/api/players/${id}/housing`).catch(() => [])
    ]);

    // housing list is a plain array; skip empty houses
    const houses = Array.isArray(housingList) ? housingList.filter(h => !h.isEmpty) : [];

    const houseDetails = await Promise.all(
      houses.map(h => apiFetch(`/api/players/${id}/housing/${h.buildingEntityId}`).catch(() => null))
    );

    const housingInvs = [];
    houseDetails.forEach((hd, i) => {
      if (!hd) return;
      const house = houses[i];
      // items/cargos are arrays in housing detail — merge into shared keyed maps
      (hd.items || []).forEach(item => { d.items[item.id] = item; });
      (hd.cargos || []).forEach(cargo => { d.cargos[cargo.id] = cargo; });
      // hd.inventories: [{entityId, buildingName, buildingNickname, inventory:[{locked,volume,contents:{item_id,quantity,item_type}}]}]
      (hd.inventories || []).forEach(inv => {
        const slots = (inv.inventory || [])
          .filter(slot => slot.contents && slot.contents.item_id)
          .map(slot => ({
            contents: {
              itemId: slot.contents.item_id,
              itemType: (slot.contents.item_type === 'cargo' || slot.contents.item_type === 1) ? 1 : 0,
              quantity: slot.contents.quantity
            }
          }));
        if (!slots.length) return;
        housingInvs.push({
          inventoryName: inv.buildingNickname || inv.buildingName || hd.buildingName || 'House',
          claimName: hd.claimName || house.claimName || 'Housing',
          regionId: hd.regionId || house.regionId || null,
          _isHousing: true,
          pockets: slots
        });
      });
    });

    invData = { ...d, inventories: [...(d.inventories || []), ...housingInvs] };
    renderInventory();
  } catch(e) { if (!silent) el.innerHTML = errBox(e); }
}

function buildAllSlots() {
  if (!invData) return [];
  const {inventories=[], items={}, cargos={}} = invData;
  const allSlots = [];
  inventories.forEach(inv => {
    (inv.pockets||[]).forEach(slot => {
      const s = slotContents(slot);
      if (!s) return;
      const isCargo = s.itemType === 1;
      const meta = isCargo ? cargos[s.itemId] : items[s.itemId];
      const invName = inv.inventoryName || inv.buildingName || 'Unknown';
      const n = invName.toLowerCase();
      let locationType = 'personal';
      if (inv._isHousing) locationType = 'housing';
      else if (inv.claimName) locationType = n.includes('bank') ? 'bank' : 'storage';
      allSlots.push({
        itemId: s.itemId, itemType: s.itemType, quantity: s.quantity,
        inventoryName: invName, claimName: inv.claimName||null,
        regionId: inv.regionId||null, locationType, meta
      });
    });
  });
  return allSlots;
}

function renderInventory() {
  const el = document.getElementById('tab-inventory');
  if (!invData) return;

  if (!document.getElementById('inv-content')) {
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem">

          <input type="text" id="inv-search-input" placeholder="Search items..." style="background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 12px 6px 30px;font-size:13px;outline:none;width:220px">
        </div>

    <button class="${invViewMode==='flat'?'active':''}" onclick="invViewMode='flat';updateInvContent()"><i class="ti ti-layout-grid"></i> Flat</button>`;

function updateInvContent() {
  const contentEl = document.getElementById('inv-content');
  if (!contentEl || !invData) return;
  const {inventories=[]} = invData;
  const allSlots = buildAllSlots();

  const q = invSearch.toLowerCase();
  const filtered = q ? allSlots.filter(s => (s.meta?.name||'').toLowerCase().includes(q) || (s.meta?.tag||'').toLowerCase().includes(q)) : allSlots;

  // update toggle button active states
  const toggleEl = document.getElementById('inv-toggle');
  if (toggleEl) toggleEl.querySelectorAll('button').forEach((btn, i) => {
    btn.classList.toggle('active', (i===0) === (invViewMode==='grouped'));
  });

  let content = '';
  if (invViewMode === 'grouped') {
    const byLocation = {};
    filtered.forEach(s => {
      const key = s.inventoryName + (s.claimName?'|'+s.claimName:'');
      if (!byLocation[key]) byLocation[key] = {name:s.inventoryName, claimName:s.claimName, regionId:s.regionId, locationType:s.locationType, slots:[]};
      byLocation[key].slots.push(s);
    });

    const personal = Object.values(byLocation).filter(l => l.locationType==='personal');
    const banks    = Object.values(byLocation).filter(l => l.locationType==='bank');
    const housing  = Object.values(byLocation).filter(l => l.locationType==='housing');
    const storage  = Object.values(byLocation).filter(l => l.claimName && l.locationType==='storage');

    function renderItemGrid(slots) {
      return `<div class="inv-items-grid">${slots.map(s => {
        const name = itemLabel(s.meta, s.itemId, s.itemType);
        const rar  = (s.meta?.rarityStr||'').toLowerCase();
        return `<div class="inv-item-card">
          <div class="inv-item-info">
            <div class="inv-item-name">${escHtml(name)}</div>
            <div class="inv-item-tag">${escHtml(s.meta?.tag||'')}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
            ${rar?`<span class="badge badge-${rar}">${cap(rar)}</span>`:''}
            <span class="inv-item-qty">${fmtNum(s.quantity)}</span>
          </div>
        </div>`;
      }).join('')}</div>`;
    }

    function renderSection(title, icon, locs, secKey) {
      if (!locs.length) return '';
      const totalT = locs.reduce((s,l)=>s+new Set(l.slots.map(x=>x.itemType+':'+x.itemId)).size,0);
      const totalQ = locs.reduce((s,l)=>s+l.slots.reduce((a,x)=>a+x.quantity,0),0);
      const collapsed = !!invSectionCollapsed[secKey];
      const selIdx    = invSelectedChip[secKey] ?? -1;

      const chips = locs.map((loc, i) => {
        const types = new Set(loc.slots.map(s=>s.itemType+':'+s.itemId)).size;
        const qty   = loc.slots.reduce((s,x)=>s+x.quantity,0);
        const isBank = (loc.locationType === 'bank' || loc.locationType === 'storage');
        // Sub-label: banks get "R7 · TownName"; housing/personal get nothing
        const sub = isBank
          ? `R${loc.regionId||'?'} · ${escHtml(loc.claimName)}`
          : '';
        const active = (i === selIdx) || (!!q); // expand all when searching
        return `<div class="inv-loc-chip${active?' active':''}" onclick="selectInvChip('${secKey}',${i})">
          <span class="inv-loc-chip-name">${escHtml(loc.name)}</span>
          ${sub?`<span class="inv-loc-chip-sub">${sub}</span>`:''}
        </div>`;
      });

      // When searching: show all; otherwise show selected chip only
      const expandedLocs = q ? locs : (selIdx >= 0 ? [locs[selIdx]] : []);
      const content = expandedLocs.length
        ? `<div class="inv-chip-content">${expandedLocs.map(l=>renderItemGrid(l.slots)).join('')}</div>` : '';

      return `<div class="inv-group">
        <div class="inv-group-header" onclick="toggleInvSection('${secKey}')">
          <span class="inv-group-name"><i class="ti ${icon}"></i>${title}</span>
          <span class="inv-group-meta"></span>
          <i class="ti ti-chevron-down" id="inv-sec-chev-${secKey}" style="font-size:13px;color:var(--text3);flex-shrink:0;transition:transform .2s;${collapsed?'transform:rotate(-90deg)':''}"></i>
        </div>
        <div id="inv-sec-body-${secKey}"${collapsed?' style="display:none"':''}>
          <div class="inv-chips-row">${chips.join('')}</div>
          ${content}
        </div>
      </div>`;
    }

    content = renderSection('Inventory', 'ti-backpack', personal, 'personal')
      + renderSection('Banks', 'ti-building-bank', banks, 'banks')
      + renderSection('Housing', 'ti-home', housing, 'housing')
      + renderSection('Storage', 'ti-box', storage, 'storage');
  } else {
    content = `<div class="inv-items-grid">${filtered.sort((a,b)=>b.quantity-a.quantity).map(s=>{
      const name = itemLabel(s.meta, s.itemId, s.itemType);
      const rar = (s.meta?.rarityStr||'').toLowerCase();
